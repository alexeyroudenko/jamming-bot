# Minimal stack for /tags/vectorfield/ (and related /tags/* pages that use the same APIs).
#
# Usage (from repo root):
#   copy .env.tags-vectorfield.example .env.tags-vectorfield
#   docker compose -f docker-compose.tags-vectorfield.yml --env-file .env.tags-vectorfield up --build
#
# Then open: http://localhost:5000/tags/vectorfield/
#
# APIs used: GET /api/tags/get/ (tags list), POST /api/tags/embeddings/ (spaCy in flask image),
# Socket.IO optional (live reload on tags_updated / analyzed).

services:
  redis:
    image: redis:7-alpine
    container_name: jamming-vf-redis
    ports:
      - "6379:6379"
    networks:
      - tags_vectorfield_net

  tags_db:
    image: postgres:12-alpine
    container_name: jamming-vf-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tags}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tags}
      POSTGRES_DB: tags_db_dev
    ports:
      - "5432:5432"
    volumes:
      - vf_tags_pg_data:/var/lib/postgresql/data
    networks:
      - tags_vectorfield_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d tags_db_dev"]
      interval: 4s
      timeout: 5s
      retries: 12
      start_period: 10s

  tags_service:
    build: ./tags-service
    container_name: jamming-vf-tags
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-tags}:${POSTGRES_PASSWORD:-tags}@tags_db:5432/tags_db_dev
      CAST_SERVICE_HOST_URL: http://tags_service:8000/api/v1/casts/
      SENTRY_DSN: ""
    volumes:
      - ./tags-service:/app
    ports:
      - "8003:8000"
    depends_on:
      tags_db:
        condition: service_healthy
    networks:
      - tags_vectorfield_net

  flask:
    build: ./app-service
    container_name: jamming-vf-flask
    command: python app.py
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TAGS_SERVICE_URL: http://tags_service:8000
      OTEL_TRACING_ENABLED: "0"
      SENTRY_DSN: ""
      CORS_EXTRA_ORIGINS: "http://127.0.0.1:5000,http://localhost:5000"
    volumes:
      - ./app-service/flask:/app
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - tags_service
    networks:
      - tags_vectorfield_net

networks:
  tags_vectorfield_net:
    driver: bridge

volumes:
  vf_tags_pg_data:
