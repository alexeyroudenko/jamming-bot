                number: 80
    - host: app.jamming-bot.arthew0.online
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: app-service
              port:
                number: 80
    - host: jamming-bot.arthew0.online
      http:
        paths:
        - path: /data
          pathType: Prefix
          backend:
            service:
              name: data-service
              port:
                number: 80
        - path: /storage
          pathType: Prefix
          backend:
            service:
              name: storage-service
              port:
                number: 80
        - path: /steps
          pathType: Prefix
          backend:
            service:
              name: steps-service
              port:
                number: 80
        - path: /keywords
          pathType: Prefix
          backend:
            service:
              name: keywords-service
              port:
                number: 80
        - path: /semantic
          pathType: Prefix
          backend:
            service:
              name: semantic-service
              port:
                number: 80
        - path: /ip
          pathType: Prefix
          backend:
            service:
              name: ip-service
              port:
                number: 80
        - path: /render
          pathType: Prefix
          backend:
            service:
              name: html-renderer-service
              port:
                number: 80
        - path: /
          pathType: Prefix
          backend:
            service:
              name: app-service
              port:
