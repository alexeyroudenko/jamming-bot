        imagePullPolicy: Never
        ports:
        - containerPort: 8004
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8004"]
        env:
        - name: DATABASE_URI
          valueFrom:
            secretKeyRef:
              name: jamming-bot-secrets
              key: DATABASE_URI
        resources:
          requests:
            cpu: "100m"
            memory: "48Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        readinessProbe:
          tcpSocket:
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8004
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ip-service
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: ip-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8004
