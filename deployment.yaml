          requests:
            cpu: "50m"
            memory: "256Mi"
          limits:
            cpu: "250m"
            memory: "1024Mi"
        startupProbe:
          tcpSocket:
            port: 7781
          failureThreshold: 15
          periodSeconds: 5
        readinessProbe:
          tcpSocket:
            port: 7781
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 7781
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: storage-service
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: storage-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 7781
---
# ===================== steps-service =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: steps-service
  namespace: jamming-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: steps-service
  template:
    metadata:
      labels:
        app: steps-service
    spec:
      containers:
      - name: steps-service
        image: steps-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8007
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8007"]
        env:
        - name: STEPS_IMAGE_URL
          value: "http://storage-service/export/img"
        - name: STEPS_LATEST_URL
          value: "http://app-service/api/storage_latest/"
        - name: STEPS_CSV_URL
          value: "http://storage-service/export/csv"
        - name: STEPS_REFRESH_SECONDS
          value: "60"
        - name: STEPS_OUTPUT_DIR
          value: "/app/data"
        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            cpu: "250m"
            memory: "2048Mi"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8007
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8007
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        volumeMounts:
        - name: steps-data
          mountPath: /app/data
      volumes:
      - name: steps-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: steps-service
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: steps-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8007
---
# ===================== tags-service =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tags-service
  namespace: jamming-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tags-service
  template:
    metadata:
      labels:
        app: tags-service
    spec:
      containers:
      - name: tags-service
        image: tags-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
        env:
        - name: DATABASE_URI
          valueFrom:
            secretKeyRef:
              name: jamming-bot-secrets
              key: DATABASE_URI
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: jamming-bot-secrets
              key: SHHH_SENTRY_URL
        - name: TAGS_UI_REDIRECT_ORIGIN
          value: "https://jamming-bot.arthew0.online"
        resources:
          requests:
            cpu: "125m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        startupProbe:
          tcpSocket:
            port: 8000
          failureThreshold: 15
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: tags-service
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: tags-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
---
# ===================== tags-db PVC =====================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tags-db-pvc
  namespace: jamming-bot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# ===================== tags-db (PostgreSQL) =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tags-db
  namespace: jamming-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tags-db
  template:
    metadata:
      labels:
        app: tags-db
    spec:
      containers:
      - name: tags-db
        image: postgres:12-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: jamming-bot-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jamming-bot-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: "tags_db_dev"
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 10
          periodSeconds: 20
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
          subPath: pgdata
      volumes:
      - name: pg-data
        persistentVolumeClaim:
          claimName: tags-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tags-db
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: tags-db
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
---
# ===================== redis =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: jamming-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 10
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---
# ===================== jaeger (tracing) =====================
# UI: http://jamming-bot.arthew0.online:31686 or https://jaeger.jamming-bot.arthew0.online
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: jamming-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.52
        imagePullPolicy: IfNotPresent
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        ports:
        - containerPort: 16686
          name: ui
        - containerPort: 4318
          name: otlp-http
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 10
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
  - name: ui
    protocol: TCP
    port: 80
    targetPort: 16686
  - name: otlp-http
    protocol: TCP
    port: 4318
    targetPort: 4318
---
# Jaeger UI: https://jaeger.jamming-bot.arthew0.online or http://jamming-bot.arthew0.online:31686
# To use :16686 set k3s --service-node-port-range=16686-32767 and change nodePort to 16686
apiVersion: v1
kind: Service
metadata:
  name: jaeger-nodeport
  namespace: jamming-bot
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
  - name: ui
    protocol: TCP
    port: 80
    targetPort: 16686
    nodePort: 31686
---
# ===================== worker-service (rq workers) =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: jamming-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      tolerations:
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule
      containers:
      - name: worker
        image: app-service:latest
        imagePullPolicy: Never
        command: ["python", "worker.py"]
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: TAGS_SERVICE_URL
          value: "http://tags-service"
        - name: SEMANTIC_SERVICE_URL
          value: "http://semantic-service"
        - name: STORAGE_SERVICE_URL
          value: "http://storage-service"
        - name: DATA_SERVICE_URL
          value: "http://data-service"
        - name: IP_SERVICE_URL
          value: "http://ip-service"
        - name: RENDERER_SERVICE_URL
          value: "http://html-renderer-service"
        - name: IMAGE_ANALYZE_SERVICE_URL
          value: "http://image-analyze-service"
        - name: S3_HOST
          value: "s3.firstvds.ru"
        - name: S3_PORT
          value: "443"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: jamming-bot-secrets
              key: S3_ACCESS_KEY
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: jamming-bot-secrets
              key: S3_SECRET_KEY
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: jamming-bot-secrets
              key: SHHH_SENTRY_URL
        - name: S3_BUCKET_NAME
          value: "steps"
        - name: OTEL_TRACING_ENABLED
          value: "1"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://jaeger:4318"
        - name: OTEL_SERVICE_NAME
          value: "app-service-worker"
        resources:
          requests:
            cpu: "125m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "768Mi"
---
# ===================== rq-dashboard =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rq-dashboard
  namespace: jamming-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rq-dashboard
  template:
    metadata:
      labels:
        app: rq-dashboard
    spec:
      containers:
      - name: rq-dashboard
        image: kudaw/rq-dashboard
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9181
        env:
        - name: RQ_DASHBOARD_REDIS_URL
          value: "redis://redis:6379/0"
        - name: RQ_DASHBOARD_PORT
          value: "9181"
        - name: PORT
          value: "9181"
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 9181
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 9181
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rq-dashboard
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: rq-dashboard
  ports:
  - protocol: TCP
    port: 80
    targetPort: 9181
---
# ===================== bot-db PVC =====================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bot-db-pvc
  namespace: jamming-bot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# ===================== bot-service =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-service
  namespace: jamming-bot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bot-service
  template:
    metadata:
      labels:
        app: bot-service
    spec:
      containers:
      - name: bot-service
        image: bot-service:latest
        imagePullPolicy: Never
        env:
        - name: SHHH_API_KEY
          valueFrom:
            secretKeyRef:
              name: jamming-bot-secrets
              key: SHHH_API_KEY
        - name: SHHH_MY_CHAT_ID
          value: "218014682"
        - name: SHHH_SENTRY_URL
          valueFrom:
            secretKeyRef:
              name: jamming-bot-secrets
              key: SHHH_SENTRY_URL
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: FLASK_HOST
          value: "app-service"
        - name: FLASK_PORT
          value: "80"
        volumeMounts:
        - name: bot-db
          mountPath: /app/data
        - name: bot-config
          mountPath: /app/bot.yaml
        resources:
          requests:
            cpu: "250m"
            memory: "160Mi"
          limits:
            cpu: "500m"
            memory: "320Mi"
        livenessProbe:
          exec:
            command: ["python", "-c", "import os; os.path.exists('data/database.db')"]
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
      - name: bot-db
        persistentVolumeClaim:
          claimName: bot-db-pvc
      - name: bot-config
        hostPath:
          path: /opt/jamming-bot/bot-service/bot/bot.yaml
          type: File
---
# ===================== data-service =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: jamming-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      containers:
      - name: data-service
        image: data-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8010
        command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8010", "--workers", "2"]
        volumeMounts:
        - name: bot-db
          mountPath: /app/data
          readOnly: true
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        startupProbe:
          httpGet:
            path: /healthz
            port: 8010
          failureThreshold: 10
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8010
          timeoutSeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8010
          timeoutSeconds: 5
          initialDelaySeconds: 10
          periodSeconds: 20
          failureThreshold: 5
      volumes:
      - name: bot-db
        persistentVolumeClaim:
          claimName: bot-db-pvc
          readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: data-service
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: data-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8010
---
