# deployment.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: jamming-bot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-renderer
  namespace: jamming-bot
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: html-renderer
  template:
    metadata:
      labels:
        app: html-renderer
    spec:
      containers:
      - name: renderer
        image: 1325gy/my_dev:v5 # Python + Playwright версия
        imagePullPolicy: Never  # Используем локальный образ, импортированный в k3s
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "768Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: html-renderer-service
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: html-renderer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
---
# ===================== keywords-service =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keywords-service
  namespace: jamming-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keywords-service
  template:
    metadata:
      labels:
        app: keywords-service
    spec:
      containers:
      - name: keywords-service
        image: keywords-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 7771
        resources:
          requests:
            cpu: "125m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
        readinessProbe:
          tcpSocket:
            port: 7771
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 7771
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: keywords-service
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: keywords-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 7771
---
# ===================== semantic-service =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-service
  namespace: jamming-bot
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: semantic-service
  template:
    metadata:
      labels:
        app: semantic-service
    spec:
      containers:
      - name: semantic-service
        image: semantic-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8005
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8005"]
        env:
        - name: DATABASE_URI
          valueFrom:
            secretKeyRef:
              name: jamming-bot-secrets
              key: DATABASE_URI
        resources:
          requests:
            cpu: "250m"
            memory: "1536Mi"
          limits:
            cpu: "1"
            memory: "2560Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 150
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: semantic-service
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: semantic-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8005
---
