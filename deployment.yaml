        ports:
        - containerPort: 8006
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8006"]
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "768Mi"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8006
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8006
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: image-analyze-service
  namespace: jamming-bot
spec:
  type: ClusterIP
  selector:
    app: image-analyze-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8006
---
# ===================== storage-service =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-service
  namespace: jamming-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-service
  template:
    metadata:
      labels:
        app: storage-service
    spec:
      tolerations:
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule
      containers:
      - name: storage-service
        image: storage-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 7781
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "7781"]
        env:
        - name: DATABASE_URI
          valueFrom:
            secretKeyRef:
              name: jamming-bot-secrets
              key: DATABASE_URI
