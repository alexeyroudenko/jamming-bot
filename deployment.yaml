    traefik.ingress.kubernetes.io/router.middlewares: jamming-bot-strip-keywords@kubernetescrd,jamming-bot-strip-semantic@kubernetescrd,jamming-bot-strip-storage@kubernetescrd,jamming-bot-strip-steps@kubernetescrd,jamming-bot-strip-ip@kubernetescrd,jamming-bot-strip-data@kubernetescrd,jamming-bot-strip-app@kubernetescrd
