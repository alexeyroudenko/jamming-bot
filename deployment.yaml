# ===================== rq-exporter (Prometheus metrics) =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rq-exporter
  namespace: jamming-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rq-exporter
  template:
    metadata:
      labels:
        app: rq-exporter
    spec:
      enableServiceLinks: false
      containers:
      - name: rq-exporter
        image: mdawar/rq-exporter:v3.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9726
          name: metrics
        env:
        - name: RQ_REDIS_HOST
          value: "redis"
        - name: RQ_REDIS_PORT
          value: "6379"
        - name: RQ_REDIS_DB
          value: "0"
        - name: PORT
          value: "9726"
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            cpu: "50m"
            memory: "64Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 9726
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 9726
          initialDelaySeconds: 10
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rq-exporter
  namespace: jamming-bot
  labels:
    app: rq-exporter
spec:
  type: ClusterIP
  selector:
    app: rq-exporter
  ports:
  - name: metrics
    protocol: TCP
    port: 9726
    targetPort: 9726
---
# LoadBalancer to expose rq-exporter metrics on :9101
apiVersion: v1
kind: Service
metadata:
  name: rq-exporter-lb
  namespace: jamming-bot
spec:
  type: LoadBalancer
  selector:
    app: rq-exporter
  ports:
  - name: metrics
    port: 9101
    targetPort: 9726
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rq-exporter
  namespace: jamming-bot
  labels:
    app: rq-exporter
spec:
  selector:
    matchLabels:
      app: rq-exporter
  endpoints:
  - port: metrics
    interval: 15s
    path: /
---
# ===================== backfill-worker (one-shot Job) =====================
# Run: make k3s-backfill-worker
# Monitor: kubectl logs -n jamming-bot job/backfill-worker -f
# Re-run: kubectl delete job backfill-worker -n jamming-bot && make k3s-backfill-worker
apiVersion: batch/v1
kind: Job
metadata:
  name: backfill-worker
  namespace: jamming-bot
spec:
  # Many pod restarts on crash/OOM before Job is marked Failed (was 3 → backoff limit too soon).
  backoffLimit: 100
  activeDeadlineSeconds: 604800
  template:
    metadata:
      labels:
        app: backfill-worker
    spec:
      containers:
      - name: backfill-worker
        image: backfill-worker:latest
        imagePullPolicy: Never
        env:
        - name: DATA_SERVICE_URL
          value: "http://data-service"
        - name: STORAGE_SERVICE_URL
          value: "http://storage-service"
        - name: APP_SERVICE_URL
          value: "http://app-service"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: BATCH_SIZE
          value: "10"
        - name: SLEEP_BETWEEN
          value: "2.0"
        - name: BACKFILL_STEP_BASE
          value: "0"
        - name: BACKFILL_MIN_ID
          value: "150000"
        - name: BACKFILL_MAX_ID
          value: "300000"
        # Defaults; live tuning via Redis keys backfill_sleep / backfill_timeout from /ctrl/
        - name: PAGE_TIMEOUT
          value: "10"
        resources:
          requests:
            cpu: "150m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "2048Mi"
      restartPolicy: OnFailure
