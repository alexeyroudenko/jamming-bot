# ===================== Ingress =====================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: html-renderer-ingress
  namespace: jamming-bot
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: jamming-bot-strip-keywords@kubernetescrd,jamming-bot-strip-semantic@kubernetescrd,jamming-bot-strip-storage@kubernetescrd,jamming-bot-strip-steps@kubernetescrd,jamming-bot-strip-tags@kubernetescrd,jamming-bot-strip-ip@kubernetescrd,jamming-bot-strip-data@kubernetescrd,jamming-bot-strip-app@kubernetescrd
spec:
  rules:
    - http:
        paths:
        # Only /tags/api/* goes to tags-service (strip /tags -> /api/v1/...). UI routes /tags/, /tags/3d/, etc. stay on app-service.
        - path: /tags/api
          pathType: Prefix
          backend:
            service:
              name: tags-service
              port:
                number: 80
        - path: /render
          pathType: Prefix
          backend:
            service:
              name: html-renderer-service
              port:
                number: 80
        - path: /keywords
          pathType: Prefix
          backend:
            service:
              name: keywords-service
              port:
                number: 80
        - path: /semantic
          pathType: Prefix
          backend:
            service:
              name: semantic-service
              port:
                number: 80
        - path: /storage
          pathType: Prefix
          backend:
            service:
              name: storage-service
              port:
                number: 80
        - path: /steps
          pathType: Prefix
          backend:
            service:
              name: steps-service
              port:
                number: 80
        - path: /ip
          pathType: Prefix
          backend:
            service:
              name: ip-service
              port:
                number: 80
        - path: /data
          pathType: Prefix
          backend:
            service:
              name: data-service
              port:
                number: 80
        - path: /app
          pathType: Prefix
          backend:
            service:
              name: app-service
              port:
                number: 80
