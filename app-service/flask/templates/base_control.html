<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Control room{% endblock %} — Jamming Bot</title>
  <link rel="stylesheet" href="/flask_static/style.css">
  {% block head_extra %}{% endblock %}
</head>
<body class="jb-page">
  <a class="jb-skip-link" href="#jb-main">К основному содержимому</a>

  {% block scripts %}{% endblock %}
</body>
</html>
