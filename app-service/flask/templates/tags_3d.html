<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jamming bot — Tag cloud 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #ccc;
      font-family: monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 12px 20px;
      font-size: 11px;
      color: #666;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }
    nav a { color: #555; text-decoration: none; margin-right: 12px; pointer-events: auto; }
    nav a:hover { color: #fff; }
    #status { color: #333; font-size: 10px; }
    #viewport { display: block; width: 100vw; height: 100vh; cursor: grab; }
    #viewport:active { cursor: grabbing; }
    #info {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid #333;
      font-size: 12px;
      color: #8f8;
      z-index: 12;
      max-width: 90vw;
      text-align: center;
      display: none;
    }
    #info.visible { display: block; }
    .banner {
      position: fixed;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      background: #311;
      border: 1px solid #633;
      color: #f88;
      font-size: 11px;
      z-index: 15;
      max-width: 90%;
      text-align: center;
      display: none;
    }
    .banner.visible { display: block; }
    #hint {
      position: fixed;
      bottom: 12px;
      left: 12px;
      font-size: 10px;
      color: #444;
      z-index: 10;
    }
  </style>
</head>
<body>

<nav>
  <div>
    <a href="/">← home</a>
    <a href="/tags/">2D cloud</a>
    <a href="/tags/constellation/">constellation</a>
    <a href="/tags/vectorfield/">vector field</a>
    <a href="/tags/vectorfield-3d/">vector 3D</a>
    <a href="/tags/chaos-attractor/">chaos</a>
    <a href="/geo/">geo globe</a>
    <a href="/tags/phrases/">phrases</a>
    <a href="/tags/sentiment-vortex/">sentiment vortex</a>
  </div>
  <span id="status"></span>
</nav>

<div id="api-error" class="banner" role="alert"></div>
<div id="webgl-error" class="banner" role="alert"></div>
<div id="info" aria-live="polite"></div>
<canvas id="viewport"></canvas>
<div id="hint">drag to orbit · wheel to zoom · idle 10s focuses last tag</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" integrity="sha384-2huaZvOR9iDzHqslqwpR87isEmrfxqyWOF7hr7BY6KG0+hVKLoEXMPUJw3ynWuhO" crossorigin="anonymous"></script>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js" crossorigin="anonymous"></script>
<script>
(function () {
  var API = '/api/tags/get/';
  var MAX_TAGS = 600;
  var SPHERE_RADIUS = 14;
  var RADIUS_SPREAD = 0.42;
  var POSITION_JITTER = 3.2;
  var IDLE_MS = 10000;
  var FOCUS_DURATION_MS = 1600;
  var FLASH_MS = 520;
  var FOCUS_CAM_OFFSET = 10;
  var FONT_MIN = 7;
  var SCALE_MIN = 0.33;
  var TEXT_SCALE_MULT = 3;
  var IDLE_ROTATE_DELAY_MS = 1400;
  var IDLE_ROTATE_Y_RAD_PER_SEC = 0.1;

  var statusEl = document.getElementById('status');
  var apiErr = document.getElementById('api-error');
  var webglErr = document.getElementById('webgl-error');
  var infoEl = document.getElementById('info');
  var canvas = document.getElementById('viewport');

  var lastActivity = performance.now();
  var lastFocusTagName = '';
  var spriteByName = {};
  var focusAnimating = false;
  var lastOrbitTick = performance.now();

  function bumpActivity() {
    lastActivity = performance.now();
  }

  function showApiError(msg) {
    apiErr.textContent = msg;
    apiErr.classList.add('visible');
    statusEl.textContent = 'API error';
  }

  function showWebGLError(msg) {
    webglErr.textContent = msg;
    webglErr.classList.add('visible');
    statusEl.textContent = 'WebGL unavailable';
  }

  function fibonacciUnit(i, n) {
    var y = 1 - (i / Math.max(1, n - 1)) * 2;
    y = Math.max(-1, Math.min(1, y));
    var r = Math.sqrt(1 - y * y);
    var theta = Math.PI * (3 - Math.sqrt(5)) * i;
    return new THREE.Vector3(
      Math.cos(theta) * r,
      y,
      Math.sin(theta) * r
    );
  }

  function chaoticPosition(i, n, baseRadius) {
    var dir = fibonacciUnit(i, n);
    var jitterR = 1 + (Math.random() - 0.5) * 2 * RADIUS_SPREAD;
    var r = baseRadius * jitterR;
    var p = dir.multiplyScalar(r);
    p.x += (Math.random() - 0.5) * 2 * POSITION_JITTER;
    p.y += (Math.random() - 0.5) * 2 * POSITION_JITTER;
    p.z += (Math.random() - 0.5) * 2 * POSITION_JITTER;
    return p;
  }

  function makeSprite(name, count, maxCount) {
    var t = maxCount > 0 ? Math.min(1, Math.max(0, count / maxCount)) : 0;
    var fontPx = Math.round(FONT_MIN * TEXT_SCALE_MULT * (1 + 1.5 * t));
    var pad = 10;
    var canvas2d = document.createElement('canvas');
    var ctx = canvas2d.getContext('2d');
    ctx.font = 'bold ' + fontPx + 'px monospace';
    var w = Math.ceil(ctx.measureText(name).width) + pad * 2;
    var h = fontPx + pad * 2;
    canvas2d.width = w;
    canvas2d.height = h;
    ctx.font = 'bold ' + fontPx + 'px monospace';
    var bright = Math.round(80 + t * 175);
    ctx.fillStyle = 'rgb(' + bright + ',' + bright + ',' + bright + ')';
    ctx.fillText(name, pad, fontPx + pad / 2);
    var tex = new THREE.CanvasTexture(canvas2d);
    tex.needsUpdate = true;
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    var mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true, color: 0xffffff });
    var sprite = new THREE.Sprite(mat);
    var scale = SCALE_MIN * TEXT_SCALE_MULT * (1 + 3 * t);
    sprite.scale.set(scale * w / h, scale, 1);
    sprite.userData = { name: name, count: count, baseScaleX: scale * w / h, baseScaleY: scale };
    return sprite;
  }

  var renderer;
  try {
    renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
  } catch (e) {
    showWebGLError('WebGL failed to initialize. Try another browser or GPU drivers.');
    return;
  }
  if (!renderer.getContext()) {
    showWebGLError('WebGL is not available in this browser.');
    return;
  }

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 0, 32);

  var controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 8;
  controls.maxDistance = 80;

  controls.addEventListener('change', bumpActivity);
  controls.addEventListener('end', bumpActivity);

  var raycaster = new THREE.Raycaster();
  var pointer = new THREE.Vector2();
  var sprites = [];
  var _depthPos = new THREE.Vector3();
  var _depthFar = new THREE.Color(0x383838);
  var _depthNear = new THREE.Color(0xffffff);

  function updateSpriteDepthColors() {
    var n = sprites.length;
    if (n === 0) return;
    var minD = Infinity;
    var maxD = -Infinity;
    var i, s, d;
    for (i = 0; i < n; i++) {
      s = sprites[i];
      s.getWorldPosition(_depthPos);
      d = camera.position.distanceTo(_depthPos);
      if (d < minD) minD = d;
      if (d > maxD) maxD = d;
    }
    var span = maxD - minD;
    for (i = 0; i < n; i++) {
      s = sprites[i];
      if (s.userData.skipDepthUntil && performance.now() < s.userData.skipDepthUntil) continue;
      s.getWorldPosition(_depthPos);
      d = camera.position.distanceTo(_depthPos);
      var u = span > 1e-5 ? (maxD - d) / span : 1;
      u = Math.pow(Math.min(1, Math.max(0, u)), 1.35);
      s.material.color.copy(_depthFar).lerp(_depthNear, u);
    }
  }

  function onResize() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  }
  onResize();
  window.addEventListener('resize', onResize);

  function setInfo(text) {
    if (text) {
      infoEl.textContent = text;
      infoEl.classList.add('visible');
    } else {
      infoEl.classList.remove('visible');
    }
  }

  function onPointerMove(ev) {
    bumpActivity();
    var rect = renderer.domElement.getBoundingClientRect();
    pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    var hits = raycaster.intersectObjects(sprites, false);
    if (hits.length > 0) {
      var u = hits[0].object.userData;
      setInfo(u.name + ' · count ' + u.count);
    } else {
      setInfo('');
    }
  }

  function onClick(ev) {
    bumpActivity();
    var rect = renderer.domElement.getBoundingClientRect();
    pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    var hits = raycaster.intersectObjects(sprites, false);
    if (hits.length > 0) {
      var u = hits[0].object.userData;
      setInfo(u.name + ' · count ' + u.count);
    }
  }

  renderer.domElement.addEventListener('pointerdown', bumpActivity);
  renderer.domElement.addEventListener('wheel', bumpActivity, { passive: true });
  renderer.domElement.addEventListener('mousemove', onPointerMove);
  renderer.domElement.addEventListener('click', onClick);
  renderer.domElement.addEventListener('touchstart', bumpActivity, { passive: true });
  renderer.domElement.addEventListener('touchmove', function (e) {
    if (e.touches.length !== 1) return;
    var t = e.touches[0];
    onPointerMove({ clientX: t.clientX, clientY: t.clientY });
  }, { passive: true });

  function easeInOutQuad(x) {
    return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2;
  }

  function flashSpriteRed(sprite) {
    var mat = sprite.material;
    var white = new THREE.Color(0xffffff);
    var red = new THREE.Color(0xff3030);
    var sx0 = sprite.userData.baseScaleX;
    var sy0 = sprite.userData.baseScaleY;
    sprite.userData.skipDepthUntil = performance.now() + FLASH_MS + 80;
    var start = performance.now();
    function step() {
      var u = (performance.now() - start) / FLASH_MS;
      if (u >= 1) {
        mat.color.copy(white);
        sprite.scale.set(sx0, sy0, 1);
        sprite.userData.skipDepthUntil = 0;
        return;
      }
      var wave = u < 0.5 ? u * 2 : (1 - u) * 2;
      mat.color.copy(white).lerp(red, wave);
      var bump = 1 + 0.12 * wave;
      sprite.scale.set(sx0 * bump, sy0 * bump, 1);
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function runFocusOnSprite(sprite) {
    if (focusAnimating || !sprite) return;
    focusAnimating = true;
    controls.enabled = false;
    flashSpriteRed(sprite);

    sprite.updateMatrixWorld(true);
    var p = new THREE.Vector3();
    sprite.getWorldPosition(p);
    var dir = p.clone().normalize();
    if (dir.lengthSq() < 1e-6) dir.set(0, 0, 1);
    var endTarget = p.clone();
    var dist = Math.max(controls.minDistance, Math.min(controls.maxDistance * 0.35, p.length() + FOCUS_CAM_OFFSET));
    var endCam = dir.clone().multiplyScalar(dist);

    var startTarget = controls.target.clone();
    var startCam = camera.position.clone();
    var animStart = performance.now();

    function animStep() {
      var raw = (performance.now() - animStart) / FOCUS_DURATION_MS;
      var k = easeInOutQuad(Math.min(1, raw));
      controls.target.lerpVectors(startTarget, endTarget, k);
      camera.position.lerpVectors(startCam, endCam, k);
      camera.lookAt(controls.target);
      if (raw < 1) {
        requestAnimationFrame(animStep);
      } else {
        controls.target.copy(endTarget);
        camera.position.copy(endCam);
        camera.lookAt(controls.target);
        controls.enabled = true;
        controls.update();
        focusAnimating = false;
        lastActivity = performance.now();
        setInfo(sprite.userData.name + ' · count ' + sprite.userData.count);
      }
    }
    requestAnimationFrame(animStep);
  }

  function tryIdleFocus() {
    if (focusAnimating || !lastFocusTagName) return;
    var sp = spriteByName[lastFocusTagName];
    if (sp) {
      runFocusOnSprite(sp);
    } else {
      lastActivity = performance.now();
    }
  }

  function setLastTagFromList(arr) {
    if (!arr || !arr.length) return;
    var last = arr[arr.length - 1];
    if (typeof last === 'string' && last.length) {
      lastFocusTagName = last;
    }
  }

  function loadTags(data) {
    while (scene.children.length) {
      scene.remove(scene.children[0]);
    }
    sprites = [];
    spriteByName = {};

    if (!Array.isArray(data)) {
      showApiError('Unexpected API response (not a list).');
      return;
    }
    if (data.length === 0) {
      statusEl.textContent = 'no tags';
      return;
    }

    var tags = data.map(function (row) {
      return { name: String(row.name || ''), count: Number(row.count) || 0 };
    }).filter(function (t) { return t.name.length > 0; });

    tags.sort(function (a, b) { return b.count - a.count; });
    tags = tags.slice(0, MAX_TAGS);

    if (tags.length === 0) {
      statusEl.textContent = 'no valid tag names';
      return;
    }

    var maxCount = 1;
    for (var i = 0; i < tags.length; i++) {
      if (tags[i].count > maxCount) maxCount = tags[i].count;
    }

    for (var j = 0; j < tags.length; j++) {
      var sp = makeSprite(tags[j].name, tags[j].count, maxCount);
      sp.position.copy(chaoticPosition(j, tags.length, SPHERE_RADIUS));
      scene.add(sp);
      sprites.push(sp);
      spriteByName[tags[j].name] = sp;
    }

    statusEl.textContent = tags.length + ' tags (max ' + MAX_TAGS + ')';
  }

  function fetchTags() {
    return fetch(API)
      .then(function (r) { return r.json().then(function (body) { return { ok: r.ok, body: body }; }); })
      .then(function (res) {
        var body = res.body;
        if (!res.ok || (body && body.error)) {
          var detail = (body && body.detail) ? String(body.detail) : '';
          var errMsg = (body && body.error) ? String(body.error) : 'request failed';
          showApiError('Tags API error: ' + errMsg + (detail ? ' — ' + detail : ''));
          return;
        }
        if (!Array.isArray(body)) {
          showApiError('Tags API returned non-array JSON.');
          return;
        }
        apiErr.classList.remove('visible');
        loadTags(body);
      })
      .catch(function (err) {
        console.error(err);
        showApiError('Network error loading tags: ' + (err && err.message ? err.message : String(err)));
      });
  }

  function tick() {
    requestAnimationFrame(tick);
    var now = performance.now();
    var dt = Math.min(0.05, (now - lastOrbitTick) / 1000);
    lastOrbitTick = now;
    if (!focusAnimating && now - lastActivity >= IDLE_ROTATE_DELAY_MS) {
      scene.rotation.y += IDLE_ROTATE_Y_RAD_PER_SEC * dt;
    }
    if (!focusAnimating && lastFocusTagName && now - lastActivity >= IDLE_MS) {
      tryIdleFocus();
    }
    controls.update();
    updateSpriteDepthColors();
    renderer.render(scene, camera);
  }

  tick();

  var socket = io({ transports: ['websocket', 'polling'] });
  socket.on('analyzed', function (data) {
    if (data && data.tags && data.tags.length) {
      setLastTagFromList(data.tags);
    }
    fetchTags();
  });
  socket.on('tags_updated', function (data) {
    if (data && data.semantic_words && data.semantic_words.length) {
      setLastTagFromList(data.semantic_words);
    } else if (data && data.tags && data.tags.length) {
      setLastTagFromList(data.tags);
    }
    fetchTags();
  });

  statusEl.textContent = 'loading…';
  fetchTags();
})();
</script>
</body>
</html>
