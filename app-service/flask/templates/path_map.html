<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jamming bot — Path map</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='tags_vis_shared.css') }}">
  <style>
    .path-map-toolbar {
      left: 12px;
      right: auto;
      max-width: calc(100vw - 24px);
    }

    .path-map-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--tags-vis-muted);
      font-size: 11px;
      font-family: ui-monospace, monospace;
    }

    .path-map-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #ef4444;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.7);
    }

    .path-map-dot.ok {
      background: #000000;
      box-shadow: 0 0 0 1px rgba(250, 250, 250, 0.12);
    }

    .path-map-mode-group {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border: 1px solid var(--tags-vis-border);
      border-radius: 10px;
      background: rgba(24, 24, 27, 0.84);
      color: var(--tags-vis-muted);
      font-size: 11px;
      font-family: ui-monospace, monospace;
      flex-wrap: wrap;
    }

    .path-map-mode-title {
      color: var(--tags-vis-text);
      opacity: 0.9;
    }

    .path-map-mode-label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .path-map-mode-label input {
      accent-color: var(--tags-vis-accent);
    }

    .path-map-tooltip {
      position: fixed;
      z-index: 25;
      min-width: 240px;
      max-width: min(420px, calc(100vw - 24px));
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--tags-vis-border);
      background: rgba(9, 9, 11, 0.94);
      color: var(--tags-vis-text);
      box-shadow: 0 12px 38px rgba(0, 0, 0, 0.42);
      font-size: 12px;
      line-height: 1.45;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(0, 0, 0);
      transition: opacity 0.12s ease;
      backdrop-filter: blur(8px);
    }

    .path-map-tooltip.visible {
      opacity: 1;
    }

    .path-map-tooltip code {
      color: var(--tags-vis-accent);
      word-break: break-word;
    }

    .path-map-tooltip-row {
      margin-top: 4px;
    }

    .path-map-tooltip-image {
      display: block;
      width: 220px;
      max-width: 100%;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid var(--tags-vis-border);
      background: #000;
      object-fit: cover;
    }

    .path-map-tooltip-label {
      color: var(--tags-vis-muted);
      margin-right: 6px;
    }

    .path-map-auto-cursor {
      position: fixed;
      width: 16px;
      height: 16px;
      border: 1px solid var(--tags-vis-accent);
      border-radius: 999px;
      box-shadow:
        0 0 0 1px rgba(9, 9, 11, 0.88),
        0 0 22px rgba(34, 211, 238, 0.55);
      pointer-events: none;
      z-index: 24;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.18s ease;
    }

    .path-map-auto-cursor.visible {
      opacity: 1;
    }

    .path-map-auto-cursor::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 999px;
      background: rgba(34, 211, 238, 0.8);
    }

    .path-map-legend {
      position: fixed;
      bottom: 10px;
      right: 12px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(24, 24, 27, 0.82);
      border: 1px solid var(--tags-vis-border);
      color: var(--tags-vis-muted);
      font-size: 10px;
      font-family: ui-monospace, monospace;
    }

    .path-map-swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 4px;
      vertical-align: middle;
    }
  </style>
</head>
<body class="tags-vis-body">
<nav class="tags-vis-nav" aria-label="Subpages">
  <div>
    <span class="tags-vis-title">Path map</span>
    <a href="https://jamming-bot.arthew0.online/">← home</a>
    <a href="https://jamming-bot.arthew0.online/" target="_blank" rel="noreferrer">main site</a>
    <a href="/tags/vectorfield/">vector field</a>
    <a href="/geo/">geo globe</a>
    <a href="/screenshots/">screenshots</a>
  </div>
</nav>

<div class="tags-vis-toolbar path-map-toolbar">
  <button type="button" class="tags-vis-btn" id="btn-auto" aria-pressed="false">Auto</button>
  <button type="button" class="tags-vis-btn" id="btn-refresh">Refresh</button>
  <fieldset class="path-map-mode-group" id="rows-group">
    <legend style="display:none">Rows</legend>
    <span class="path-map-mode-title">Rows</span>
    <label class="path-map-mode-label"><input type="radio" name="row-count" value="1">1</label>
    <label class="path-map-mode-label"><input type="radio" name="row-count" value="2">2</label>
    <label class="path-map-mode-label"><input type="radio" name="row-count" value="4">4</label>
    <label class="path-map-mode-label"><input type="radio" name="row-count" value="5" checked>5</label>
    <label class="path-map-mode-label"><input type="radio" name="row-count" value="10">10</label>
    <label class="path-map-mode-label"><input type="radio" name="row-count" value="20">20</label>
  </fieldset>
  <fieldset class="path-map-mode-group" id="mode-group">
    <legend style="display:none">Display mode</legend>
    <span class="path-map-mode-title">Mode</span>
    <label class="path-map-mode-label"><input type="radio" name="display-mode" value="text-length">text length</label>
    <label class="path-map-mode-label"><input type="radio" name="display-mode" value="status" checked>status code</label>
    <label class="path-map-mode-label"><input type="radio" name="display-mode" value="screenshot">screenshots</label>
    <label class="path-map-mode-label"><input type="radio" name="display-mode" value="delta-time">delta time</label>
  </fieldset>
  <span class="path-map-status" id="path-map-status">Loading…</span>
</div>

<div id="api-error" class="tags-vis-banner" role="alert"></div>
<div class="tags-vis-scanlines" aria-hidden="true"></div>
<div class="tags-vis-canvas-host">
  <canvas id="path-map"></canvas>
</div>
<div id="path-map-tooltip" class="path-map-tooltip" role="status" aria-live="polite"></div>
<div id="path-map-auto-cursor" class="path-map-auto-cursor" aria-hidden="true"></div>
<p class="tags-vis-hint" id="path-map-hint">Latest 3000 steps. Grid flows left-to-right, then top-to-bottom. Black = all non-4xx, red = 4xx.</p>
<div class="path-map-legend" id="path-map-legend">
  <span><span class="path-map-swatch" style="background:#000000;border:1px solid rgba(250,250,250,0.2)"></span>non-4xx</span>
  <span><span class="path-map-swatch" style="background:#ef4444"></span>4xx</span>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<script>
(function () {
  var STORAGE_API = '/api/storage_latest/';
  var MAX_STEPS = 3000;
  var MODE_STORAGE_KEY = 'path-map-display-mode';
  var ROWS_STORAGE_KEY = 'path-map-row-count';
  var canvas = document.getElementById('path-map');
  var ctx = canvas.getContext('2d', { alpha: false });
  var banner = document.getElementById('api-error');
  var statusEl = document.getElementById('path-map-status');
  var tooltipEl = document.getElementById('path-map-tooltip');
  var autoCursorEl = document.getElementById('path-map-auto-cursor');
  var autoBtn = document.getElementById('btn-auto');
  var refreshBtn = document.getElementById('btn-refresh');
  var hintEl = document.getElementById('path-map-hint');
  var legendEl = document.getElementById('path-map-legend');
  var modeInputs = Array.prototype.slice.call(document.querySelectorAll('input[name="display-mode"]'));
  var rowInputs = Array.prototype.slice.call(document.querySelectorAll('input[name="row-count"]'));

  var dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
  var steps = [];
  var cols = 1;
  var rows = 1;
  var cellWidth = 8;
  var cellHeight = 8;
  var gridWidth = 1;
  var gridHeight = 1;
  var originX = 0;
  var originY = 0;
  var hoveredIndex = -1;
  var displayMode = 'status';
  var rowCount = 5;
  var autoMode = false;
  var autoTarget = null;
  var autoTimer = null;
  var syncTimer = null;
  var autoAnimationFrame = null;
  var autoState = { x: 0, y: 0, targetX: 0, targetY: 0, vx: 0, vy: 0, currentIndex: -1 };
  var latestStepNumber = -1;
  var reconnectSocket = null;
  var renderStats = {
    textMin: 0,
    textMax: 1,
    deltaMin: 0,
    deltaMax: 1,
    deltaP10: 0,
    deltaP90: 1
  };

  function showErr(msg) {
    banner.textContent = msg;
    banner.classList.add('visible');
  }

  function hideErr() {
    banner.classList.remove('visible');
  }

  function statusColor(code) {
    return code >= 400 && code < 500 ? '#ef4444' : '#000000';
  }

  function parseStepNumber(v) {
    var n = parseInt(String(v == null ? '' : v), 10);
    return Number.isFinite(n) ? n : NaN;
  }

  function trimText(v) {
    return String(v == null ? '' : v).trim();
  }

  function parseTimestamp(raw) {
    if (raw == null || raw === '') return NaN;
    var s = String(raw).trim();
    var parsed = Date.parse(s);
    if (!Number.isNaN(parsed)) return parsed;
    var num = parseFloat(s);
    if (!Number.isFinite(num)) return NaN;
    return num < 1e12 ? num * 1000 : num;
  }

  function toGray(value) {
    var v = clamp(Math.round(value), 0, 255);
    return 'rgb(' + v + ',' + v + ',' + v + ')';
  }

  function scaleToGray(value, minValue, maxValue) {
    if (!Number.isFinite(value)) return toGray(32);
    if (!Number.isFinite(minValue) || !Number.isFinite(maxValue) || maxValue <= minValue) {
      return toGray(180);
    }
    return toGray(255 * ((value - minValue) / (maxValue - minValue)));
  }

  function percentile(sortedValues, ratio) {
    if (!sortedValues.length) return NaN;
    var idx = clamp(Math.round((sortedValues.length - 1) * ratio), 0, sortedValues.length - 1);
    return sortedValues[idx];
  }

  function normalizeRow(row, fallbackIndex) {
    if (!row || typeof row !== 'object') {
      return {
        _n: fallbackIndex,
        status_code: 0,
        url: '',
        src: '',
        timestamp: '',
        error: '',
        screenshot_url: '',
        _ts: NaN
      };
    }
    var n = parseStepNumber(row.number != null ? row.number : row.id);
    var statusCode = parseInt(String(row.status_code == null ? '' : row.status_code), 10);
    return {
      _n: Number.isFinite(n) ? n : fallbackIndex,
      status_code: Number.isFinite(statusCode) ? statusCode : 0,
      url: trimText(row.url),
      src: trimText(row.src || row.src_url),
      timestamp: trimText(row.timestamp),
      error: trimText(row.error),
      ip: trimText(row.ip),
      text_length: parseInt(String(row.text_length == null ? '' : row.text_length), 10) || 0,
      screenshot_url: trimText(row.screenshot_url),
      _ts: parseTimestamp(row.timestamp)
    };
  }

  function stepKey(step) {
    return String(step && step._n != null ? step._n : '');
  }

  function sortAndTrim(nextSteps) {
    nextSteps.sort(function (a, b) { return a._n - b._n; });
    if (nextSteps.length > MAX_STEPS) {
      nextSteps = nextSteps.slice(nextSteps.length - MAX_STEPS);
    }
    updateDerivedStats(nextSteps);
    latestStepNumber = nextSteps.length ? nextSteps[nextSteps.length - 1]._n : -1;
    return nextSteps;
  }

  function updateDerivedStats(nextSteps) {
    var textMin = Infinity;
    var textMax = -Infinity;
    var deltaMin = Infinity;
    var deltaMax = -Infinity;
    var deltas = [];
    var prevTs = NaN;
    for (var i = 0; i < nextSteps.length; i++) {
      var step = nextSteps[i];
      var len = Number.isFinite(step.text_length) ? step.text_length : 0;
      textMin = Math.min(textMin, len);
      textMax = Math.max(textMax, len);
      var ts = step._ts;
      var delta = NaN;
      if (Number.isFinite(ts) && Number.isFinite(prevTs)) {
        delta = Math.max(0, ts - prevTs);
        deltaMin = Math.min(deltaMin, delta);
        deltaMax = Math.max(deltaMax, delta);
        deltas.push(delta);
      }
      step._delta_ms = delta;
      prevTs = Number.isFinite(ts) ? ts : prevTs;
    }
    renderStats.textMin = Number.isFinite(textMin) ? textMin : 0;
    renderStats.textMax = Number.isFinite(textMax) ? textMax : 1;
    renderStats.deltaMin = Number.isFinite(deltaMin) ? deltaMin : 0;
    renderStats.deltaMax = Number.isFinite(deltaMax) ? deltaMax : 1;
    deltas.sort(function (a, b) { return a - b; });
    renderStats.deltaP10 = Number.isFinite(percentile(deltas, 0.10)) ? percentile(deltas, 0.10) : renderStats.deltaMin;
    renderStats.deltaP90 = Number.isFinite(percentile(deltas, 0.90)) ? percentile(deltas, 0.90) : renderStats.deltaMax;
  }

  function mergeStep(step) {
    var key = stepKey(step);
    var found = false;
    var next = steps.map(function (item) {
      if (stepKey(item) !== key) return item;
      found = true;
      return Object.assign({}, item, step);
    });
    if (!found) next.push(step);
    steps = sortAndTrim(next);
  }

  function computeLayout() {
    var width = window.innerWidth || 1;
    var height = window.innerHeight || 1;
    var usableWidth = Math.max(120, width - 24);
    var usableHeight = Math.max(80, height - 120);
    rows = rowCount;
    cols = Math.max(1, Math.ceil(MAX_STEPS / rows));
    cellWidth = Math.max(1, Math.floor(usableWidth / cols));
    cellHeight = Math.max(2, Math.floor(usableHeight / rows));
    if (!Number.isFinite(cellWidth) || cellWidth < 1) cellWidth = 1;
    if (!Number.isFinite(cellHeight) || cellHeight < 1) cellHeight = 2;
    gridWidth = cols * cellWidth;
    gridHeight = rows * cellHeight;
    originX = Math.floor((width - gridWidth) / 2);
    originY = Math.floor((height - gridHeight) / 2);
  }

  function getModeLabel() {
    if (displayMode === 'text-length') return 'text length';
    if (displayMode === 'screenshot') return 'screenshots';
    if (displayMode === 'delta-time') return 'delta time';
    return 'status code';
  }

  function applyStoredMode() {
    var saved = null;
    try {
      saved = sessionStorage.getItem(MODE_STORAGE_KEY);
    } catch (e) {}
    if (!saved) return;
    for (var i = 0; i < modeInputs.length; i++) {
      if (modeInputs[i].value === saved) {
        modeInputs[i].checked = true;
        displayMode = saved;
        return;
      }
    }
  }

  function applyStoredRows() {
    var saved = null;
    try {
      saved = sessionStorage.getItem(ROWS_STORAGE_KEY);
    } catch (e) {}
    if (!saved) return;
    var parsed = parseInt(saved, 10);
    if (![1, 2, 4, 5, 10, 20].includes(parsed)) return;
    rowCount = parsed;
    for (var i = 0; i < rowInputs.length; i++) {
      rowInputs[i].checked = parseInt(rowInputs[i].value, 10) === parsed;
    }
  }

  function updateLegend() {
    if (displayMode === 'text-length') {
      hintEl.textContent = 'Latest 3000 steps. White = more text, black = less text.';
      legendEl.innerHTML =
        '<span><span class="path-map-swatch" style="background:#000"></span>short</span>' +
        '<span><span class="path-map-swatch" style="background:#fff;border:1px solid rgba(0,0,0,0.25)"></span>long</span>';
      return;
    }
    if (displayMode === 'screenshot') {
      hintEl.textContent = 'Latest 3000 steps. White = screenshot exists, black = no screenshot. Tooltip shows thumbnail.';
      legendEl.innerHTML =
        '<span><span class="path-map-swatch" style="background:#000"></span>no screenshot</span>' +
        '<span><span class="path-map-swatch" style="background:#fff;border:1px solid rgba(0,0,0,0.25)"></span>has screenshot</span>';
      return;
    }
    if (displayMode === 'delta-time') {
      hintEl.textContent = 'Latest 3000 steps. White = smaller time gap from previous step, black = larger gap.';
      legendEl.innerHTML =
        '<span><span class="path-map-swatch" style="background:#fff;border:1px solid rgba(0,0,0,0.25)"></span>fast change</span>' +
        '<span><span class="path-map-swatch" style="background:#000"></span>slow change</span>';
      return;
    }
    hintEl.textContent = 'Latest 3000 steps. Grid flows left-to-right, then top-to-bottom. Black = all non-4xx, red = 4xx.';
    legendEl.innerHTML =
      '<span><span class="path-map-swatch" style="background:#000000;border:1px solid rgba(250,250,250,0.2)"></span>non-4xx</span>' +
      '<span><span class="path-map-swatch" style="background:#ef4444"></span>4xx</span>';
  }

  function resizeCanvas() {
    dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
    canvas.width = Math.max(1, Math.floor(window.innerWidth * dpr));
    canvas.height = Math.max(1, Math.floor(window.innerHeight * dpr));
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    computeLayout();
    render();
    if (hoveredIndex >= 0) {
      showTooltipForIndex(hoveredIndex, false);
    }
  }

  function drawBackground() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    var bg = ctx.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, '#040405');
    bg.addColorStop(1, '#09090b');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = 'rgba(34, 211, 238, 0.06)';
    ctx.fillRect(originX - 1, originY - 1, gridWidth + 2, gridHeight + 2);
  }

  function render() {
    drawBackground();
    if (!steps.length) {
      ctx.fillStyle = '#a1a1aa';
      ctx.font = '12px ui-monospace, monospace';
      ctx.fillText('No steps available', 18, 110);
      return;
    }

    for (var i = 0; i < steps.length; i++) {
      var col = i % cols;
      var row = Math.floor(i / cols);
      var x = originX + col * cellWidth;
      var y = originY + row * cellHeight;
      var step = steps[i];
      ctx.fillStyle = stepFill(step);
      ctx.fillRect(x, y, cellWidth, cellHeight);
    }

    if (hoveredIndex >= 0 && hoveredIndex < steps.length) {
      var point = getPointRect(hoveredIndex);
      ctx.strokeStyle = '#22d3ee';
      ctx.lineWidth = 1;
      ctx.strokeRect(point.x - 1, point.y - 1, point.w + 2, point.h + 2);
    }
  }

  function stepFill(step) {
    if (displayMode === 'text-length') {
      return scaleToGray(step.text_length, renderStats.textMin, renderStats.textMax);
    }
    if (displayMode === 'screenshot') {
      return step.screenshot_url ? '#ffffff' : '#000000';
    }
    if (displayMode === 'delta-time') {
      if (!Number.isFinite(step._delta_ms)) return '#000000';
      var minGap = renderStats.deltaP10;
      var maxGap = renderStats.deltaP90;
      if (!Number.isFinite(maxGap) || !Number.isFinite(minGap) || maxGap <= minGap) return '#c0c0c0';
      var clipped = clamp(step._delta_ms, minGap, maxGap);
      var normalized = (clipped - minGap) / (maxGap - minGap);
      normalized = Math.pow(normalized, 0.75);
      return toGray(235 * (1 - normalized));
    }
    return statusColor(step.status_code);
  }

  function getPointRect(index) {
    var col = index % cols;
    var row = Math.floor(index / cols);
    return {
      x: originX + col * cellWidth,
      y: originY + row * cellHeight,
      w: cellWidth,
      h: cellHeight
    };
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function updateStatus() {
    var redCount = 0;
    for (var i = 0; i < steps.length; i++) {
      if (steps[i].status_code >= 400 && steps[i].status_code < 500) redCount += 1;
    }
    var label = steps.length + ' / ' + MAX_STEPS + ' visible';
    if (steps.length) label += ' · latest step ' + latestStepNumber;
    label += ' · rows ' + rowCount;
    label += ' · mode ' + getModeLabel();
    label += ' · 4xx ' + redCount;
    statusEl.textContent = label;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function setTooltipPosition(clientX, clientY) {
    var pad = 16;
    var x = clientX + 18;
    var y = clientY + 18;
    var rect = tooltipEl.getBoundingClientRect();
    if (x + rect.width > window.innerWidth - pad) x = clientX - rect.width - 18;
    if (y + rect.height > window.innerHeight - pad) y = clientY - rect.height - 18;
    tooltipEl.style.left = clamp(x, pad, Math.max(pad, window.innerWidth - rect.width - pad)) + 'px';
    tooltipEl.style.top = clamp(y, pad, Math.max(pad, window.innerHeight - rect.height - pad)) + 'px';
  }

  function renderTooltip(step) {
    var dotClass = step.status_code >= 400 && step.status_code < 500 ? 'path-map-dot' : 'path-map-dot ok';
    var screenshotHtml = '';
    if (displayMode === 'screenshot' && step.screenshot_url) {
      screenshotHtml =
        '<img class="path-map-tooltip-image" src="' + escapeHtml(step.screenshot_url) + '" alt="step screenshot">';
    }
    tooltipEl.innerHTML =
      '<div class="path-map-tooltip-row"><span class="' + dotClass + '"></span> step <code>' + escapeHtml(step._n) + '</code></div>' +
      '<div class="path-map-tooltip-row"><span class="path-map-tooltip-label">status</span><code>' + escapeHtml(step.status_code || 0) + '</code></div>' +
      '<div class="path-map-tooltip-row"><span class="path-map-tooltip-label">url</span><code>' + escapeHtml(step.url || '—') + '</code></div>' +
      '<div class="path-map-tooltip-row"><span class="path-map-tooltip-label">src</span><code>' + escapeHtml(step.src || '—') + '</code></div>' +
      '<div class="path-map-tooltip-row"><span class="path-map-tooltip-label">time</span><code>' + escapeHtml(step.timestamp || '—') + '</code></div>' +
      '<div class="path-map-tooltip-row"><span class="path-map-tooltip-label">text_length</span><code>' + escapeHtml(step.text_length || 0) + '</code></div>' +
      '<div class="path-map-tooltip-row"><span class="path-map-tooltip-label">delta_ms</span><code>' + escapeHtml(Number.isFinite(step._delta_ms) ? Math.round(step._delta_ms) : '—') + '</code></div>' +
      '<div class="path-map-tooltip-row"><span class="path-map-tooltip-label">screenshot</span><code>' + escapeHtml(step.screenshot_url || '—') + '</code></div>' +
      '<div class="path-map-tooltip-row"><span class="path-map-tooltip-label">ip</span><code>' + escapeHtml(step.ip || '—') + '</code></div>' +
      '<div class="path-map-tooltip-row"><span class="path-map-tooltip-label">error</span><code>' + escapeHtml(step.error || '—') + '</code></div>' +
      screenshotHtml;
  }

  function showTooltipForIndex(index, fromPointer, clientX, clientY) {
    if (index < 0 || index >= steps.length) return;
    hoveredIndex = index;
    render();
    var step = steps[index];
    renderTooltip(step);
    tooltipEl.classList.add('visible');
    var rect = getPointRect(index);
    var px = typeof clientX === 'number' ? clientX : rect.x + rect.w / 2;
    var py = typeof clientY === 'number' ? clientY : rect.y + rect.h / 2;
    setTooltipPosition(px, py);
    if (!fromPointer && autoMode) {
      autoCursorEl.classList.add('visible');
    }
  }

  function hideTooltip() {
    hoveredIndex = -1;
    tooltipEl.classList.remove('visible');
    autoCursorEl.classList.remove('visible');
    render();
  }

  function pointIndexFromClient(clientX, clientY) {
    var localX = clientX - originX;
    var localY = clientY - originY;
    if (localX < 0 || localY < 0 || localX >= gridWidth || localY >= gridHeight) return -1;
    var col = Math.floor(localX / cellWidth);
    var row = Math.floor(localY / cellHeight);
    var index = row * cols + col;
    return index >= 0 && index < steps.length ? index : -1;
  }

  function onPointerMove(ev) {
    if (autoMode) return;
    var index = pointIndexFromClient(ev.clientX, ev.clientY);
    if (index < 0) {
      hideTooltip();
      return;
    }
    showTooltipForIndex(index, true, ev.clientX, ev.clientY);
  }

  function pickAutoTarget() {
    if (!steps.length) return null;
    return Math.floor(Math.random() * steps.length);
  }

  function centerForIndex(index) {
    var rect = getPointRect(index);
    return { x: rect.x + rect.w / 2, y: rect.y + rect.h / 2 };
  }

  function syncAutoTooltip() {
    if (!autoMode || !steps.length) return;
    var index = pointIndexFromClient(autoState.x, autoState.y);
    if (index < 0) index = clamp(autoTarget == null ? 0 : autoTarget, 0, steps.length - 1);
    autoState.currentIndex = index;
    autoCursorEl.style.left = autoState.x + 'px';
    autoCursorEl.style.top = autoState.y + 'px';
    showTooltipForIndex(index, false, autoState.x, autoState.y);
  }

  function animateAuto() {
    if (!autoMode) return;
    autoState.vx += (autoState.targetX - autoState.x) * 0.018;
    autoState.vy += (autoState.targetY - autoState.y) * 0.018;
    autoState.vx *= 0.86;
    autoState.vy *= 0.86;
    autoState.x += autoState.vx;
    autoState.y += autoState.vy;
    syncAutoTooltip();
    autoAnimationFrame = window.requestAnimationFrame(animateAuto);
  }

  function stopAuto() {
    autoMode = false;
    autoBtn.setAttribute('aria-pressed', 'false');
    autoBtn.textContent = 'Auto';
    if (autoTimer) {
      window.clearInterval(autoTimer);
      autoTimer = null;
    }
    if (autoAnimationFrame) {
      window.cancelAnimationFrame(autoAnimationFrame);
      autoAnimationFrame = null;
    }
    autoTarget = null;
    autoCursorEl.classList.remove('visible');
  }

  function tickAuto() {
    if (!steps.length) return;
    if (autoTarget == null || autoTarget >= steps.length) {
      autoTarget = pickAutoTarget();
    } else {
      var drift = Math.floor((Math.random() * 37) - 18);
      autoTarget = clamp(autoTarget + drift, 0, steps.length - 1);
      if (Math.random() < 0.18) autoTarget = pickAutoTarget();
    }
    var nextPoint = centerForIndex(autoTarget);
    autoState.targetX = nextPoint.x;
    autoState.targetY = nextPoint.y;
  }

  function startAuto() {
    if (autoTimer) window.clearInterval(autoTimer);
    autoMode = true;
    autoBtn.setAttribute('aria-pressed', 'true');
    autoBtn.textContent = 'Auto: on';
    autoTarget = pickAutoTarget();
    var startPoint = centerForIndex(autoTarget || 0);
    autoState.x = startPoint.x;
    autoState.y = startPoint.y;
    autoState.targetX = startPoint.x;
    autoState.targetY = startPoint.y;
    autoState.vx = 0;
    autoState.vy = 0;
    tickAuto();
    if (autoAnimationFrame) window.cancelAnimationFrame(autoAnimationFrame);
    autoAnimationFrame = window.requestAnimationFrame(animateAuto);
    autoTimer = window.setInterval(tickAuto, 1500);
  }

  function setDisplayMode(nextMode) {
    displayMode = nextMode;
    try {
      sessionStorage.setItem(MODE_STORAGE_KEY, nextMode);
    } catch (e) {}
    updateLegend();
    updateStatus();
    render();
    if (hoveredIndex >= 0 && hoveredIndex < steps.length) {
      if (autoMode) {
        syncAutoTooltip();
      } else {
        showTooltipForIndex(hoveredIndex, true);
      }
    }
  }

  function setRowCount(nextRows) {
    rowCount = nextRows;
    try {
      sessionStorage.setItem(ROWS_STORAGE_KEY, String(nextRows));
    } catch (e) {}
    computeLayout();
    updateStatus();
    render();
    if (hoveredIndex >= 0 && hoveredIndex < steps.length) {
      if (autoMode) {
        syncAutoTooltip();
      } else {
        showTooltipForIndex(hoveredIndex, true);
      }
    }
  }

  function toggleAuto() {
    if (autoMode) {
      stopAuto();
      hideTooltip();
    } else {
      startAuto();
    }
  }

  async function loadInitial() {
    try {
      hideErr();
      statusEl.textContent = 'Loading…';
      var res = await fetch(STORAGE_API, { cache: 'no-store' });
      var body = await res.json().catch(function () { return {}; });
      if (!res.ok || body.error) {
        throw new Error(body.error || ('HTTP ' + res.status));
      }
      var rows = Array.isArray(body.data) ? body.data : [];
      var normalized = rows.map(function (row, index) {
        return normalizeRow(row, index);
      });
      steps = sortAndTrim(normalized);
      updateStatus();
      render();
      if (autoMode) tickAuto();
    } catch (err) {
      showErr('Could not load step map: ' + (err.message || String(err)));
      statusEl.textContent = 'Load failed';
      render();
    }
  }

  function scheduleSync() {
    if (syncTimer) window.clearInterval(syncTimer);
    syncTimer = window.setInterval(loadInitial, 45000);
  }

  function initSocket() {
    reconnectSocket = io({ transports: ['websocket', 'polling'] });
    reconnectSocket.on('connect', function () {
      hideErr();
    });
    reconnectSocket.on('connect_error', function () {
      showErr('WebSocket unavailable; showing latest loaded data.');
    });
    reconnectSocket.on('step', function (msg) {
      var normalized = normalizeRow(msg, steps.length);
      if (!Number.isFinite(normalized._n)) return;
      mergeStep(normalized);
      updateStatus();
      render();
      if (autoMode) tickAuto();
    });
  }

  refreshBtn.addEventListener('click', loadInitial);
  autoBtn.addEventListener('click', toggleAuto);
  modeInputs.forEach(function (input) {
    input.addEventListener('change', function (event) {
      if (event.target.checked) setDisplayMode(event.target.value);
    });
  });
  rowInputs.forEach(function (input) {
    input.addEventListener('change', function (event) {
      if (event.target.checked) setRowCount(parseInt(event.target.value, 10));
    });
  });
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseleave', function () {
    if (!autoMode) hideTooltip();
  });

  applyStoredMode();
  applyStoredRows();
  resizeCanvas();
  updateLegend();
  loadInitial();
  scheduleSync();
  initSocket();
})();
</script>
</body>
</html>
