<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jamming bot — Constellation</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='tags_vis_shared.css') }}">
</head>
<body class="tags-vis-body">

<nav class="tags-vis-nav" aria-label="Subpages">
  <div>
    <span class="tags-vis-title">Constellation</span>
    <a href="/">← home</a>
    <a href="/tags/">2D cloud</a>
    <a href="/tags/3d/">3D cloud</a>
    <a href="/tags/vectorfield/">vector field</a>
    <a href="/tags/vectorfield-3d/">vector 3D</a>
    <a href="/tags/chaos-attractor/">chaos</a>
    <a href="/tags/phrases/">phrases</a>
    <a href="/tags/sentiment-vortex/">sentiment vortex</a>
  </div>
</nav>

<div class="tags-vis-toolbar">
  <button type="button" class="tags-vis-btn" id="btn-freeze">Freeze</button>
  <button type="button" class="tags-vis-btn" id="btn-export">Export PNG</button>
  <span class="tags-vis-status" id="tags-vis-status"></span>
</div>

<div id="api-error" class="tags-vis-banner" role="alert"></div>
<div class="tags-vis-scanlines" aria-hidden="true"></div>
<div class="tags-vis-canvas-host"><canvas id="vis"></canvas></div>
<p class="tags-vis-hint">Co-occurrence from live tag bursts · similarity edges from spaCy (when available) · glitch on links</p>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='tags_vis_controls.js') }}"></script>
<script>
(function () {
  var TAGS_API = '/api/tags/get/';
  var EMB_API = '/api/tags/embeddings/';
  var MAX_TAGS = 56;
  var MAX_DPR = 2;
  var CO_OCC_WEIGHT = 0.22;
  var LINK_LENGTH = Math.min(window.innerWidth, window.innerHeight) * 0.18;
  var frameDt = 1;
  var statusEl = document.getElementById('tags-vis-status');
  var banner = document.getElementById('api-error');
  var canvas = document.getElementById('vis');
  var ctx = canvas.getContext('2d');

  var nodes = [];
  var links = [];
  var nameToIndex = Object.create(null);
  var coOcc = Object.create(null);
  var embMode = 'none';
  var t0 = performance.now();
  var glitchPhase = 0;

  function showErr(msg) {
    banner.textContent = msg;
    banner.classList.add('visible');
  }
  function hideErr() {
    banner.classList.remove('visible');
  }

  function normTag(x) {
    if (typeof x === 'string') return x.trim().toLowerCase();
    if (x && typeof x.name === 'string') return String(x.name).trim().toLowerCase();
    return '';
  }

  function coOccKey(a, b) {
    return a < b ? a + '\t' + b : b + '\t' + a;
  }

  function ingestCoOccFromList(arr) {
    if (!arr || arr.length < 2) return;
    var names = [];
    for (var i = 0; i < arr.length; i++) {
      var n = normTag(arr[i]);
      if (n && nameToIndex[n] !== undefined) names.push(n);
    }
    for (var j = 0; j < names.length - 1; j++) {
      var k = coOccKey(names[j], names[j + 1]);
      coOcc[k] = Math.min(48, (coOcc[k] || 0) + 1);
    }
  }

  function resize() {
    var dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
    var w = window.innerWidth;
    var h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  function buildLinksFromEmb(emb) {
    if (!emb || !emb.links || !emb.words) return;
    var wlist = emb.words;
    for (var i = 0; i < emb.links.length; i++) {
      var L = emb.links[i];
      var na = normTag(wlist[L.i]);
      var nb = normTag(wlist[L.j]);
      if (nameToIndex[na] === undefined || nameToIndex[nb] === undefined) continue;
      if (na === nb) continue;
      links.push({
        i: nameToIndex[na],
        j: nameToIndex[nb],
        w: Math.max(0.08, L.sim || 0.4),
      });
    }
  }

  function mergeCoOccIntoLinks() {
    for (var key in coOcc) {
      if (!coOcc.hasOwnProperty(key)) continue;
      var parts = key.split('\t');
      if (parts.length !== 2) continue;
      var a = parts[0];
      var b = parts[1];
      if (nameToIndex[a] === undefined || nameToIndex[b] === undefined) continue;
      var w = CO_OCC_WEIGHT * Math.min(6, coOcc[key]);
      if (w < 0.05) continue;
      var ia = nameToIndex[a];
      var ib = nameToIndex[b];
      var found = false;
      for (var k = 0; k < links.length; k++) {
        if ((links[k].i === ia && links[k].j === ib) || (links[k].i === ib && links[k].j === ia)) {
          links[k].w += w;
          found = true;
          break;
        }
      }
      if (!found) links.push({ i: ia, j: ib, w: w });
    }
  }

  function spiralPos(i, n, cx, cy, R) {
    var ang = i * 2.4;
    var r = R * (0.25 + 0.65 * Math.sqrt((i + 1) / n));
    return { x: cx + r * Math.cos(ang), y: cy + r * Math.sin(ang) };
  }

  function loadFromTagsAndEmb(tagRows, emb) {
    nodes = [];
    links = [];
    nameToIndex = Object.create(null);
    var sorted = tagRows.map(function (r) {
      return { name: String(r.name || ''), count: Number(r.count) || 0 };
    }).filter(function (t) { return t.name.length > 0; });
    sorted.sort(function (a, b) { return b.count - a.count; });
    sorted = sorted.slice(0, MAX_TAGS);

    var cx = window.innerWidth * 0.5;
    var cy = window.innerHeight * 0.52;
    var R = Math.min(window.innerWidth, window.innerHeight) * 0.32;

    var wordTo2d = Object.create(null);
    if (emb && emb.ok && emb.words && emb.vectors2d && emb.words.length === emb.vectors2d.length) {
      embMode = emb.mode || 'vectors';
      for (var e = 0; e < emb.words.length; e++) {
        wordTo2d[normTag(emb.words[e])] = emb.vectors2d[e];
      }
    } else {
      embMode = emb && emb.mode === 'unavailable' ? 'co-occurrence only' : 'co-occurrence only';
    }

    for (var i = 0; i < sorted.length; i++) {
      var nm = normTag(sorted[i].name);
      var display = sorted[i].name;
      var count = sorted[i].count;
      nameToIndex[nm] = i;
      var vx = 0;
      var vy = 0;
      var x;
      var y;
      var v2 = wordTo2d[nm];
      if (v2 && v2.length >= 2) {
        x = cx + v2[0] * R * 1.8;
        y = cy + v2[1] * R * 1.8;
      } else {
        var sp = spiralPos(i, sorted.length, cx, cy, R);
        x = sp.x;
        y = sp.y;
      }
      var maxC = sorted[0].count || 1;
      var r = 2 + 5 * Math.sqrt(count / maxC);
      nodes.push({
        name: display,
        nm: nm,
        x: x,
        y: y,
        vx: vx,
        vy: vy,
        count: count,
        r: r,
        phase: Math.random() * Math.PI * 2,
      });
    }

    buildLinksFromEmb(emb);
    mergeCoOccIntoLinks();

    statusEl.textContent = nodes.length + ' stars · ' + links.length + ' links · ' + embMode;
  }

  function fetchEmb(names) {
    return fetch(EMB_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ words: names, max_words: MAX_TAGS, min_sim: 0.36, max_links: 200 }),
    })
      .then(function (r) { return r.json().then(function (b) { return { ok: r.ok, b: b }; }); })
      .then(function (res) {
        if (!res.ok) return { ok: false, mode: 'api', words: [], vectors2d: [], links: [] };
        return res.b;
      })
      .catch(function () {
        return { ok: false, mode: 'error', words: [], vectors2d: [], links: [] };
      });
  }

  function fetchTags() {
    return fetch(TAGS_API)
      .then(function (r) { return r.json().then(function (b) { return { ok: r.ok, b: b }; }); })
      .then(function (res) {
        if (!res.ok || (res.b && res.b.error)) {
          showErr('Tags API: ' + (res.b && res.b.error ? res.b.error : 'failed'));
          return;
        }
        hideErr();
        if (!Array.isArray(res.b)) {
          showErr('Tags API: expected array');
          return;
        }
        var names = res.b.map(function (row) { return String(row.name || ''); }).filter(Boolean);
        return fetchEmb(names).then(function (emb) {
          loadFromTagsAndEmb(res.b, emb);
        });
      })
      .catch(function (e) {
        console.error(e);
        showErr('Network: ' + (e.message || String(e)));
      });
  }

  TagsVisControls.wire({
    canvas: canvas,
    onFreezeChange: function () {},
  });

  function forceStep() {
    if (TagsVisControls.frozen) return;
    var n = nodes.length;
    if (n === 0) return;
    var rep = 180 * frameDt;
    var damp = Math.pow(0.9, frameDt);
    for (var i = 0; i < n; i++) {
      nodes[i].fx = 0;
      nodes[i].fy = 0;
    }
    var cx = window.innerWidth * 0.5;
    var cy = window.innerHeight * 0.52;
    for (var a = 0; a < n; a++) {
      for (var b = a + 1; b < n; b++) {
        var dx = nodes[b].x - nodes[a].x;
        var dy = nodes[b].y - nodes[a].y;
        var d2 = dx * dx + dy * dy + 4;
        var f = rep / d2;
        var d = Math.sqrt(d2);
        nodes[a].fx -= (dx / d) * f;
        nodes[a].fy -= (dy / d) * f;
        nodes[b].fx += (dx / d) * f;
        nodes[b].fy += (dy / d) * f;
      }
      var gx = (cx - nodes[a].x) * 0.0018 * frameDt;
      var gy = (cy - nodes[a].y) * 0.0018 * frameDt;
      nodes[a].fx += gx;
      nodes[a].fy += gy;
    }
    for (var L = 0; L < links.length; L++) {
      var li = links[L].i;
      var lj = links[L].j;
      var w = links[L].w * 0.028 * frameDt;
      var ddx = nodes[lj].x - nodes[li].x;
      var ddy = nodes[lj].y - nodes[li].y;
      var dist = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
      var stretch = dist - LINK_LENGTH;
      var pull = stretch * w;
      nodes[li].fx += (ddx / dist) * pull;
      nodes[li].fy += (ddy / dist) * pull;
      nodes[lj].fx -= (ddx / dist) * pull;
      nodes[lj].fy -= (ddy / dist) * pull;
    }
    for (var k = 0; k < n; k++) {
      nodes[k].vx = (nodes[k].vx + nodes[k].fx) * damp;
      nodes[k].vy = (nodes[k].vy + nodes[k].fy) * damp;
      if (Math.abs(nodes[k].vx) < 0.001) nodes[k].vx = 0;
      if (Math.abs(nodes[k].vy) < 0.001) nodes[k].vy = 0;
      nodes[k].x += nodes[k].vx;
      nodes[k].y += nodes[k].vy;
    }
  }

  function draw() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    ctx.fillStyle = '#09090b';
    ctx.fillRect(0, 0, w, h);
    glitchPhase += 0.02;

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.16)';
    ctx.lineWidth = 1;
    for (var L = 0; L < links.length; L++) {
      var a = nodes[links[L].i];
      var b = nodes[links[L].j];
      if (!a || !b) continue;
      ctx.save();
      ctx.setLineDash([]);
      ctx.globalAlpha = 0.12 + 0.22 * Math.min(1, links[L].w);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      ctx.restore();
    }

    var t = (performance.now() - t0) / 1000;
    for (var i = 0; i < nodes.length; i++) {
      var nd = nodes[i];
      var tw = 0.82 + 0.18 * Math.sin(t * 0.6 + nd.phase);
      ctx.beginPath();
      ctx.fillStyle = 'rgba(255, 255, 255, ' + (0.7 + 0.18 * tw) + ')';
      ctx.arc(nd.x, nd.y, nd.r * (0.92 + 0.08 * tw), 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(244, 244, 245, 0.88)';
      ctx.font = '500 10px ui-monospace, monospace';
      ctx.fillText(nd.name.length > 14 ? nd.name.slice(0, 12) + '…' : nd.name, nd.x + nd.r + 2, nd.y + 3);
    }
  }

  function tick() {
    requestAnimationFrame(tick);
    if (document.visibilityState !== 'hidden') {
      frameDt = Math.min(1.35, Math.max(0.7, ((performance.now() - t0) / 16.6667)));
      t0 = performance.now();
      if (!TagsVisControls.frozen) forceStep();
      draw();
    }
  }

  var socket = io({ transports: ['websocket', 'polling'] });
  socket.on('analyzed', function (data) {
    if (data && data.tags) ingestCoOccFromList(data.tags);
    if (data && data.semantic_words) ingestCoOccFromList(data.semantic_words);
    fetchTags();
  });
  socket.on('tags_updated', function (data) {
    if (data && data.tags) ingestCoOccFromList(data.tags);
    if (data && data.semantic_words) ingestCoOccFromList(data.semantic_words);
    fetchTags();
  });

  tick();
  fetchTags();
})();
</script>
</body>
</html>
