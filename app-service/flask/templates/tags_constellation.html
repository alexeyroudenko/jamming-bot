<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jamming bot — Constellation</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='tags_vis_shared.css') }}">
</head>
<body class="tags-vis-body">

<nav class="tags-vis-nav" aria-label="Subpages">
  <div>
    <span class="tags-vis-title">Constellation</span>
    <a href="/">← home</a>
    <a href="/tags/">2D cloud</a>
    <a href="/tags/3d/">3D cloud</a>
    <a href="/tags/vectorfield/">vector field</a>
    <a href="/tags/vectorfield-3d/">vector 3D</a>
    <a href="/tags/chaos-attractor/">chaos</a>
    <a href="/tags/phrases/">phrases</a>
    <a href="/tags/sentiment-vortex/">sentiment vortex</a>
  </div>
</nav>

<div class="tags-vis-toolbar">
  <label class="tags-vis-density-label" for="constellation-count">Count</label>
  <input id="constellation-count" class="tags-vis-select" type="range" min="0" max="56" step="1" value="56" aria-label="Count">
  <span class="tags-vis-status" id="constellation-count-value">56</span>
  <label class="tags-vis-density-label" for="constellation-spring-length">Spring length</label>
  <input id="constellation-spring-length" class="tags-vis-select" type="range" min="20" max="480" step="1" value="120" aria-label="Spring length">
  <span class="tags-vis-status" id="constellation-spring-length-value">120</span>
  <label class="tags-vis-density-label" for="constellation-notlinked-radius">NotLinkedRadius</label>
  <input id="constellation-notlinked-radius" class="tags-vis-select" type="range" min="0" max="480" step="1" value="140" aria-label="Not linked radius">
  <span class="tags-vis-status" id="constellation-notlinked-radius-value">140</span>
  <label class="tags-vis-density-label" for="constellation-max-speed">MaxSpeed</label>
  <input id="constellation-max-speed" class="tags-vis-select" type="range" min="0" max="12" step="0.1" value="2" aria-label="Max speed">
  <span class="tags-vis-status" id="constellation-max-speed-value">2.0</span>
  <label class="tags-vis-density-label" for="constellation-auto-add">AUTO_ADD</label>
  <input id="constellation-auto-add" type="checkbox" aria-label="Auto add loaded tags" checked>
  <button type="button" class="tags-vis-btn" id="btn-anchor-vectors" aria-pressed="false" title="Show anchor direction vectors from embeddings">Anchor vectors</button>
  <button type="button" class="tags-vis-btn" id="btn-load-next" title="Load next tag page">Load next</button>
  <button type="button" class="tags-vis-btn" id="btn-freeze">Freeze</button>
  <button type="button" class="tags-vis-btn" id="btn-export">Export PNG</button>
  <span class="tags-vis-status" id="tags-vis-status"></span>
</div>

<div id="api-error" class="tags-vis-banner" role="alert"></div>
<div class="tags-vis-scanlines" aria-hidden="true"></div>
<div id="info" class="tags-vis-banner" aria-live="polite"></div>
<div class="tags-vis-canvas-host"><canvas id="vis"></canvas></div>
<p class="tags-vis-hint">Co-occurrence from live tag bursts · similarity edges from spaCy (when available) · red vectors show anchor directions</p>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='tags_vis_controls.js') }}"></script>
<script>
(function () {
  var TAGS_API = '/api/tags/get/';
  var EMB_API = '/api/tags/embeddings/';
  var DEFAULT_VISIBLE_COUNT = 56;
  var PAGE_SIZE = 50;
  var MAX_DPR = 2;
  var LINK_LENGTH = Math.min(window.innerWidth, window.innerHeight) * 0.18;
  var VIEW_SCALE_MIN = 0.35;
  var VIEW_SCALE_MAX = 4;
  var frameDt = 1;
  var statusEl = document.getElementById('tags-vis-status');
  var banner = document.getElementById('api-error');
  var canvas = document.getElementById('vis');
  var ctx = canvas.getContext('2d');
  var countSel = document.getElementById('constellation-count');
  var countValueEl = document.getElementById('constellation-count-value');
  var springLengthSel = document.getElementById('constellation-spring-length');
  var springLengthValueEl = document.getElementById('constellation-spring-length-value');
  var notLinkedRadiusSel = document.getElementById('constellation-notlinked-radius');
  var notLinkedRadiusValueEl = document.getElementById('constellation-notlinked-radius-value');
  var maxSpeedSel = document.getElementById('constellation-max-speed');
  var maxSpeedValueEl = document.getElementById('constellation-max-speed-value');
  var autoAddEl = document.getElementById('constellation-auto-add');
  var anchorVectorsBtn = document.getElementById('btn-anchor-vectors');
  var loadNextBtn = document.getElementById('btn-load-next');

  var nodes = [];
  var links = [];
  var nameToIndex = Object.create(null);
  var embMode = 'none';
  var t0 = performance.now();
  var glitchPhase = 0;
  var viewScale = 2;
  var viewOffsetX = 0;
  var viewOffsetY = 0;
  var visibleCount = DEFAULT_VISIBLE_COUNT;
  var springLength = Math.round(LINK_LENGTH);
  var notLinkedRadius = 140;
  var maxSpeed = 2;
  var autoAdd = true;
  var showAnchorVectors = false;
  var lastTagRows = [];
  var lastEmb = null;
  var dragNodeIndex = -1;
  var loadedPage = -1;
  var isLoadingTags = false;
  var hasMorePages = true;

  function showErr(msg) {
    banner.textContent = msg;
    banner.classList.add('visible');
  }
  function hideErr() {
    banner.classList.remove('visible');
  }

  function bumpActivity() {}

  function setInfo(text) {
    var infoEl = document.getElementById('info');
    if (!infoEl) return;
    if (text) {
      infoEl.textContent = text;
      infoEl.classList.add('visible');
    } else {
      infoEl.classList.remove('visible');
    }
  }

  function syncCountUi(total) {
    var maxCount = Math.max(0, total || 0);
    if (countSel) countSel.max = String(maxCount);
    visibleCount = Math.max(0, Math.min(maxCount, visibleCount));
    if (countSel) countSel.value = String(visibleCount);
    if (countValueEl) countValueEl.textContent = String(visibleCount);
  }

  function syncSpringLengthUi() {
    if (springLengthSel) springLengthSel.value = String(springLength);
    if (springLengthValueEl) springLengthValueEl.textContent = String(springLength);
  }

  function syncNotLinkedRadiusUi() {
    if (notLinkedRadiusSel) notLinkedRadiusSel.value = String(notLinkedRadius);
    if (notLinkedRadiusValueEl) notLinkedRadiusValueEl.textContent = String(notLinkedRadius);
  }

  function syncMaxSpeedUi() {
    if (maxSpeedSel) maxSpeedSel.value = String(maxSpeed);
    if (maxSpeedValueEl) maxSpeedValueEl.textContent = maxSpeed.toFixed(1);
  }

  function syncAutoAddUi() {
    if (autoAddEl) autoAddEl.checked = !!autoAdd;
  }

  function setAnchorVectorsVisible(on) {
    showAnchorVectors = !!on;
    if (anchorVectorsBtn) {
      anchorVectorsBtn.setAttribute('aria-pressed', showAnchorVectors ? 'true' : 'false');
      anchorVectorsBtn.classList.toggle('is-active', showAnchorVectors);
    }
    try {
      sessionStorage.setItem('tags-constellation-anchor-vectors', showAnchorVectors ? '1' : '0');
    } catch (e) {}
  }

  function syncLoadNextUi() {
    if (!loadNextBtn) return;
    loadNextBtn.disabled = isLoadingTags || !hasMorePages;
    loadNextBtn.textContent = isLoadingTags ? 'Loading...' : 'Load next';
  }

  function loadPrefs() {
    try {
      var savedCount = parseInt(sessionStorage.getItem('tags-constellation-count') || '', 10);
      if (Number.isFinite(savedCount)) visibleCount = Math.max(0, savedCount);
      var savedSpring = parseInt(sessionStorage.getItem('tags-constellation-spring-length') || '', 10);
      if (Number.isFinite(savedSpring)) springLength = Math.max(20, Math.min(480, savedSpring));
      var savedRadius = parseInt(sessionStorage.getItem('tags-constellation-notlinked-radius') || '', 10);
      if (Number.isFinite(savedRadius)) notLinkedRadius = Math.max(0, Math.min(480, savedRadius));
      var savedMaxSpeed = parseFloat(sessionStorage.getItem('tags-constellation-max-speed') || '');
      if (Number.isFinite(savedMaxSpeed)) maxSpeed = Math.max(0, Math.min(12, savedMaxSpeed));
      var savedAutoAdd = sessionStorage.getItem('tags-constellation-auto-add');
      if (savedAutoAdd !== null) autoAdd = savedAutoAdd === '1';
      showAnchorVectors = sessionStorage.getItem('tags-constellation-anchor-vectors') === '1';
    } catch (e) {}
  }

  function normTag(x) {
    if (typeof x === 'string') return x.trim().toLowerCase();
    if (x && typeof x.name === 'string') return String(x.name).trim().toLowerCase();
    return '';
  }

  function resize() {
    var dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
    var w = window.innerWidth;
    var h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    viewOffsetX = w * 0.5 * (1 - viewScale);
    viewOffsetY = h * 0.52 * (1 - viewScale);
  }
  window.addEventListener('resize', resize);
  resize();

  function buildLinksFromEmb(emb) {
    if (!emb || !emb.links || !emb.words) return;
    var wlist = emb.words;
    for (var i = 0; i < emb.links.length; i++) {
      var L = emb.links[i];
      var na = normTag(wlist[L.i]);
      var nb = normTag(wlist[L.j]);
      if (nameToIndex[na] === undefined || nameToIndex[nb] === undefined) continue;
      if (na === nb) continue;
      links.push({
        i: nameToIndex[na],
        j: nameToIndex[nb],
        w: Math.max(0.08, L.sim || 0.4),
      });
    }
  }

  function spiralPos(i, n, cx, cy, R) {
    var ang = i * 2.4;
    var r = R * (0.25 + 0.65 * Math.sqrt((i + 1) / n));
    return { x: cx + r * Math.cos(ang), y: cy + r * Math.sin(ang) };
  }

  function loadFromTagsAndEmb(tagRows, emb) {
    lastTagRows = Array.isArray(tagRows) ? tagRows : [];
    lastEmb = emb || null;
    var prevByName = Object.create(null);
    for (var pi = 0; pi < nodes.length; pi++) {
      prevByName[nodes[pi].nm] = {
        x: nodes[pi].x,
        y: nodes[pi].y,
        vx: nodes[pi].vx,
        vy: nodes[pi].vy,
        phase: nodes[pi].phase,
      };
    }
    nodes = [];
    links = [];
    nameToIndex = Object.create(null);
    var sorted = tagRows.map(function (r) {
      return { name: String(r.name || ''), count: Number(r.count) || 0 };
    }).filter(function (t) { return t.name.length > 0; });
    sorted.sort(function (a, b) { return b.count - a.count; });
    syncCountUi(sorted.length);
    sorted = sorted.slice(0, visibleCount);

    var cx = window.innerWidth * 0.5;
    var cy = window.innerHeight * 0.52;
    var R = Math.min(window.innerWidth, window.innerHeight) * 0.32;

    var wordTo2d = Object.create(null);
    var wordTo3d = Object.create(null);
    var wordToDir2d = Object.create(null);
    if (emb && emb.ok && emb.words && emb.vectors2d && emb.words.length === emb.vectors2d.length) {
      embMode = emb.mode || 'vectors';
      for (var e = 0; e < emb.words.length; e++) {
        wordTo2d[normTag(emb.words[e])] = emb.vectors2d[e];
        if (emb.vectors3d && emb.vectors3d.length === emb.words.length) {
          wordTo3d[normTag(emb.words[e])] = emb.vectors3d[e];
        }
        if (emb.directions2d && emb.directions2d.length === emb.words.length) {
          wordToDir2d[normTag(emb.words[e])] = emb.directions2d[e];
        }
      }
    } else {
      embMode = emb && emb.mode === 'unavailable' ? 'positions only' : 'positions only';
    }

    for (var i = 0; i < sorted.length; i++) {
      var nm = normTag(sorted[i].name);
      var display = sorted[i].name;
      var count = sorted[i].count;
      nameToIndex[nm] = i;
      var prev = prevByName[nm] || null;
      var vx = prev ? prev.vx : 0;
      var vy = prev ? prev.vy : 0;
      var x;
      var y;
      if (prev) {
        x = prev.x;
        y = prev.y;
      } else {
        var ang = Math.random() * Math.PI * 2;
        x = cx + Math.cos(ang) * notLinkedRadius;
        y = cy + Math.sin(ang) * notLinkedRadius;
      }
      var maxC = sorted[0].count || 1;
      var r = 2 + 5 * Math.sqrt(count / maxC);
      nodes.push({
        name: display,
        nm: nm,
        vector3d: wordTo3d[nm] || null,
        direction2d: wordToDir2d[nm] || null,
        x: x,
        y: y,
        vx: vx,
        vy: vy,
        count: count,
        r: r,
        phase: prev ? prev.phase : Math.random() * Math.PI * 2,
      });
    }

    buildLinksFromEmb(emb);

    statusEl.textContent = nodes.length + ' stars · ' + links.length + ' links · ' + embMode;
  }

  function rebuildFromCache() {
    if (!lastTagRows || !lastTagRows.length) return;
    loadFromTagsAndEmb(lastTagRows, lastEmb);
  }

  function worldToScreen(x, y) {
    return {
      x: x * viewScale + viewOffsetX,
      y: y * viewScale + viewOffsetY,
    };
  }

  function screenToWorld(x, y) {
    return {
      x: (x - viewOffsetX) / viewScale,
      y: (y - viewOffsetY) / viewScale,
    };
  }

  function findNodeAtScreen(sx, sy) {
    var p = screenToWorld(sx, sy);
    var best = null;
    var bestD2 = Infinity;
    for (var i = 0; i < nodes.length; i++) {
      var dx = p.x - nodes[i].x;
      var dy = p.y - nodes[i].y;
      var hitR = Math.max(8, nodes[i].r + 6) / viewScale;
      var d2 = dx * dx + dy * dy;
      if (d2 <= hitR * hitR && d2 < bestD2) {
        best = nodes[i];
        bestD2 = d2;
      }
    }
    return best;
  }

  function onPointerMove(ev) {
    if (dragNodeIndex >= 0 && dragNodeIndex < nodes.length) {
      bumpActivity();
      var rectDrag = canvas.getBoundingClientRect();
      var dragPos = screenToWorld(ev.clientX - rectDrag.left, ev.clientY - rectDrag.top);
      nodes[dragNodeIndex].x = dragPos.x;
      nodes[dragNodeIndex].y = dragPos.y;
      nodes[dragNodeIndex].vx = 0;
      nodes[dragNodeIndex].vy = 0;
      var dragNode = nodes[dragNodeIndex];
      setInfo(
        dragNode.name +
        ' · count ' + dragNode.count +
        (dragNode.vector3d ? ' · v3d [' + dragNode.vector3d.map(function (v) { return Number(v).toFixed(2); }).join(', ') + ']' : '')
      );
      return;
    }
    var rect = canvas.getBoundingClientRect();
    var hit = findNodeAtScreen(ev.clientX - rect.left, ev.clientY - rect.top);
    if (hit) {
      setInfo(
        hit.name +
        ' · count ' + hit.count +
        (hit.vector3d ? ' · v3d [' + hit.vector3d.map(function (v) { return Number(v).toFixed(2); }).join(', ') + ']' : '')
      );
    }
    else setInfo('');
  }

  function onClick(ev) {
    bumpActivity();
    var rect = canvas.getBoundingClientRect();
    var hit = findNodeAtScreen(ev.clientX - rect.left, ev.clientY - rect.top);
    if (hit) {
      setInfo(
        hit.name +
        ' · count ' + hit.count +
        (hit.vector3d ? ' · v3d [' + hit.vector3d.map(function (v) { return Number(v).toFixed(2); }).join(', ') + ']' : '')
      );
    }
  }

  function onWheel(ev) {
    bumpActivity();
    ev.preventDefault();
    var rect = canvas.getBoundingClientRect();
    var sx = ev.clientX - rect.left;
    var sy = ev.clientY - rect.top;
    var before = screenToWorld(sx, sy);
    var zoom = ev.deltaY < 0 ? 1.12 : 1 / 1.12;
    var nextScale = Math.max(VIEW_SCALE_MIN, Math.min(VIEW_SCALE_MAX, viewScale * zoom));
    if (Math.abs(nextScale - viewScale) < 1e-6) return;
    viewScale = nextScale;
    viewOffsetX = sx - before.x * viewScale;
    viewOffsetY = sy - before.y * viewScale;
  }

  function onPointerDown(ev) {
    bumpActivity();
    var rect = canvas.getBoundingClientRect();
    var hit = findNodeAtScreen(ev.clientX - rect.left, ev.clientY - rect.top);
    dragNodeIndex = hit ? nodes.indexOf(hit) : -1;
    if (dragNodeIndex >= 0) {
      canvas.style.cursor = 'grabbing';
      setInfo(nodes[dragNodeIndex].name + ' · count ' + nodes[dragNodeIndex].count);
    }
  }

  function onPointerUp() {
    dragNodeIndex = -1;
    canvas.style.cursor = '';
  }

  function fetchEmb(names) {
    return fetch(EMB_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ words: names, max_words: Math.max(names.length, DEFAULT_VISIBLE_COUNT), min_sim: 0.36, max_links: 200 }),
    })
      .then(function (r) { return r.json().then(function (b) { return { ok: r.ok, b: b }; }); })
      .then(function (res) {
        if (!res.ok) return { ok: false, mode: 'api', words: [], vectors2d: [], links: [] };
        return res.b;
      })
      .catch(function () {
        return { ok: false, mode: 'error', words: [], vectors2d: [], links: [] };
      });
  }

  function mergeEmbData(baseEmb, extraEmb) {
    if (!baseEmb || !baseEmb.words || !baseEmb.words.length) return extraEmb || null;
    if (!extraEmb || !extraEmb.words || !extraEmb.words.length) return baseEmb;
    var offset = baseEmb.words.length;
    var merged = {
      ok: !!(baseEmb.ok || extraEmb.ok),
      mode: extraEmb.mode || baseEmb.mode || 'vectors',
      words: baseEmb.words.slice(),
      vectors2d: (baseEmb.vectors2d || []).slice(),
      vectors3d: (baseEmb.vectors3d || []).slice(),
      vectors2d_current: (baseEmb.vectors2d_current || baseEmb.vectors2d || []).slice(),
      vectors3d_current: (baseEmb.vectors3d_current || baseEmb.vectors3d || []).slice(),
      vectors2d_alt: (baseEmb.vectors2d_alt || []).slice(),
      vectors3d_alt: (baseEmb.vectors3d_alt || []).slice(),
      directions2d: (baseEmb.directions2d || []).slice(),
      directions3d: (baseEmb.directions3d || []).slice(),
      links: (baseEmb.links || []).slice(),
    };
    Array.prototype.push.apply(merged.words, extraEmb.words || []);
    Array.prototype.push.apply(merged.vectors2d, extraEmb.vectors2d || []);
    Array.prototype.push.apply(merged.vectors3d, extraEmb.vectors3d || []);
    Array.prototype.push.apply(merged.vectors2d_current, extraEmb.vectors2d_current || extraEmb.vectors2d || []);
    Array.prototype.push.apply(merged.vectors3d_current, extraEmb.vectors3d_current || extraEmb.vectors3d || []);
    Array.prototype.push.apply(merged.vectors2d_alt, extraEmb.vectors2d_alt || []);
    Array.prototype.push.apply(merged.vectors3d_alt, extraEmb.vectors3d_alt || []);
    Array.prototype.push.apply(merged.directions2d, extraEmb.directions2d || []);
    Array.prototype.push.apply(merged.directions3d, extraEmb.directions3d || []);
    var extraLinks = extraEmb.links || [];
    for (var i = 0; i < extraLinks.length; i++) {
      merged.links.push({
        i: offset + extraLinks[i].i,
        j: offset + extraLinks[i].j,
        sim: extraLinks[i].sim,
      });
    }
    return merged;
  }

  function getMissingEmbWords(tagRows) {
    var have = Object.create(null);
    if (lastEmb && Array.isArray(lastEmb.words)) {
      for (var i = 0; i < lastEmb.words.length; i++) {
        have[normTag(lastEmb.words[i])] = true;
      }
    }
    var missing = [];
    for (var j = 0; j < tagRows.length; j++) {
      var name = String(tagRows[j] && tagRows[j].name || '');
      var key = normTag(name);
      if (!key || have[key]) continue;
      have[key] = true;
      missing.push(name);
    }
    return missing;
  }

  function ensureEmbeddingsFor(tagRows) {
    var rows = Array.isArray(tagRows) ? tagRows.slice() : [];
    if (!rows.length) {
      lastEmb = null;
      return Promise.resolve(null);
    }
    var missingNames = getMissingEmbWords(rows);
    if (!missingNames.length && lastEmb) return Promise.resolve(lastEmb);
    return fetchEmb(missingNames).then(function (extraEmb) {
      if (!lastEmb || !lastEmb.words || !lastEmb.words.length) {
        lastEmb = extraEmb;
      } else {
        lastEmb = mergeEmbData(lastEmb, extraEmb);
      }
      return lastEmb;
    });
  }

  function mergeTagPages(pages) {
    var byName = Object.create(null);
    for (var i = 0; i < pages.length; i++) {
      var row = pages[i];
      var name = String(row && row.name || '');
      if (!name) continue;
      byName[name] = {
        name: name,
        count: Number(row.count) || 0,
      };
    }
    return Object.keys(byName).map(function (name) { return byName[name]; });
  }

  function fetchTagPage(page) {
    return fetch(TAGS_API + '?count=' + PAGE_SIZE + '&page=' + page)
      .then(function (r) { return r.json().then(function (b) { return { ok: r.ok, b: b }; }); })
      .then(function (res) {
        if (!res.ok || (res.b && res.b.error)) {
          showErr('Tags API: ' + (res.b && res.b.error ? res.b.error : 'failed'));
          return null;
        }
        hideErr();
        if (!Array.isArray(res.b)) {
          showErr('Tags API: expected array');
          return null;
        }
        return res.b;
      });
  }

  function applyTagRows(tagRows) {
    lastTagRows = Array.isArray(tagRows) ? tagRows.slice() : [];
    if (!lastTagRows.length) {
      lastEmb = null;
      loadFromTagsAndEmb([], null);
      return Promise.resolve();
    }
    return ensureEmbeddingsFor(lastTagRows).then(function (emb) {
      loadFromTagsAndEmb(lastTagRows, emb);
    });
  }

  function refreshLoadedPages() {
    isLoadingTags = true;
    syncLoadNextUi();
    var reqs = [];
    var targetPage = Math.max(0, loadedPage);
    for (var page = 0; page <= targetPage; page++) {
      reqs.push(fetchTagPage(page));
    }
    return Promise.all(reqs)
      .then(function (pages) {
        var rows = [];
        for (var i = 0; i < pages.length; i++) {
          if (Array.isArray(pages[i])) rows = rows.concat(pages[i]);
        }
        rows = mergeTagPages(rows);
        return applyTagRows(rows);
      })
      .catch(function (e) {
        console.error(e);
        showErr('Network: ' + (e.message || String(e)));
      })
      .finally(function () {
        isLoadingTags = false;
        syncLoadNextUi();
      });
  }

  function fetchTags() {
    return refreshLoadedPages();
  }

  function loadNextPage() {
    if (isLoadingTags || !hasMorePages) return Promise.resolve();
    isLoadingTags = true;
    syncLoadNextUi();
    var nextPage = Math.max(0, loadedPage) + 1;
    return fetchTagPage(nextPage)
      .then(function (rows) {
        if (!Array.isArray(rows) || !rows.length) {
          hasMorePages = false;
          return;
        }
        hasMorePages = true;
        var mergedRows = mergeTagPages(lastTagRows.concat(rows));
        if (autoAdd) {
          visibleCount = mergedRows.length;
          try {
            sessionStorage.setItem('tags-constellation-count', String(visibleCount));
          } catch (e) {}
        }
        loadedPage = nextPage;
        return applyTagRows(mergedRows);
      })
      .catch(function (e) {
        console.error(e);
        showErr('Network: ' + (e.message || String(e)));
      })
      .finally(function () {
        isLoadingTags = false;
        syncLoadNextUi();
      });
  }

  loadPrefs();
  TagsVisControls.wire({
    canvas: canvas,
    onFreezeChange: function () {},
  });
  syncSpringLengthUi();
  syncNotLinkedRadiusUi();
  syncMaxSpeedUi();
  syncAutoAddUi();
  setAnchorVectorsVisible(showAnchorVectors);
  if (countSel) {
    countSel.addEventListener('input', function () {
      visibleCount = Math.max(0, parseInt(countSel.value || '0', 10) || 0);
      syncCountUi(lastTagRows.length);
      try {
        sessionStorage.setItem('tags-constellation-count', String(visibleCount));
      } catch (e) {}
      rebuildFromCache();
    });
  }
  if (springLengthSel) {
    springLengthSel.addEventListener('input', function () {
      springLength = Math.max(20, Math.min(480, parseInt(springLengthSel.value || '120', 10) || 120));
      syncSpringLengthUi();
      try {
        sessionStorage.setItem('tags-constellation-spring-length', String(springLength));
      } catch (e) {}
    });
  }
  if (notLinkedRadiusSel) {
    notLinkedRadiusSel.addEventListener('input', function () {
      notLinkedRadius = Math.max(0, Math.min(480, parseInt(notLinkedRadiusSel.value || '140', 10) || 140));
      syncNotLinkedRadiusUi();
      try {
        sessionStorage.setItem('tags-constellation-notlinked-radius', String(notLinkedRadius));
      } catch (e) {}
    });
  }
  if (maxSpeedSel) {
    maxSpeedSel.addEventListener('input', function () {
      maxSpeed = Math.max(0, Math.min(12, parseFloat(maxSpeedSel.value || '2') || 2));
      syncMaxSpeedUi();
      try {
        sessionStorage.setItem('tags-constellation-max-speed', String(maxSpeed));
      } catch (e) {}
    });
  }
  if (anchorVectorsBtn) {
    anchorVectorsBtn.addEventListener('click', function () {
      setAnchorVectorsVisible(!showAnchorVectors);
    });
  }
  if (autoAddEl) {
    autoAddEl.addEventListener('change', function () {
      autoAdd = !!autoAddEl.checked;
      syncAutoAddUi();
      try {
        sessionStorage.setItem('tags-constellation-auto-add', autoAdd ? '1' : '0');
      } catch (e) {}
    });
  }
  if (loadNextBtn) {
    loadNextBtn.addEventListener('click', function () {
      loadNextPage();
    });
  }
  syncLoadNextUi();
  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('click', onClick);
  canvas.addEventListener('wheel', onWheel, { passive: false });
  window.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('touchstart', bumpActivity, { passive: true });
  canvas.addEventListener('touchmove', function (e) {
    if (e.touches.length !== 1) return;
    var t = e.touches[0];
    onPointerMove({ clientX: t.clientX, clientY: t.clientY });
  }, { passive: true });

  function forceStep() {
    if (TagsVisControls.frozen) return;
    var n = nodes.length;
    if (n === 0) return;
    var rep = 180 * frameDt;
    var damp = Math.pow(0.9, frameDt);
    var degree = new Array(n);
    for (var di = 0; di < n; di++) degree[di] = 0;
    for (var i = 0; i < n; i++) {
      nodes[i].fx = 0;
      nodes[i].fy = 0;
    }
    var cx = window.innerWidth * 0.5;
    var cy = window.innerHeight * 0.52;
    for (var a = 0; a < n; a++) {
      for (var b = a + 1; b < n; b++) {
        var dx = nodes[b].x - nodes[a].x;
        var dy = nodes[b].y - nodes[a].y;
        var d2 = dx * dx + dy * dy + 4;
        var f = rep / d2;
        var d = Math.sqrt(d2);
        nodes[a].fx -= (dx / d) * f;
        nodes[a].fy -= (dy / d) * f;
        nodes[b].fx += (dx / d) * f;
        nodes[b].fy += (dy / d) * f;
      }
      var gx = (cx - nodes[a].x) * 0.0018 * frameDt;
      var gy = (cy - nodes[a].y) * 0.0018 * frameDt;
      nodes[a].fx += gx;
      nodes[a].fy += gy;
    }
    for (var L = 0; L < links.length; L++) {
      var li = links[L].i;
      var lj = links[L].j;
      degree[li] += 1;
      degree[lj] += 1;
      var w = links[L].w * 0.028 * frameDt;
      var ddx = nodes[lj].x - nodes[li].x;
      var ddy = nodes[lj].y - nodes[li].y;
      var dist = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
      var stretch = dist - springLength;
      var pull = stretch * w;
      nodes[li].fx += (ddx / dist) * pull;
      nodes[li].fy += (ddy / dist) * pull;
      nodes[lj].fx -= (ddx / dist) * pull;
      nodes[lj].fy -= (ddy / dist) * pull;
    }
    for (var ui = 0; ui < n; ui++) {
      if (degree[ui] !== 0) continue;
      var rx = nodes[ui].x - cx;
      var ry = nodes[ui].y - cy;
      var rr = Math.sqrt(rx * rx + ry * ry);
      if (rr < 1e-6) {
        rx = Math.cos(nodes[ui].phase || 0);
        ry = Math.sin(nodes[ui].phase || 0);
        rr = 1;
      }
      var ux = rx / rr;
      var uy = ry / rr;
      var tx = cx + ux * notLinkedRadius;
      var ty = cy + uy * notLinkedRadius;
      nodes[ui].fx += (tx - nodes[ui].x) * 0.012 * frameDt;
      nodes[ui].fy += (ty - nodes[ui].y) * 0.012 * frameDt;
    }
    for (var k = 0; k < n; k++) {
      nodes[k].vx = (nodes[k].vx + nodes[k].fx) * damp;
      nodes[k].vy = (nodes[k].vy + nodes[k].fy) * damp;
      var speed = Math.sqrt(nodes[k].vx * nodes[k].vx + nodes[k].vy * nodes[k].vy);
      if (speed > maxSpeed) {
        var s = maxSpeed / speed;
        nodes[k].vx *= s;
        nodes[k].vy *= s;
      }
      if (Math.abs(nodes[k].vx) < 0.001) nodes[k].vx = 0;
      if (Math.abs(nodes[k].vy) < 0.001) nodes[k].vy = 0;
      nodes[k].x += nodes[k].vx;
      nodes[k].y += nodes[k].vy;
    }
  }

  function draw() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    ctx.fillStyle = '#09090b';
    ctx.fillRect(0, 0, w, h);
    glitchPhase += 0.02;

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.16)';
    ctx.lineWidth = 1;
    for (var L = 0; L < links.length; L++) {
      var a = nodes[links[L].i];
      var b = nodes[links[L].j];
      if (!a || !b) continue;
      var ap = worldToScreen(a.x, a.y);
      var bp = worldToScreen(b.x, b.y);
      ctx.save();
      ctx.setLineDash([]);
      ctx.globalAlpha = 0.12 + 0.22 * Math.min(1, links[L].w);
      ctx.beginPath();
      ctx.moveTo(ap.x, ap.y);
      ctx.lineTo(bp.x, bp.y);
      ctx.stroke();
      ctx.restore();
    }

    var t = (performance.now() - t0) / 1000;
    for (var i = 0; i < nodes.length; i++) {
      var nd = nodes[i];
      var p = worldToScreen(nd.x, nd.y);
      var tw = 0.82 + 0.18 * Math.sin(t * 0.6 + nd.phase);
      var rr = Math.max(1.5, nd.r * viewScale) * (0.92 + 0.08 * tw);
      if (showAnchorVectors && nd.direction2d && nd.direction2d.length >= 2) {
        var dx = Number(nd.direction2d[0]) || 0;
        var dy = Number(nd.direction2d[1]) || 0;
        var dlen = Math.sqrt(dx * dx + dy * dy);
        if (dlen > 1e-6) {
          var ux = dx / dlen;
          var uy = dy / dlen;
          var vlen = Math.max(16, 18 * viewScale);
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(255, 90, 90, 0.9)';
          ctx.lineWidth = Math.max(1.5, 1.4 * viewScale);
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x + ux * vlen, p.y + uy * vlen);
          ctx.stroke();
        }
      }
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255, 255, 255, ' + (0.7 + 0.18 * tw) + ')';
      ctx.lineWidth = Math.max(1, 1.2 * viewScale);
      ctx.arc(p.x, p.y, rr, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(244, 244, 245, 0.88)';
      ctx.font = '500 ' + Math.max(5, 5 * viewScale) + 'px ui-monospace, monospace';
      ctx.fillText(
        nd.name.length > 14 ? nd.name.slice(0, 12) + '…' : nd.name,
        p.x + Math.max(2, rr) + 2,
        p.y + 3
      );
    }
  }

  function tick() {
    requestAnimationFrame(tick);
    if (document.visibilityState !== 'hidden') {
      frameDt = Math.min(1.35, Math.max(0.7, ((performance.now() - t0) / 16.6667)));
      t0 = performance.now();
      if (!TagsVisControls.frozen) forceStep();
      draw();
    }
  }

  var socket = io({ transports: ['websocket', 'polling'] });
  socket.on('analyzed', function (data) {
    fetchTags();
  });
  socket.on('tags_updated', function (data) {
    fetchTags();
  });

  tick();
  fetchTags();
})();
</script>
</body>
</html>
