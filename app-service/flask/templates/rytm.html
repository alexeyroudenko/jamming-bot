<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rytm — MIDI pads (Ch 1–12, Note 36)</title>
  <style>
    :root {
      --bg: #0f0f12;
      --pad: #2a2a32;
      --pad-active: #e85d04;
      --pad-glow: #ff8c42;
      --text: #e8e6e3;
      --muted: #8a8580;
      --frame: #1c1c22;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #1a1a22 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      padding: 1.25rem;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 0 0 0.35rem;
      color: var(--muted);
    }
    .sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.25rem;
      padding: 0.75rem 1rem;
      background: var(--frame);
      border-radius: 10px;
      border: 1px solid #2e2e36;
    }
    .toolbar label { font-size: 0.75rem; color: var(--muted); }
    select, button.init {
      background: #25252c;
      color: var(--text);
      border: 1px solid #3d3d48;
      border-radius: 8px;
      padding: 0.45rem 0.65rem;
      font-size: 0.85rem;
    }
    button.init {
      cursor: pointer;
      background: #3d3d48;
    }
    button.init:hover { background: #4a4a56; }
    #status {
      font-size: 0.8rem;
      flex: 1;
      min-width: 200px;
    }
    #status.ok { color: #7cb87c; }
    #status.err { color: #e07a7a; }
    .pads {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.65rem;
      max-width: 720px;
    }
    @media (max-width: 520px) {
      .pads { grid-template-columns: repeat(3, 1fr); }
    }
    .pad {
      aspect-ratio: 1;
      border: none;
      border-radius: 12px;
      background: linear-gradient(165deg, #383844 0%, var(--pad) 45%, #1e1e24 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 4px 0 #121218,
        0 6px 16px rgba(0,0,0,0.45);
      color: var(--text);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      user-select: none;
      touch-action: manipulation;
      transition: transform 0.04s ease, box-shadow 0.08s ease, background 0.08s ease;
    }
    .pad .ch { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.04em; }
    .pad .n { font-size: 1.35rem; font-weight: 700; }
    .pad:active, .pad.is-down {
      transform: translateY(2px);
      box-shadow:
        inset 0 2px 8px rgba(0,0,0,0.35),
        0 2px 0 #121218;
      background: linear-gradient(165deg, var(--pad-glow) 0%, var(--pad-active) 50%, #c2410c 100%);
    }
    .pad.is-down .ch { color: rgba(255,255,255,0.85); }
    footer {
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Rytm</h1>
  <p class="sub">12 пэдов → MIDI Note On / Off · нота <strong>36</strong> · каналы <strong>1–12</strong> (Web MIDI API)</p>

  <div class="toolbar">
    <button type="button" class="init" id="btnInit">Включить MIDI</button>
    <div>
      <label for="midiOut">Выход</label><br />
      <select id="midiOut" disabled></select>
    </div>
    <div id="status" class="err">Нажмите «Включить MIDI» и разрешите доступ в браузере.</div>
  </div>

  <div class="pads" id="pads"></div>

  <footer>
    Chrome / Edge: работает по HTTPS или на <code>localhost</code>. Если выходов нет — подключите виртуальный MIDI-порт
    (loopMIDI, IAC и т.д.) и обновите страницу.
  </footer>

  <script>
    (function () {
      const NOTE = 36;
      const NUM_PADS = 12;
      /** MIDI channel 1..16 → status lower nibble 0..15 */
      function noteOnStatus(channel) {
        return 0x90 + (channel - 1);
      }
      function sendNote(output, channel, velocity) {
        if (!output) return;
        output.send([noteOnStatus(channel), NOTE, velocity]);
      }

      let midiAccess = null;
      let selectedId = null;

      const padsEl = document.getElementById("pads");
      const midiSelect = document.getElementById("midiOut");
      const statusEl = document.getElementById("status");
      const btnInit = document.getElementById("btnInit");

      const down = new Set();

      function setStatus(text, ok) {
        statusEl.textContent = text;
        statusEl.className = ok ? "ok" : "err";
      }

      function fillOutputs() {
        midiSelect.innerHTML = "";
        if (!midiAccess) return;
        const outs = [...midiAccess.outputs.values()];
        if (!outs.length) {
          midiSelect.disabled = true;
          setStatus("Нет MIDI-выходов. Создайте виртуальный порт и перезагрузите страницу.", false);
          return;
        }
        outs.forEach(function (o) {
          const opt = document.createElement("option");
          opt.value = o.id;
          opt.textContent = o.name;
          midiSelect.appendChild(opt);
        });
        midiSelect.disabled = false;
        if (selectedId && midiAccess.outputs.get(selectedId)) {
          midiSelect.value = selectedId;
        } else {
          midiSelect.selectedIndex = 0;
          selectedId = midiSelect.value;
        }
        setStatus("Готово. Выход: " + midiSelect.options[midiSelect.selectedIndex].text, true);
      }

      function currentOutput() {
        if (!midiAccess) return null;
        const id = midiSelect.value || selectedId;
        return id ? midiAccess.outputs.get(id) : null;
      }

      function noteOnPad(index1) {
        const out = currentOutput();
        sendNote(out, index1, 127);
      }
      function noteOffPad(index1) {
        const out = currentOutput();
        sendNote(out, index1, 0);
      }

      function bindPad(el, channel) {
        const start = function (e) {
          if (e.button !== undefined && e.button !== 0) return;
          e.preventDefault();
          if (down.has(channel)) return;
          down.add(channel);
          el.classList.add("is-down");
          el.setAttribute("aria-pressed", "true");
          noteOnPad(channel);
        };
        const end = function () {
          if (!down.has(channel)) return;
          down.delete(channel);
          el.classList.remove("is-down");
          el.setAttribute("aria-pressed", "false");
          noteOffPad(channel);
        };
        el.addEventListener("pointerdown", start);
        el.addEventListener("pointerup", end);
        el.addEventListener("pointercancel", end);
        el.addEventListener("pointerleave", function (e) {
          if (e.pressure === 0) end();
        });
        el.addEventListener("lostpointercapture", end);
      }

      for (let ch = 1; ch <= NUM_PADS; ch++) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "pad";
        b.setAttribute("aria-pressed", "false");
        b.innerHTML = '<span class="ch">Ch ' + ch + "</span><span class=\"n\">36</span>";
        bindPad(b, ch);
        padsEl.appendChild(b);
      }

      midiSelect.addEventListener("change", function () {
        selectedId = midiSelect.value;
        setStatus("Выход: " + midiSelect.options[midiSelect.selectedIndex].text, true);
      });

      btnInit.addEventListener("click", function () {
        if (!navigator.requestMIDIAccess) {
          setStatus("Web MIDI не поддерживается этим браузером.", false);
          return;
        }
        navigator
          .requestMIDIAccess({ sysex: false })
          .then(function (access) {
            midiAccess = access;
            fillOutputs();
            midiAccess.onstatechange = function () {
              fillOutputs();
            };
            btnInit.disabled = true;
            btnInit.textContent = "MIDI активен";
          })
          .catch(function () {
            setStatus("Доступ к MIDI отклонён или недоступен.", false);
          });
      });
    })();
  </script>
</body>
</html>
