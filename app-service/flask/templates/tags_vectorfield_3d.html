<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jamming bot — Vector field 3D</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='tags_vis_shared.css') }}">
</head>
<body class="tags-vis-body">

<nav class="tags-vis-nav" aria-label="Subpages">
  <div>
    <span class="tags-vis-title">Vector field 3D</span>
    <a href="/">← home</a>
    <a href="/tags/">2D cloud</a>
    <a href="/tags/3d/">3D cloud</a>
    <a href="/tags/vectorfield/">vector field 2D</a>
    <a href="/tags/constellation/">constellation</a>
    <a href="/tags/chaos-attractor/">chaos</a>
    <a href="/tags/phrases/">phrases</a>
    <a href="/tags/sentiment-vortex/">sentiment vortex</a>
  </div>
</nav>

<div class="tags-vis-toolbar">
  <label class="tags-vis-density-label" for="vf3-density">Density</label>
  <select id="vf3-density" class="tags-vis-select" aria-label="Particle density">
    <option value="auto">Auto</option>
    <option value="low">Low</option>
    <option value="med">Med</option>
    <option value="high">High</option>
  </select>
  <button type="button" class="tags-vis-btn" id="btn-anchor-labels" aria-pressed="false" title="Show tag labels (projected; 3D view only — no drag)">Anchor labels</button>
  <button type="button" class="tags-vis-btn" id="btn-show-vectors" aria-pressed="false" title="Sample field direction on a coarse 3D grid">Field vectors</button>
  <button type="button" class="tags-vis-btn" id="btn-freeze">Freeze</button>
  <button type="button" class="tags-vis-btn" id="btn-export">Export PNG</button>
  <span class="tags-vis-status" id="tags-vis-status"></span>
</div>

<div id="api-error" class="tags-vis-banner" role="alert"></div>
<div class="tags-vis-scanlines" aria-hidden="true"></div>
<div class="tags-vis-canvas-host">
  <canvas id="vf3"></canvas>
  <div id="vf3-anchors-layer" class="vf-anchors-layer is-hidden" aria-hidden="true"></div>
</div>
<p class="tags-vis-hint">Drag to orbit · wheel zoom · white particles in 3D · Field vectors: cyan segments · labels are projected (read-only)</p>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='tags_vis_controls.js') }}"></script>
<script>
(function () {
  var TAGS_API = '/api/tags/get/';
  var EMB_API = '/api/tags/embeddings/';
  var MAX_PARTICLES_CAPACITY = 28000;
  var FLOW_SPEED = 0.05;
  var RELOAD_DEBOUNCE_MS = 550;
  /** Half-extent of simulation cube (world units). */
  var WORLD_HALF = 250;

  var effectiveParticles = MAX_PARTICLES_CAPACITY;
  var MAX_TAGS = 48;
  var MAX_DPR = 2;
  var animSlow = 1;
  var reduceMotionPreferred = false;

  var statusEl = document.getElementById('tags-vis-status');
  var banner = document.getElementById('api-error');
  var canvas = document.getElementById('vf3');
  var densitySel = document.getElementById('vf3-density');

  var renderer, scene, camera, controls, points, geom, posAttr;
  var anchors = [];
  var tAnim = 0;
  var positions, velocities;
  var reloadTimer = null;
  var anchorLayer = document.getElementById('vf3-anchors-layer');
  var showAnchorLabels = false;
  var showVectors = false;
  var vectorGeom = null;
  var vectorLines = null;
  var vectorPosArr = null;
  var GRID3_X = 6;
  var GRID3_Y = 5;
  var GRID3_Z = 5;
  var _projV = new THREE.Vector3();

  function getDensityPref() {
    if (densitySel && densitySel.value) return densitySel.value;
    try {
      return sessionStorage.getItem('tags-vectorfield-3d-density') || 'auto';
    } catch (e) {
      return 'auto';
    }
  }

  function computeTier() {
    var reduceMotion = false;
    try {
      reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    } catch (e) {}
    var pref = getDensityPref();
    var cores = typeof navigator.hardwareConcurrency === 'number' ? navigator.hardwareConcurrency : 4;
    var narrow = window.innerWidth < 640;
    var particlesHi = 28000;
    var particlesMed = 16000;
    var particlesLo = 8000;
    var tagsHi = 48;
    var tagsMed = 36;
    var tagsLo = 24;
    var dprHi = 2;
    var dprLo = 1;
    var particles = particlesHi;
    var maxTags = tagsHi;
    var maxDpr = dprHi;
    if (pref === 'high') {
      particles = particlesHi;
      maxTags = tagsHi;
      maxDpr = dprHi;
    } else if (pref === 'med') {
      particles = particlesMed;
      maxTags = tagsMed;
      maxDpr = dprHi;
    } else if (pref === 'low') {
      particles = particlesLo;
      maxTags = tagsLo;
      maxDpr = dprLo;
    } else {
      if (reduceMotion) {
        particles = particlesLo;
        maxTags = tagsLo;
        maxDpr = dprLo;
      } else if (narrow || cores < 4) {
        particles = particlesMed;
        maxTags = tagsMed;
        maxDpr = cores < 2 ? dprLo : dprHi;
      }
    }
    return {
      particles: particles,
      maxTags: maxTags,
      maxDpr: maxDpr,
      reduceMotion: reduceMotion,
      animSlow: reduceMotion ? 0.25 : 1,
    };
  }

  function syncTierToWebGL() {
    var t = computeTier();
    effectiveParticles = Math.min(MAX_PARTICLES_CAPACITY, t.particles);
    MAX_TAGS = t.maxTags;
    MAX_DPR = t.maxDpr;
    animSlow = t.animSlow;
    reduceMotionPreferred = t.reduceMotion;
    if (geom) geom.setDrawRange(0, effectiveParticles);
    if (points && points.material) {
      points.material.size = effectiveParticles > 11000 ? 0.72 : 1.15;
      points.material.needsUpdate = true;
    }
  }

  function showErr(msg) {
    banner.textContent = msg;
    banner.classList.add('visible');
  }
  function hideErr() {
    banner.classList.remove('visible');
  }

  function normTag(x) {
    if (typeof x === 'string') return x.trim().toLowerCase();
    return '';
  }

  function noise3(x, y, z, t) {
    return (
      Math.sin(y * 0.017 + z * 0.011 + t * 0.6) * Math.cos(x * 0.015 - t * 0.45) +
      0.45 * Math.sin(x * 0.031 + y * 0.019 + z * 0.013 + t * 0.95)
    );
  }

  function fieldAt3(x, y, z, t) {
    var fx = noise3(y, z, x, t) * 0.42;
    var fy = noise3(z, x, y, t + 0.7) * 0.42;
    var fz = noise3(x, y, z, t + 1.4) * 0.42;
    var sx = 0;
    var sy = 0;
    var sz = 0;
    var sw = 0;
    for (var i = 0; i < anchors.length; i++) {
      var a = anchors[i];
      var dx = x - a.x;
      var dy = y - a.y;
      var dz = z - a.z;
      var d = Math.sqrt(dx * dx + dy * dy + dz * dz) + 35;
      var baseW = 1 / (d * d);
      var cw = a.countWeight != null ? a.countWeight : 1;
      var ww = baseW * cw;
      sx += a.dx * ww;
      sy += a.dy * ww;
      sz += a.dz * ww;
      sw += ww;
    }
    if (sw > 1e-8) {
      fx += sx / sw;
      fy += sy / sw;
      fz += sz / sw;
    }
    return { x: fx, y: fy, z: fz };
  }

  function anchorTooltip(a) {
    return (
      (a.name || '') +
      ' · norm (' +
      (a.nx != null ? Number(a.nx).toFixed(2) : '?') +
      ', ' +
      (a.ny != null ? Number(a.ny).toFixed(2) : '?') +
      ', ' +
      (a.nz != null ? Number(a.nz).toFixed(2) : '?') +
      ')'
    );
  }

  function syncAnchorLabelPositions() {
    if (!showAnchorLabels || !anchorLayer || !camera || !renderer) return;
    var items = anchorLayer.querySelectorAll('.vf-anchor-item');
    var rect = renderer.domElement.getBoundingClientRect();
    var host = renderer.domElement.parentElement
      ? renderer.domElement.parentElement.getBoundingClientRect()
      : rect;
    var w = rect.width;
    var h = rect.height;
    for (var i = 0; i < items.length && i < anchors.length; i++) {
      var a = anchors[i];
      _projV.set(a.x, a.y, a.z);
      _projV.project(camera);
      if (Math.abs(_projV.x) > 1.35 || Math.abs(_projV.y) > 1.35 || _projV.z < -1.05 || _projV.z > 1.05) {
        items[i].style.display = 'none';
        continue;
      }
      items[i].style.display = '';
      var sx = (_projV.x * 0.5 + 0.5) * w + rect.left - host.left;
      var sy = (-_projV.y * 0.5 + 0.5) * h + rect.top - host.top;
      items[i].style.left = sx + 'px';
      items[i].style.top = sy + 'px';
      items[i].style.transform = 'translate(-50%, -100%)';
      var lab = items[i].querySelector('.vf-anchor-label');
      if (lab) lab.title = anchorTooltip(a);
    }
  }

  function rebuildAnchorLabels() {
    if (!anchorLayer) return;
    anchorLayer.innerHTML = '';
    if (!showAnchorLabels) return;
    for (var i = 0; i < anchors.length; i++) {
      var a = anchors[i];
      var item = document.createElement('div');
      item.className = 'vf-anchor-item';
      var lab = document.createElement('span');
      lab.className = 'vf-anchor-label';
      lab.textContent = a.labelText || a.name || '';
      lab.title = anchorTooltip(a);
      item.appendChild(lab);
      anchorLayer.appendChild(item);
    }
    syncAnchorLabelPositions();
  }

  function setAnchorLabelsVisible(on) {
    showAnchorLabels = !!on;
    if (anchorLayer) {
      anchorLayer.classList.toggle('is-hidden', !showAnchorLabels);
      anchorLayer.setAttribute('aria-hidden', showAnchorLabels ? 'false' : 'true');
    }
    var btn = document.getElementById('btn-anchor-labels');
    if (btn) btn.setAttribute('aria-pressed', showAnchorLabels ? 'true' : 'false');
    try {
      sessionStorage.setItem('tags-vectorfield-3d-anchor-labels', showAnchorLabels ? '1' : '0');
    } catch (e) {}
    if (showAnchorLabels) rebuildAnchorLabels();
    else if (anchorLayer) anchorLayer.innerHTML = '';
  }

  function initThree() {
    renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
    renderer.setClearColor(0x09090b, 1);
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(55, 1, 0.1, 5000);
    camera.position.set(0, 0, WORLD_HALF * 2.45);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.target.set(0, 0, 0);
    controls.update();

    geom = new THREE.BufferGeometry();
    var n = MAX_PARTICLES_CAPACITY;
    positions = new Float32Array(n * 3);
    velocities = new Float32Array(n * 3);
    for (var i = 0; i < n; i++) {
      positions[i * 3 + 0] = 0;
      positions[i * 3 + 1] = 0;
      positions[i * 3 + 2] = 0;
    }
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    posAttr = geom.getAttribute('position');
    geom.setDrawRange(0, effectiveParticles);

    var mat = new THREE.PointsMaterial({
      size: effectiveParticles > 11000 ? 0.72 : 1.15,
      color: 0xffffff,
      transparent: true,
      opacity: 0.82,
      depthWrite: false,
      blending: THREE.NormalBlending,
    });
    points = new THREE.Points(geom, mat);
    scene.add(points);
    ensureVectorOverlay();
  }

  function ensureVectorOverlay() {
    if (vectorLines) return;
    var maxSeg = GRID3_X * GRID3_Y * GRID3_Z;
    vectorPosArr = new Float32Array(maxSeg * 6);
    vectorGeom = new THREE.BufferGeometry();
    vectorGeom.setAttribute(
      'position',
      new THREE.BufferAttribute(vectorPosArr, 3).setUsage(THREE.DynamicDrawUsage)
    );
    vectorLines = new THREE.LineSegments(
      vectorGeom,
      new THREE.LineBasicMaterial({
        color: 0x22d3ee,
        transparent: true,
        opacity: 0.45,
        depthTest: true,
        depthWrite: false,
      })
    );
    vectorLines.visible = false;
    vectorLines.frustumCulled = false;
    vectorLines.renderOrder = 1;
    scene.add(vectorLines);
  }

  function updateVectorFieldOverlay() {
    if (!showVectors || !vectorGeom || !vectorPosArr) return;
    var lim = WORLD_HALF * 0.48;
    var arrowScale = WORLD_HALF * 0.055;
    var idx = 0;
    for (var gz = 0; gz < GRID3_Z; gz++) {
      for (var gy = 0; gy < GRID3_Y; gy++) {
        for (var gx = 0; gx < GRID3_X; gx++) {
          var x = -lim + ((gx + 0.5) / GRID3_X) * (2 * lim);
          var y = -lim + ((gy + 0.5) / GRID3_Y) * (2 * lim);
          var z = -lim + ((gz + 0.5) / GRID3_Z) * (2 * lim);
          var f = fieldAt3(x, y, z, tAnim);
          var fl = Math.sqrt(f.x * f.x + f.y * f.y + f.z * f.z);
          var inv = fl > 1e-9 ? 1 / fl : 0;
          var mx = f.x * inv;
          var my = f.y * inv;
          var mz = f.z * inv;
          var magNorm = Math.min(1, fl * 1.5);
          var L = arrowScale * (0.35 + 0.65 * magNorm);
          vectorPosArr[idx++] = x;
          vectorPosArr[idx++] = y;
          vectorPosArr[idx++] = z;
          vectorPosArr[idx++] = x + mx * L;
          vectorPosArr[idx++] = y + my * L;
          vectorPosArr[idx++] = z + mz * L;
        }
      }
    }
    vectorGeom.attributes.position.needsUpdate = true;
    vectorGeom.computeBoundingSphere();
  }

  function setVectorsVisible(on) {
    showVectors = !!on;
    ensureVectorOverlay();
    if (vectorLines) vectorLines.visible = showVectors;
    var btn = document.getElementById('btn-show-vectors');
    if (btn) btn.setAttribute('aria-pressed', showVectors ? 'true' : 'false');
    try {
      sessionStorage.setItem('tags-vectorfield-3d-vectors', showVectors ? '1' : '0');
    } catch (e) {}
  }

  function layoutParticles() {
    var n = effectiveParticles;
    var span = WORLD_HALF * 0.92;
    for (var i = 0; i < n; i++) {
      positions[i * 3 + 0] = (Math.random() - 0.5) * 2 * span;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 2 * span;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 2 * span;
      velocities[i * 3 + 0] = 0;
      velocities[i * 3 + 1] = 0;
      velocities[i * 3 + 2] = 0;
    }
    posAttr.needsUpdate = true;
  }

  function resize() {
    var dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
    var w = window.innerWidth;
    var h = window.innerHeight;
    renderer.setPixelRatio(dpr);
    renderer.setSize(w, h, false);
    camera.aspect = w / Math.max(1, h);
    camera.updateProjectionMatrix();
    syncAnchorLabelPositions();
  }

  function fallbackZFrom2D(ex, ey) {
    return (
      0.55 * Math.sin(ex * 4.2 + ey * 2.7) * Math.cos(ex * 1.9 - ey * 3.1)
    );
  }

  function embeddingMinMaxNormalizer3D(points) {
    var minX = Infinity;
    var maxX = -Infinity;
    var minY = Infinity;
    var maxY = -Infinity;
    var minZ = Infinity;
    var maxZ = -Infinity;
    for (var i = 0; i < points.length; i++) {
      var p = points[i];
      var x = Number(p[0]);
      var y = Number(p[1]);
      var z = Number(p[2]);
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
      if (z < minZ) minZ = z;
      if (z > maxZ) maxZ = z;
    }
    var rx = maxX - minX;
    var ry = maxY - minY;
    var rz = maxZ - minZ;
    function toNorm(x, y, z) {
      var nx = rx > 1e-12 ? ((Number(x) - minX) / rx) * 2 - 1 : 0;
      var ny = ry > 1e-12 ? ((Number(y) - minY) / ry) * 2 - 1 : 0;
      var nz = rz > 1e-12 ? ((Number(z) - minZ) / rz) * 2 - 1 : 0;
      return [nx, ny, nz];
    }
    return { toNorm: toNorm };
  }

  function buildAnchorsFromEmb(tagRows, emb) {
    anchors = [];
    var sorted = tagRows
      .map(function (r) {
        return { name: String(r.name || ''), count: Number(r.count) || 0 };
      })
      .filter(function (t) {
        return t.name.length > 0;
      });
    sorted.sort(function (a, b) {
      return b.count - a.count;
    });
    sorted = sorted.slice(0, MAX_TAGS);

    if (!emb || !emb.ok || !emb.words || !emb.vectors2d) {
      statusEl.textContent =
        effectiveParticles + ' pts · fallback field (no embeddings)';
      if (showAnchorLabels) rebuildAnchorLabels();
      return;
    }

    var map2 = Object.create(null);
    var map3 = Object.create(null);
    var has3 =
      Array.isArray(emb.vectors3d) && emb.vectors3d.length === emb.words.length;
    for (var e = 0; e < emb.words.length; e++) {
      var k = normTag(emb.words[e]);
      map2[k] = emb.vectors2d[e];
      if (has3) map3[k] = emb.vectors3d[e];
    }

    var allPts = [];
    for (var j = 0; j < emb.words.length; j++) {
      var v2 = emb.vectors2d[j];
      if (!v2 || v2.length < 2) continue;
      var ex = Number(v2[0]);
      var ey = Number(v2[1]);
      var v3 = has3 ? emb.vectors3d[j] : null;
      if (v3 && v3.length >= 3) {
        allPts.push([Number(v3[0]), Number(v3[1]), Number(v3[2])]);
      } else {
        allPts.push([ex, ey, fallbackZFrom2D(ex, ey)]);
      }
    }

    var nrm = allPts.length > 0 ? embeddingMinMaxNormalizer3D(allPts) : null;
    var scale = WORLD_HALF * 0.48;

    for (var i = 0; i < sorted.length; i++) {
      var row = sorted[i];
      var nm = normTag(row.name);
      var v2 = map2[nm];
      if (!v2 || v2.length < 2) continue;
      var ex = Number(v2[0]);
      var ey = Number(v2[1]);
      var raw3;
      var v3r = map3[nm];
      if (v3r && v3r.length >= 3) {
        raw3 = [Number(v3r[0]), Number(v3r[1]), Number(v3r[2])];
      } else {
        raw3 = [ex, ey, fallbackZFrom2D(ex, ey)];
      }
      var nx;
      var ny;
      var nz;
      var px;
      var py;
      var pz;
      var dx;
      var dy;
      var dz;
      if (nrm) {
        var nn = nrm.toNorm(raw3[0], raw3[1], raw3[2]);
        nx = nn[0];
        ny = nn[1];
        nz = nn[2];
        px = nx * scale;
        py = ny * scale;
        pz = nz * scale;
        var lenN = Math.sqrt(nx * nx + ny * ny + nz * nz);
        if (lenN > 1e-6) {
          dx = nx / lenN;
          dy = ny / lenN;
          dz = nz / lenN;
        } else {
          var lenR =
            Math.sqrt(raw3[0] * raw3[0] + raw3[1] * raw3[1] + raw3[2] * raw3[2]) +
            1e-6;
          dx = raw3[0] / lenR;
          dy = raw3[1] / lenR;
          dz = raw3[2] / lenR;
        }
      } else {
        nx = ny = nz = 0;
        px = ex * scale;
        py = ey * scale;
        pz = raw3[2] * scale;
        var lenL =
          Math.sqrt(ex * ex + ey * ey + raw3[2] * raw3[2]) + 1e-6;
        dx = ex / lenL;
        dy = ey / lenL;
        dz = raw3[2] / lenL;
      }
      var countWeight = Math.sqrt(row.count + 1);
      anchors.push({
        name: row.name,
        labelText:
          row.name +
          ' ' +
          nx.toFixed(2) +
          ',' +
          ny.toFixed(2) +
          ',' +
          nz.toFixed(2),
        ex: ex,
        ey: ey,
        nx: nx,
        ny: ny,
        nz: nz,
        x: px,
        y: py,
        z: pz,
        dx: dx,
        dy: dy,
        dz: dz,
        countWeight: countWeight,
      });
    }
    var src = has3 ? 'API vectors3d' : '2D+z fallback';
    statusEl.textContent =
      effectiveParticles +
      ' pts · ' +
      anchors.length +
      ' anchors · ' +
      src +
      ' · [-1,1]³';
    if (showAnchorLabels) rebuildAnchorLabels();
  }

  function fetchEmb(names) {
    return fetch(EMB_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ words: names, max_words: MAX_TAGS, min_sim: 0.35, max_links: 100 }),
    })
      .then(function (r) {
        return r.json();
      })
      .catch(function () {
        return { ok: false };
      });
  }

  function reloadData() {
    statusEl.textContent = 'Loading tags…';
    return fetch(TAGS_API)
      .then(function (r) {
        return r.json().then(function (b) {
          return { ok: r.ok, b: b };
        });
      })
      .then(function (res) {
        if (!res.ok || (res.b && res.b.error)) {
          showErr('Tags API: ' + (res.b && res.b.error ? res.b.error : 'failed'));
          statusEl.textContent = '';
          return;
        }
        hideErr();
        if (!Array.isArray(res.b)) {
          showErr('Tags: expected array');
          statusEl.textContent = '';
          return;
        }
        statusEl.textContent = 'Loading embeddings…';
        var names = res.b.map(function (row) {
          return String(row.name || '');
        }).filter(Boolean);
        return fetchEmb(names).then(function (emb) {
          buildAnchorsFromEmb(res.b, emb);
          layoutParticles();
        });
      })
      .catch(function (e) {
        console.error(e);
        showErr('Network: ' + (e.message || String(e)));
        statusEl.textContent = '';
      });
  }

  function scheduleReload() {
    if (reloadTimer) clearTimeout(reloadTimer);
    reloadTimer = setTimeout(function () {
      reloadTimer = null;
      reloadData();
    }, RELOAD_DEBOUNCE_MS);
  }

  function onResize() {
    var prevTags = MAX_TAGS;
    var prevEp = effectiveParticles;
    syncTierToWebGL();
    resize();
    layoutParticles();
    if (prevTags !== MAX_TAGS || prevEp !== effectiveParticles) {
      scheduleReload();
    }
  }

  if (densitySel) {
    try {
      var saved = sessionStorage.getItem('tags-vectorfield-3d-density');
      if (saved && ['auto', 'low', 'med', 'high'].indexOf(saved) >= 0) densitySel.value = saved;
    } catch (e) {}
    densitySel.addEventListener('change', function () {
      try {
        sessionStorage.setItem('tags-vectorfield-3d-density', densitySel.value);
      } catch (e) {}
      syncTierToWebGL();
      resize();
      layoutParticles();
      reloadData();
    });
  }

  try {
    var mqRm = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (mqRm.addEventListener) mqRm.addEventListener('change', onResize);
    else if (mqRm.addListener) mqRm.addListener(onResize);
  } catch (e) {}

  syncTierToWebGL();
  initThree();
  resize();
  window.addEventListener('resize', onResize);
  layoutParticles();

  (function initAnchorToggle() {
    var btn = document.getElementById('btn-anchor-labels');
    if (!btn) return;
    try {
      if (sessionStorage.getItem('tags-vectorfield-3d-anchor-labels') === '1') {
        setAnchorLabelsVisible(true);
      }
    } catch (e) {}
    btn.addEventListener('click', function () {
      setAnchorLabelsVisible(!showAnchorLabels);
    });
  })();

  (function initVectorsToggle() {
    var btn = document.getElementById('btn-show-vectors');
    if (!btn) return;
    try {
      if (sessionStorage.getItem('tags-vectorfield-3d-vectors') === '1') {
        setVectorsVisible(true);
      }
    } catch (e) {}
    btn.addEventListener('click', function () {
      setVectorsVisible(!showVectors);
    });
  })();

  TagsVisControls.wire({
    onExport: function () {
      controls.update();
      renderer.render(scene, camera);
      try {
        var data = renderer.domElement.toDataURL('image/png');
        var a = document.createElement('a');
        a.href = data;
        a.download = 'vectorfield-3d-' + Date.now() + '.png';
        a.click();
      } catch (e) {
        console.error(e);
      }
    },
  });

  if (reduceMotionPreferred) {
    TagsVisControls.frozen = true;
    var freezeBtn = document.getElementById('btn-freeze');
    if (freezeBtn) {
      freezeBtn.textContent = 'Unfreeze';
      freezeBtn.setAttribute('aria-pressed', 'true');
    }
  }

  function tick() {
    requestAnimationFrame(tick);
    controls.update();
    if (document.visibilityState === 'hidden') {
      renderer.render(scene, camera);
      return;
    }
    if (!TagsVisControls.frozen) {
      tAnim += 0.016 * animSlow * FLOW_SPEED;
      var bound = WORLD_HALF * 0.94;
      for (var i = 0; i < effectiveParticles; i++) {
        var x = positions[i * 3 + 0];
        var y = positions[i * 3 + 1];
        var z = positions[i * 3 + 2];
        var f = fieldAt3(x, y, z, tAnim);
        velocities[i * 3 + 0] =
          velocities[i * 3 + 0] * 0.92 + f.x * 2.8 * FLOW_SPEED;
        velocities[i * 3 + 1] =
          velocities[i * 3 + 1] * 0.92 + f.y * 2.8 * FLOW_SPEED;
        velocities[i * 3 + 2] =
          velocities[i * 3 + 2] * 0.92 + f.z * 2.8 * FLOW_SPEED;
        x += velocities[i * 3 + 0];
        y += velocities[i * 3 + 1];
        z += velocities[i * 3 + 2];
        if (x < -bound || x > bound) x = (Math.random() - 0.5) * 2 * bound * 0.85;
        if (y < -bound || y > bound) y = (Math.random() - 0.5) * 2 * bound * 0.85;
        if (z < -bound || z > bound) z = (Math.random() - 0.5) * 2 * bound * 0.85;
        positions[i * 3 + 0] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;
      }
      posAttr.needsUpdate = true;
    }
    if (showVectors) {
      ensureVectorOverlay();
      updateVectorFieldOverlay();
    }
    if (showAnchorLabels) syncAnchorLabelPositions();
    renderer.render(scene, camera);
  }

  var socket = io({ transports: ['websocket', 'polling'] });
  socket.on('analyzed', scheduleReload);
  socket.on('tags_updated', scheduleReload);

  tick();
  reloadData();
})();
</script>
</body>
</html>
