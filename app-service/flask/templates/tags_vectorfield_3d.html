<html lang="en">

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="{{ url_for('static', filename='tags_vis_shared.css') }}">
</head>
<body class="tags-vis-body">

<nav class="tags-vis-nav" aria-label="Subpages">

    <span class="tags-vis-title">Vector field 3D</span>
    <a href="/">← home</a>

<div class="tags-vis-toolbar">
  <label class="tags-vis-density-label" for="vf3-density">Density</label>
  <select id="vf3-density" class="tags-vis-select" aria-label="Particle density">
    <option value="auto">Auto</option>
    <option value="low">Low</option>
    <option value="med">Med</option>
    <option value="high">High</option>
  </select>
  <label class="tags-vis-density-label" for="vf3-noise">Noise value</label>
  <input id="vf3-noise" class="tags-vis-select" type="range" min="0" max="1.26" step="0.01" value="0.42" aria-label="Noise value">
  <span class="tags-vis-status" id="vf3-noise-value">0.42</span>
  <label class="tags-vis-density-label" for="vf3-anchors">Anchors value</label>
  <input id="vf3-anchors" class="tags-vis-select" type="range" min="0" max="8" step="0.1" value="1" aria-label="Anchors value">
  <span class="tags-vis-status" id="vf3-anchors-value">1.0</span>
  <label class="tags-vis-density-label" for="vf3-compensation-x">CompensationX</label>
  <input id="vf3-compensation-x" class="tags-vis-select" type="range" min="-4" max="4" step="0.01" value="0" aria-label="CompensationX">
  <span class="tags-vis-status" id="vf3-compensation-x-value">0.00</span>
  <label class="tags-vis-density-label" for="vf3-anchor-mode">Anchor mode</label>
  <select id="vf3-anchor-mode" class="tags-vis-select" aria-label="Anchor mode">
    <option value="current">Current</option>
    <option value="random">Random</option>
    <option value="alt-components">Alt vectors</option>
  </select>
  <label class="tags-vis-density-label" for="vf3-anchor-count">Count anchors</label>
  <input id="vf3-anchor-count" class="tags-vis-select" type="range" min="0" max="256" step="1" value="32" aria-label="Count anchors">
  <span class="tags-vis-status" id="vf3-anchor-count-value">32</span>
  <button type="button" class="tags-vis-btn" id="btn-anchor-labels" aria-pressed="false" title="Show tag labels (projected; 3D view only — no drag)">Anchor labels</button>
  <button type="button" class="tags-vis-btn" id="btn-show-vectors" aria-pressed="false" title="Sample field direction on a coarse 3D grid">Field vectors</button>
  <button type="button" class="tags-vis-btn" id="btn-freeze">Freeze</button>
  <button type="button" class="tags-vis-btn" id="btn-export">Export PNG</button>
  <span class="tags-vis-status" id="tags-vis-status"></span>
</div>

<div id="api-error" class="tags-vis-banner" role="alert"></div>
<div class="tags-vis-scanlines" aria-hidden="true"></div>
<div class="tags-vis-canvas-host">
  <canvas id="vf3"></canvas>
  <div id="vf3-anchors-layer" class="vf-anchors-layer is-hidden" aria-hidden="true"></div>
</div>
<p class="tags-vis-hint">Drag to orbit · wheel zoom · white particles in 3D · Field vectors: cyan segments · labels are projected (read-only)</p>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='tags_vis_controls.js') }}"></script>
<script>
(function () {
  var TAGS_API = '/api/tags/get/';
  var EMB_API = '/api/tags/embeddings/';
  var MAX_PARTICLES_CAPACITY = 28000;
  var FLOW_SPEED = 0.05;
  var RELOAD_DEBOUNCE_MS = 550;
  /** Half-extent of simulation cube (world units). */
  var WORLD_HALF = 250;

  var effectiveParticles = MAX_PARTICLES_CAPACITY;
  var MAX_TAGS = 48;
  var MAX_ANCHOR_CANDIDATES = 256;
  var DEFAULT_ANCHOR_COUNT = 32;
  var MAX_DPR = 2;
  var NOISE_BASE = 0.42;
  var ANCHORS_BASE = 1.0;
  var animSlow = 1;
  var reduceMotionPreferred = false;

  var statusEl = document.getElementById('tags-vis-status');
  var banner = document.getElementById('api-error');
  var canvas = document.getElementById('vf3');
  var densitySel = document.getElementById('vf3-density');
  var noiseSel = document.getElementById('vf3-noise');
  var anchorsSel = document.getElementById('vf3-anchors');
  var compensationXSel = document.getElementById('vf3-compensation-x');
  var anchorModeSel = document.getElementById('vf3-anchor-mode');
  var anchorCountSel = document.getElementById('vf3-anchor-count');
  var noiseValueEl = document.getElementById('vf3-noise-value');
  var anchorsValueEl = document.getElementById('vf3-anchors-value');
  var compensationXValueEl = document.getElementById('vf3-compensation-x-value');
  var anchorCountValueEl = document.getElementById('vf3-anchor-count-value');
  var noiseStrength = NOISE_BASE;
  var anchorsStrength = ANCHORS_BASE;
  var compensationX = 0;
  var anchorMode = 'current';
  var anchorCount = DEFAULT_ANCHOR_COUNT;

  var renderer, scene, camera, controls, points, geom, posAttr;
  var anchors = [];
  var tAnim = 0;
  var positions, velocities;
  var reloadTimer = null;
  var anchorLayer = document.getElementById('vf3-anchors-layer');
  var showAnchorLabels = false;
  var showVectors = false;
  var vectorGeom = null;
  var vectorLines = null;
  var vectorPosArr = null;
  var GRID3_X = 6;
  var GRID3_Y = 5;
  var GRID3_Z = 5;
  var _projV = new THREE.Vector3();
  var _projDir = new THREE.Vector3();
  var lastTagRows = null;
  var lastEmb = null;

  function getDensityPref() {
    if (densitySel && densitySel.value) return densitySel.value;
    try {
      return sessionStorage.getItem('tags-vectorfield-3d-density') || 'auto';
    } catch (e) {
      return 'auto';
    }
  }

  function computeTier() {
    var reduceMotion = false;
    try {
      reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    } catch (e) {}
    var pref = getDensityPref();
    var cores = typeof navigator.hardwareConcurrency === 'number' ? navigator.hardwareConcurrency : 4;
    var narrow = window.innerWidth < 640;
    var particlesHi = 28000;
    var particlesMed = 16000;
    var particlesLo = 8000;
    var tagsHi = 48;
    var tagsMed = 36;
    var tagsLo = 24;
    var dprHi = 2;
    var dprLo = 1;
    var particles = particlesHi;
    var maxTags = tagsHi;
    var maxDpr = dprHi;
    if (pref === 'high') {
      particles = particlesHi;
      maxTags = tagsHi;
      maxDpr = dprHi;
    } else if (pref === 'med') {
      particles = particlesMed;
      maxTags = tagsMed;
      maxDpr = dprHi;
    } else if (pref === 'low') {
      particles = particlesLo;
      maxTags = tagsLo;
      maxDpr = dprLo;
    } else {
      if (reduceMotion) {
        particles = particlesLo;
        maxTags = tagsLo;
        maxDpr = dprLo;
      } else if (narrow || cores < 4) {
        particles = particlesMed;
        maxTags = tagsMed;
        maxDpr = cores < 2 ? dprLo : dprHi;
      }
    }
    return {
      particles: particles,
      maxTags: maxTags,
      maxDpr: maxDpr,
      reduceMotion: reduceMotion,
      animSlow: reduceMotion ? 0.25 : 1,
    };
  }

  function syncTierToWebGL() {
    var t = computeTier();
    effectiveParticles = Math.min(MAX_PARTICLES_CAPACITY, t.particles);
    MAX_TAGS = t.maxTags;
    MAX_DPR = t.maxDpr;
    animSlow = t.animSlow;
    reduceMotionPreferred = t.reduceMotion;
    if (geom) geom.setDrawRange(0, effectiveParticles);
    if (points && points.material) {
      points.material.size = effectiveParticles > 11000 ? 0.72 : 1.15;
      points.material.needsUpdate = true;
    }
  }

  function showErr(msg) {
    banner.textContent = msg;
    banner.classList.add('visible');
  }
  function hideErr() {
    banner.classList.remove('visible');
  }

  function normTag(x) {
    if (typeof x === 'string') return x.trim().toLowerCase();
    return '';
  }

  function noise3(x, y, z, t) {
    return (
      Math.sin(y * 0.017 + z * 0.011 + t * 0.6) * Math.cos(x * 0.015 - t * 0.45) +
      0.45 * Math.sin(x * 0.031 + y * 0.019 + z * 0.013 + t * 0.95)
    );
  }

  function syncNoiseUi() {
    if (noiseSel) noiseSel.value = String(noiseStrength);
    if (noiseValueEl) noiseValueEl.textContent = Number(noiseStrength).toFixed(2);
  }

  function syncAnchorsUi() {
    if (anchorsSel) anchorsSel.value = String(anchorsStrength);
    if (anchorsValueEl) anchorsValueEl.textContent = Number(anchorsStrength).toFixed(1);
  }

  function syncCompensationXUi() {
    if (compensationXSel) compensationXSel.value = String(compensationX);
    if (compensationXValueEl) compensationXValueEl.textContent = Number(compensationX).toFixed(2);
  }

  function syncAnchorModeUi() {
    if (anchorModeSel) anchorModeSel.value = anchorMode;
  }

  function syncAnchorCountUi() {
    if (anchorCountSel) anchorCountSel.value = String(anchorCount);
    if (anchorCountValueEl) anchorCountValueEl.textContent = String(anchorCount);
  }

  function loadSliderPrefs() {
    try {
      var savedNoise = parseFloat(sessionStorage.getItem('tags-vectorfield-3d-noise'));
      if (Number.isFinite(savedNoise)) {
        noiseStrength = Math.max(0, Math.min(NOISE_BASE * 3, savedNoise));
      }
      var savedAnchors = parseFloat(sessionStorage.getItem('tags-vectorfield-3d-anchors'));
      if (Number.isFinite(savedAnchors)) {
        anchorsStrength = Math.max(0, Math.min(8, savedAnchors));
      }
      var savedCompensationX = parseFloat(sessionStorage.getItem('tags-vectorfield-3d-compensation-x'));
      if (Number.isFinite(savedCompensationX)) {
        compensationX = Math.max(-4, Math.min(4, savedCompensationX));
      }
      var savedMode = sessionStorage.getItem('tags-vectorfield-3d-anchor-mode');
      if (savedMode && ['current', 'random', 'alt-components'].indexOf(savedMode) >= 0) {
        anchorMode = savedMode;
      }
      var savedCount = parseInt(sessionStorage.getItem('tags-vectorfield-3d-anchor-count') || '', 10);
      if (Number.isFinite(savedCount)) {
        anchorCount = Math.max(0, Math.min(MAX_ANCHOR_CANDIDATES, savedCount));
      }
    } catch (e) {}
    syncNoiseUi();
    syncAnchorsUi();
    syncCompensationXUi();
    syncAnchorModeUi();
    syncAnchorCountUi();
  }

  function stableHash(str) {
    var h = 2166136261;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function hashToUnit(seed) {
    return ((seed >>> 0) % 1000000) / 500000 - 1;
  }

  function randomAnchor3D(name) {
    var base = stableHash(name || '');
    return [
      hashToUnit(base ^ 0x9e3779b9),
      hashToUnit(base ^ 0x85ebca6b),
      hashToUnit(base ^ 0xc2b2ae35)
    ];
  }

  function getEmbVectors3D(emb, key) {
    var current2 = emb.map2Current[key] || emb.map2Legacy[key];
    var current3 = emb.map3Current[key] || emb.map3Legacy[key];
    var alt2 = emb.map2Alt[key] || current2;
    var alt3 = emb.map3Alt[key] || current3 || (alt2 ? [alt2[0], alt2[1], fallbackZFrom2D(alt2[0], alt2[1])] : null);
    var dir3 = emb.mapDir3[key] || current3 || alt3;
    return { current2: current2, current3: current3, alt2: alt2, alt3: alt3, dir3: dir3 };
  }

  function rebuildAnchorsFromCache() {
    if (!lastTagRows || !lastEmb) return;
    buildAnchorsFromEmb(lastTagRows, lastEmb);
    layoutParticles();
  }

  function fieldAt3(x, y, z, t) {
    var fx = noise3(y, z, x, t) * noiseStrength;
    var fy = noise3(z, x, y, t + 0.7) * noiseStrength;
    var fz = noise3(x, y, z, t + 1.4) * noiseStrength;
    var sx = 0;
    var sy = 0;
    var sz = 0;
    var sw = 0;
    for (var i = 0; i < anchors.length; i++) {
      var a = anchors[i];
      var dx = x - a.x;
      var dy = y - a.y;
      var dz = z - a.z;
      var d = Math.sqrt(dx * dx + dy * dy + dz * dz) + 35;
      var baseW = 1 / (d * d);
      var cw = a.countWeight != null ? a.countWeight : 1;
      var ww = baseW * cw;
      sx += a.dx * ww;
      sy += a.dy * ww;
      sz += a.dz * ww;
      sw += ww;
    }
    if (sw > 1e-8) {
      fx += (sx / sw) * anchorsStrength;
      fy += (sy / sw) * anchorsStrength;
      fz += (sz / sw) * anchorsStrength;
    }
    fx += compensationX;
    return { x: fx, y: fy, z: fz };
  }

  function anchorTooltip(a) {
    return (
      (a.name || '') +
      ' · norm (' +
      (a.nx != null ? Number(a.nx).toFixed(2) : '?') +
      ', ' +
      (a.ny != null ? Number(a.ny).toFixed(2) : '?') +
      ', ' +
      (a.nz != null ? Number(a.nz).toFixed(2) : '?') +
      ')'
    );
  }

  function syncAnchorLabelPositions() {
    if (!showAnchorLabels || !anchorLayer || !camera || !renderer) return;
    var items = anchorLayer.querySelectorAll('.vf-anchor-item');
    var rect = renderer.domElement.getBoundingClientRect();
    var host = renderer.domElement.parentElement
      ? renderer.domElement.parentElement.getBoundingClientRect()
      : rect;
    var w = rect.width;
    var h = rect.height;
    for (var i = 0; i < items.length && i < anchors.length; i++) {
      var a = anchors[i];
      _projV.set(a.x, a.y, a.z);
      _projV.project(camera);
      if (Math.abs(_projV.x) > 1.35 || Math.abs(_projV.y) > 1.35 || _projV.z < -1.05 || _projV.z > 1.05) {
        items[i].style.display = 'none';
        continue;
      }
      items[i].style.display = '';
      var sx = (_projV.x * 0.5 + 0.5) * w + rect.left - host.left;
      var sy = (-_projV.y * 0.5 + 0.5) * h + rect.top - host.top;
      items[i].style.left = sx + 'px';
      items[i].style.top = sy + 'px';
      items[i].style.transform = 'translate(-50%, -100%)';
      _projDir.set(
        a.x + (a.dx || 0) * 34,
        a.y + (a.dy || 0) * 34,
        a.z + (a.dz || 0) * 34
      );
      _projDir.project(camera);
      var line = items[i].querySelector('.vf-anchor-line');
      if (line) {
        var dxs = ((_projDir.x - _projV.x) * 0.5) * w;
        var dys = ((-_projDir.y + _projV.y) * 0.5) * h;
        var len = Math.min(60, Math.max(16, Math.sqrt(dxs * dxs + dys * dys)));
        line.style.setProperty('--vf-anchor-line-length', len.toFixed(1) + 'px');
        line.style.setProperty(
          '--vf-anchor-line-angle',
          (Math.atan2(dys, dxs) * 180 / Math.PI).toFixed(2) + 'deg'
        );
      }
      var lab = items[i].querySelector('.vf-anchor-label');
      if (lab) lab.title = anchorTooltip(a);
    }
  }

  function rebuildAnchorLabels() {
    if (!anchorLayer) return;
    anchorLayer.innerHTML = '';
    if (!showAnchorLabels) return;
    for (var i = 0; i < anchors.length; i++) {
      var a = anchors[i];
      var item = document.createElement('div');
      item.className = 'vf-anchor-item';
      var lab = document.createElement('span');
      lab.className = 'vf-anchor-label';
      lab.textContent = a.labelText || a.name || '';
      lab.title = anchorTooltip(a);
      var line = document.createElement('span');
      line.className = 'vf-anchor-line';
      line.setAttribute('aria-hidden', 'true');
      item.appendChild(line);
      item.appendChild(lab);
      anchorLayer.appendChild(item);
    }
    syncAnchorLabelPositions();
  }

  function setAnchorLabelsVisible(on) {
    showAnchorLabels = !!on;
    if (anchorLayer) {
      anchorLayer.classList.toggle('is-hidden', !showAnchorLabels);
      anchorLayer.setAttribute('aria-hidden', showAnchorLabels ? 'false' : 'true');
    }
    var btn = document.getElementById('btn-anchor-labels');
    if (btn) btn.setAttribute('aria-pressed', showAnchorLabels ? 'true' : 'false');
    try {
      sessionStorage.setItem('tags-vectorfield-3d-anchor-labels', showAnchorLabels ? '1' : '0');
    } catch (e) {}
    if (showAnchorLabels) rebuildAnchorLabels();
    else if (anchorLayer) anchorLayer.innerHTML = '';
  }

  function initThree() {
    renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
    renderer.setClearColor(0x09090b, 1);
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(55, 1, 0.1, 5000);
    camera.position.set(0, 0, WORLD_HALF * 2.45);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.target.set(0, 0, 0);
    controls.update();

    geom = new THREE.BufferGeometry();
    var n = MAX_PARTICLES_CAPACITY;
    positions = new Float32Array(n * 3);
    velocities = new Float32Array(n * 3);
    for (var i = 0; i < n; i++) {
      positions[i * 3 + 0] = 0;
      positions[i * 3 + 1] = 0;
      positions[i * 3 + 2] = 0;
    }
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    posAttr = geom.getAttribute('position');
    geom.setDrawRange(0, effectiveParticles);

    var mat = new THREE.PointsMaterial({
      size: effectiveParticles > 11000 ? 0.72 : 1.15,
      color: 0xffffff,
      transparent: true,
      opacity: 0.82,
      depthWrite: false,
      blending: THREE.NormalBlending,
    });
    points = new THREE.Points(geom, mat);
    scene.add(points);
    ensureVectorOverlay();
  }

  function ensureVectorOverlay() {
    if (vectorLines) return;
    var maxSeg = GRID3_X * GRID3_Y * GRID3_Z;
    vectorPosArr = new Float32Array(maxSeg * 6);
    vectorGeom = new THREE.BufferGeometry();
    vectorGeom.setAttribute(
      'position',
      new THREE.BufferAttribute(vectorPosArr, 3).setUsage(THREE.DynamicDrawUsage)
    );
    vectorLines = new THREE.LineSegments(
      vectorGeom,
      new THREE.LineBasicMaterial({
        color: 0x22d3ee,
        transparent: true,
        opacity: 0.45,
        depthTest: true,
        depthWrite: false,
      })
    );
    vectorLines.visible = false;
    vectorLines.frustumCulled = false;
    vectorLines.renderOrder = 1;
    scene.add(vectorLines);
  }

  function updateVectorFieldOverlay() {
    if (!showVectors || !vectorGeom || !vectorPosArr) return;
    var lim = WORLD_HALF * 0.48;
    var arrowScale = WORLD_HALF * 0.055;
    var idx = 0;
    for (var gz = 0; gz < GRID3_Z; gz++) {
      for (var gy = 0; gy < GRID3_Y; gy++) {
        for (var gx = 0; gx < GRID3_X; gx++) {
          var x = -lim + ((gx + 0.5) / GRID3_X) * (2 * lim);
          var y = -lim + ((gy + 0.5) / GRID3_Y) * (2 * lim);
          var z = -lim + ((gz + 0.5) / GRID3_Z) * (2 * lim);
          var f = fieldAt3(x, y, z, tAnim);
          var fl = Math.sqrt(f.x * f.x + f.y * f.y + f.z * f.z);
          var inv = fl > 1e-9 ? 1 / fl : 0;
          var mx = f.x * inv;
          var my = f.y * inv;
          var mz = f.z * inv;
          var magNorm = Math.min(1, fl * 1.5);
          var L = arrowScale * (0.35 + 0.65 * magNorm);
          vectorPosArr[idx++] = x;
          vectorPosArr[idx++] = y;
          vectorPosArr[idx++] = z;
          vectorPosArr[idx++] = x + mx * L;
          vectorPosArr[idx++] = y + my * L;
          vectorPosArr[idx++] = z + mz * L;
        }
      }
    }
    vectorGeom.attributes.position.needsUpdate = true;
    vectorGeom.computeBoundingSphere();
  }

  function setVectorsVisible(on) {
    showVectors = !!on;
    ensureVectorOverlay();
    if (vectorLines) vectorLines.visible = showVectors;
    var btn = document.getElementById('btn-show-vectors');
    if (btn) btn.setAttribute('aria-pressed', showVectors ? 'true' : 'false');
    try {
      sessionStorage.setItem('tags-vectorfield-3d-vectors', showVectors ? '1' : '0');
    } catch (e) {}
  }

  function layoutParticles() {
    var n = effectiveParticles;
    var span = WORLD_HALF * 0.92;
    for (var i = 0; i < n; i++) {
      positions[i * 3 + 0] = (Math.random() - 0.5) * 2 * span;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 2 * span;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 2 * span;
      velocities[i * 3 + 0] = 0;
      velocities[i * 3 + 1] = 0;
      velocities[i * 3 + 2] = 0;
    }
    posAttr.needsUpdate = true;
  }

  function resize() {
    var dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
    var w = window.innerWidth;
    var h = window.innerHeight;
    renderer.setPixelRatio(dpr);
    renderer.setSize(w, h, false);
    camera.aspect = w / Math.max(1, h);
    camera.updateProjectionMatrix();
    syncAnchorLabelPositions();
  }

  function fallbackZFrom2D(ex, ey) {
    return (
      0.55 * Math.sin(ex * 4.2 + ey * 2.7) * Math.cos(ex * 1.9 - ey * 3.1)
    );
  }

  function embeddingMinMaxNormalizer3D(points) {
    var minX = Infinity;
    var maxX = -Infinity;
    var minY = Infinity;
    var maxY = -Infinity;
    var minZ = Infinity;
    var maxZ = -Infinity;
    for (var i = 0; i < points.length; i++) {
      var p = points[i];
      var x = Number(p[0]);
      var y = Number(p[1]);
      var z = Number(p[2]);
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
      if (z < minZ) minZ = z;
      if (z > maxZ) maxZ = z;
    }
    var rx = maxX - minX;
    var ry = maxY - minY;
    var rz = maxZ - minZ;
    function toNorm(x, y, z) {
      var nx = rx > 1e-12 ? ((Number(x) - minX) / rx) * 2 - 1 : 0;
      var ny = ry > 1e-12 ? ((Number(y) - minY) / ry) * 2 - 1 : 0;
      var nz = rz > 1e-12 ? ((Number(z) - minZ) / rz) * 2 - 1 : 0;
      return [nx, ny, nz];
    }
    return { toNorm: toNorm };
  }

  function buildAnchorsFromEmb(tagRows, emb) {
    anchors = [];
    var sorted = tagRows
      .map(function (r) {
        return { name: String(r.name || ''), count: Number(r.count) || 0 };
      })
      .filter(function (t) {
        return t.name.length > 0;
      });
    sorted.sort(function (a, b) {
      return b.count - a.count;
    });
    sorted = sorted.slice(0, MAX_ANCHOR_CANDIDATES);

    if (!emb || !emb.ok || !emb.words || !emb.vectors2d) {
      statusEl.textContent =
        effectiveParticles + ' pts · fallback field (no embeddings)';
      if (showAnchorLabels) rebuildAnchorLabels();
      return;
    }

    var map2Legacy = Object.create(null);
    var map3Legacy = Object.create(null);
    var map2Current = Object.create(null);
    var map3Current = Object.create(null);
    var map2Alt = Object.create(null);
    var map3Alt = Object.create(null);
    var mapDir3 = Object.create(null);
    var has3 = Array.isArray(emb.vectors3d) && emb.vectors3d.length === emb.words.length;
    var hasCurrent2 = Array.isArray(emb.vectors2d_current) && emb.vectors2d_current.length === emb.words.length;
    var hasCurrent3 = Array.isArray(emb.vectors3d_current) && emb.vectors3d_current.length === emb.words.length;
    var hasAlt2 = Array.isArray(emb.vectors2d_alt) && emb.vectors2d_alt.length === emb.words.length;
    var hasAlt3 = Array.isArray(emb.vectors3d_alt) && emb.vectors3d_alt.length === emb.words.length;
    var hasDir3 = Array.isArray(emb.directions3d) && emb.directions3d.length === emb.words.length;
    for (var e = 0; e < emb.words.length; e++) {
      var k = normTag(emb.words[e]);
      map2Legacy[k] = emb.vectors2d[e];
      if (has3) map3Legacy[k] = emb.vectors3d[e];
      if (hasCurrent2) map2Current[k] = emb.vectors2d_current[e];
      if (hasCurrent3) map3Current[k] = emb.vectors3d_current[e];
      if (hasAlt2) map2Alt[k] = emb.vectors2d_alt[e];
      if (hasAlt3) map3Alt[k] = emb.vectors3d_alt[e];
      if (hasDir3) mapDir3[k] = emb.directions3d[e];
    }
    emb.map2Legacy = map2Legacy;
    emb.map3Legacy = map3Legacy;
    emb.map2Current = map2Current;
    emb.map3Current = map3Current;
    emb.map2Alt = map2Alt;
    emb.map3Alt = map3Alt;
    emb.mapDir3 = mapDir3;

    var allPts = [];
    var allDirs = [];
    if (anchorMode !== 'random') {
      for (var j = 0; j < sorted.length; j++) {
        var rowKey = normTag(sorted[j].name);
        var vecs = getEmbVectors3D(emb, rowKey);
        var raw3 = anchorMode === 'alt-components' ? vecs.alt3 : vecs.current3;
        if (raw3 && raw3.length >= 3) {
          allPts.push([Number(raw3[0]), Number(raw3[1]), Number(raw3[2])]);
        }
        if (vecs.dir3 && vecs.dir3.length >= 3) {
          allDirs.push([Number(vecs.dir3[0]), Number(vecs.dir3[1]), Number(vecs.dir3[2])]);
        }
      }
    } else {
      for (var j = 0; j < sorted.length; j++) {
        var rowKeyRandom = normTag(sorted[j].name);
        var dirRandom = getEmbVectors3D(emb, rowKeyRandom).dir3;
        if (dirRandom && dirRandom.length >= 3) {
          allDirs.push([Number(dirRandom[0]), Number(dirRandom[1]), Number(dirRandom[2])]);
        }
      }
    }

    var nrm = allPts.length > 0 ? embeddingMinMaxNormalizer3D(allPts) : null;
    var dirMeanX = 0;
    var dirMeanY = 0;
    var dirMeanZ = 0;
    if (allDirs.length > 0) {
      for (var di = 0; di < allDirs.length; di++) {
        dirMeanX += Number(allDirs[di][0]) || 0;
        dirMeanY += Number(allDirs[di][1]) || 0;
        dirMeanZ += Number(allDirs[di][2]) || 0;
      }
      dirMeanX /= allDirs.length;
      dirMeanY /= allDirs.length;
      dirMeanZ /= allDirs.length;
    }
    var centeredDirs = [];
    for (var dc = 0; dc < allDirs.length; dc++) {
      centeredDirs.push([
        (Number(allDirs[dc][0]) || 0) - dirMeanX,
        (Number(allDirs[dc][1]) || 0) - dirMeanY,
        (Number(allDirs[dc][2]) || 0) - dirMeanZ,
      ]);
    }
    var dirNrm = centeredDirs.length > 0 ? embeddingMinMaxNormalizer3D(centeredDirs) : null;
    var scale = WORLD_HALF * 0.48;

    var activeLimit = Math.max(0, Math.min(MAX_ANCHOR_CANDIDATES, anchorCount, sorted.length));
    for (var i = 0; i < sorted.length && anchors.length < activeLimit; i++) {
      var row = sorted[i];
      var nm = normTag(row.name);
      var vecs = getEmbVectors3D(emb, nm);
      var current2 = vecs.current2;
      if (!current2 || current2.length < 2) continue;
      var ex = Number(current2[0]);
      var ey = Number(current2[1]);
      var raw3 = anchorMode === 'random' ? randomAnchor3D(row.name) : (anchorMode === 'alt-components' ? vecs.alt3 : vecs.current3);
      if (!raw3 || raw3.length < 3) continue;
      raw3 = [Number(raw3[0]), Number(raw3[1]), Number(raw3[2])];
      var dir3 = vecs.dir3;
      var rawDx = dir3 && dir3.length >= 3 ? Number(dir3[0]) : raw3[0];
      var rawDy = dir3 && dir3.length >= 3 ? Number(dir3[1]) : raw3[1];
      var rawDz = dir3 && dir3.length >= 3 ? Number(dir3[2]) : raw3[2];
      rawDx -= dirMeanX;
      rawDy -= dirMeanY;
      rawDz -= dirMeanZ;
      if (dirNrm) {
        var dn = dirNrm.toNorm(rawDx, rawDy, rawDz);
        rawDx = dn[0];
        rawDy = dn[1];
        rawDz = dn[2];
      }
      var nx;
      var ny;
      var nz;
      var px;
      var py;
      var pz;
      var dx;
      var dy;
      var dz;
      if (nrm) {
        var nn = nrm.toNorm(raw3[0], raw3[1], raw3[2]);
        nx = nn[0];
        ny = nn[1];
        nz = nn[2];
        px = nx * scale;
        py = ny * scale;
        pz = nz * scale;
        var lenD = Math.sqrt(rawDx * rawDx + rawDy * rawDy + rawDz * rawDz);
        if (lenD > 1e-6) {
          dx = rawDx / lenD;
          dy = rawDy / lenD;
          dz = rawDz / lenD;
        } else {
          var lenR =
            Math.sqrt(raw3[0] * raw3[0] + raw3[1] * raw3[1] + raw3[2] * raw3[2]) +
            1e-6;
          dx = raw3[0] / lenR;
          dy = raw3[1] / lenR;
          dz = raw3[2] / lenR;
        }
      } else {
        nx = raw3[0];
        ny = raw3[1];
        nz = raw3[2];
        px = raw3[0] * scale;
        py = raw3[1] * scale;
        pz = raw3[2] * scale;
        var lenL =
          Math.sqrt(rawDx * rawDx + rawDy * rawDy + rawDz * rawDz) + 1e-6;
        dx = rawDx / lenL;
        dy = rawDy / lenL;
        dz = rawDz / lenL;
      }
      var countWeight = Math.sqrt(row.count + 1);
      anchors.push({
        name: row.name,
        labelText:
          row.name +
          ' ' +
          nx.toFixed(2) +
          ',' +
          ny.toFixed(2) +
          ',' +
          nz.toFixed(2),
        ex: ex,
        ey: ey,
        nx: nx,
        ny: ny,
        nz: nz,
        x: px,
        y: py,
        z: pz,
        dx: dx,
        dy: dy,
        dz: dz,
        countWeight: countWeight,
      });
    }
    var src = has3 ? 'API vectors3d' : '2D+z fallback';
    statusEl.textContent =
      effectiveParticles +
      ' pts · ' +
      anchors.length +
      ' anchors · ' +
      src +
      ' · mode ' +
      anchorMode;
    if (showAnchorLabels) rebuildAnchorLabels();
  }

  function fetchEmb(names) {
    return fetch(EMB_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ words: names, max_words: MAX_ANCHOR_CANDIDATES, min_sim: 0.35, max_links: 100 }),
    })
      .then(function (r) {
        return r.json();
      })
      .catch(function () {
        return { ok: false };
      });
  }

  function reloadData() {
    statusEl.textContent = 'Loading tags…';
    return fetch(TAGS_API)
      .then(function (r) {
        return r.json().then(function (b) {
          return { ok: r.ok, b: b };
        });
      })
      .then(function (res) {
        if (!res.ok || (res.b && res.b.error)) {
          showErr('Tags API: ' + (res.b && res.b.error ? res.b.error : 'failed'));
          statusEl.textContent = '';
          return;
        }
        hideErr();
        if (!Array.isArray(res.b)) {
          showErr('Tags: expected array');
          statusEl.textContent = '';
          return;
        }
        statusEl.textContent = 'Loading embeddings…';
        lastTagRows = res.b;
        var names = res.b.map(function (row) {
          return String(row.name || '');
        }).filter(Boolean);
        return fetchEmb(names).then(function (emb) {
          lastEmb = emb;
          buildAnchorsFromEmb(res.b, emb);
          layoutParticles();
        });
      })
      .catch(function (e) {
        console.error(e);
        showErr('Network: ' + (e.message || String(e)));
        statusEl.textContent = '';
      });
  }

  function scheduleReload() {
    if (reloadTimer) clearTimeout(reloadTimer);
    reloadTimer = setTimeout(function () {
      reloadTimer = null;
      reloadData();
    }, RELOAD_DEBOUNCE_MS);
  }

  function onResize() {
    var prevTags = MAX_TAGS;
    var prevEp = effectiveParticles;
    syncTierToWebGL();
    resize();
    layoutParticles();
    if (prevTags !== MAX_TAGS || prevEp !== effectiveParticles) {
      scheduleReload();
    }
  }

  if (densitySel) {
    try {
      var saved = sessionStorage.getItem('tags-vectorfield-3d-density');
      if (saved && ['auto', 'low', 'med', 'high'].indexOf(saved) >= 0) densitySel.value = saved;
    } catch (e) {}
    densitySel.addEventListener('change', function () {
      try {
        sessionStorage.setItem('tags-vectorfield-3d-density', densitySel.value);
      } catch (e) {}
      syncTierToWebGL();
      resize();
      layoutParticles();
      reloadData();
    });
  }

  loadSliderPrefs();
  if (noiseSel) {
    noiseSel.addEventListener('input', function () {
      noiseStrength = Math.max(0, Math.min(NOISE_BASE * 3, parseFloat(noiseSel.value) || 0));
      syncNoiseUi();
      try {
        sessionStorage.setItem('tags-vectorfield-3d-noise', String(noiseStrength));
      } catch (e) {}
    });
  }
  if (anchorsSel) {
    anchorsSel.addEventListener('input', function () {
      anchorsStrength = Math.max(0, Math.min(8, parseFloat(anchorsSel.value) || 0));
      syncAnchorsUi();
      try {
        sessionStorage.setItem('tags-vectorfield-3d-anchors', String(anchorsStrength));
      } catch (e) {}
    });
  }
  if (compensationXSel) {
    compensationXSel.addEventListener('input', function () {
      compensationX = Math.max(-4, Math.min(4, parseFloat(compensationXSel.value) || 0));
      syncCompensationXUi();
      try {
        sessionStorage.setItem('tags-vectorfield-3d-compensation-x', String(compensationX));
      } catch (e) {}
    });
  }
  if (anchorModeSel) {
    anchorModeSel.addEventListener('change', function () {
      anchorMode = anchorModeSel.value || 'current';
      syncAnchorModeUi();
      try {
        sessionStorage.setItem('tags-vectorfield-3d-anchor-mode', anchorMode);
      } catch (e) {}
      rebuildAnchorsFromCache();
    });
  }
  if (anchorCountSel) {
    anchorCountSel.addEventListener('input', function () {
      anchorCount = Math.max(0, Math.min(MAX_ANCHOR_CANDIDATES, parseInt(anchorCountSel.value || '0', 10) || 0));
      syncAnchorCountUi();
      try {
        sessionStorage.setItem('tags-vectorfield-3d-anchor-count', String(anchorCount));
      } catch (e) {}
      rebuildAnchorsFromCache();
    });
  }

  try {
    var mqRm = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (mqRm.addEventListener) mqRm.addEventListener('change', onResize);
    else if (mqRm.addListener) mqRm.addListener(onResize);
  } catch (e) {}

  syncTierToWebGL();
  initThree();
  resize();
  window.addEventListener('resize', onResize);
  layoutParticles();

  (function initAnchorToggle() {
    var btn = document.getElementById('btn-anchor-labels');
    if (!btn) return;
    try {
      if (sessionStorage.getItem('tags-vectorfield-3d-anchor-labels') === '1') {
        setAnchorLabelsVisible(true);
      }
    } catch (e) {}
    btn.addEventListener('click', function () {
      setAnchorLabelsVisible(!showAnchorLabels);
    });
  })();

  (function initVectorsToggle() {
    var btn = document.getElementById('btn-show-vectors');
    if (!btn) return;
    try {
      if (sessionStorage.getItem('tags-vectorfield-3d-vectors') === '1') {
        setVectorsVisible(true);
      }
    } catch (e) {}
    btn.addEventListener('click', function () {
      setVectorsVisible(!showVectors);
    });
  })();

  TagsVisControls.wire({
    onExport: function () {
      controls.update();
      renderer.render(scene, camera);
      try {
        var data = renderer.domElement.toDataURL('image/png');
        var a = document.createElement('a');
        a.href = data;
        a.download = 'vectorfield-3d-' + Date.now() + '.png';
        a.click();
      } catch (e) {
        console.error(e);
      }
    },
  });

  if (reduceMotionPreferred) {
    TagsVisControls.frozen = true;
    var freezeBtn = document.getElementById('btn-freeze');
    if (freezeBtn) {
      freezeBtn.textContent = 'Unfreeze';
      freezeBtn.setAttribute('aria-pressed', 'true');
    }
  }

  function tick() {
    requestAnimationFrame(tick);
    controls.update();
    if (document.visibilityState === 'hidden') {
      renderer.render(scene, camera);
      return;
    }
    if (!TagsVisControls.frozen) {
      tAnim += 0.016 * animSlow * FLOW_SPEED;
      var bound = WORLD_HALF * 0.94;
      for (var i = 0; i < effectiveParticles; i++) {
        var x = positions[i * 3 + 0];
        var y = positions[i * 3 + 1];
        var z = positions[i * 3 + 2];
        var f = fieldAt3(x, y, z, tAnim);
        velocities[i * 3 + 0] =
          velocities[i * 3 + 0] * 0.92 + f.x * 2.8 * FLOW_SPEED;
        velocities[i * 3 + 1] =
          velocities[i * 3 + 1] * 0.92 + f.y * 2.8 * FLOW_SPEED;
        velocities[i * 3 + 2] =
          velocities[i * 3 + 2] * 0.92 + f.z * 2.8 * FLOW_SPEED;
        x += velocities[i * 3 + 0];
        y += velocities[i * 3 + 1];
        z += velocities[i * 3 + 2];
        if (x < -bound || x > bound) x = (Math.random() - 0.5) * 2 * bound * 0.85;
        if (y < -bound || y > bound) y = (Math.random() - 0.5) * 2 * bound * 0.85;
        if (z < -bound || z > bound) z = (Math.random() - 0.5) * 2 * bound * 0.85;
        positions[i * 3 + 0] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;
      }
      posAttr.needsUpdate = true;
    }
    if (showVectors) {
      ensureVectorOverlay();
      updateVectorFieldOverlay();
    }
    if (showAnchorLabels) syncAnchorLabelPositions();
    renderer.render(scene, camera);
  }

  var socket = io({ transports: ['websocket', 'polling'] });
  socket.on('analyzed', scheduleReload);
  socket.on('tags_updated', scheduleReload);

  tick();
  reloadData();
})();
</script>
</body>
</html>
