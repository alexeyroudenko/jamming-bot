<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jamming bot — Vector field</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='tags_vis_shared.css') }}">
</head>
<body class="tags-vis-body">

<nav class="tags-vis-nav" aria-label="Subpages">
  <div>
    <span class="tags-vis-title">Vector field</span>
    <a href="/">← home</a>
    <a href="/tags/">2D cloud</a>
    <a href="/tags/3d/">3D cloud</a>
    <a href="/tags/constellation/">constellation</a>
    <a href="/tags/chaos-attractor/">chaos</a>
    <a href="/tags/vectorfield-3d/">vector 3D</a>
    <a href="/tags/phrases/">phrases</a>
    <a href="/tags/sentiment-vortex/">sentiment vortex</a>
  </div>
</nav>

<div class="tags-vis-toolbar">
  <label class="tags-vis-density-label" for="vf-density">Density</label>
  <select id="vf-density" class="tags-vis-select" aria-label="Particle density" title="Overrides auto tier until changed">
    <option value="auto">Auto</option>
    <option value="low">Low</option>
    <option value="med">Med</option>
    <option value="high">High</option>
  </select>
  <label class="tags-vis-density-label" for="vf-noise">Noise value</label>
  <input id="vf-noise" class="tags-vis-select" type="range" min="0" max="1.65" step="0.01" value="0.55" aria-label="Noise value">
  <span class="tags-vis-status" id="vf-noise-value">0.55</span>
  <label class="tags-vis-density-label" for="vf-anchors">Anchors value</label>
  <input id="vf-anchors" class="tags-vis-select" type="range" min="0" max="8" step="0.1" value="1" aria-label="Anchors value">
  <span class="tags-vis-status" id="vf-anchors-value">1.0</span>
  <label class="tags-vis-density-label" for="vf-compensation-x">CompensationX</label>
  <input id="vf-compensation-x" class="tags-vis-select" type="range" min="-4" max="4" step="0.01" value="0" aria-label="CompensationX">
  <span class="tags-vis-status" id="vf-compensation-x-value">0.00</span>
  <label class="tags-vis-density-label" for="vf-anchor-mode">Anchor mode</label>
  <select id="vf-anchor-mode" class="tags-vis-select" aria-label="Anchor mode">
    <option value="current">Current</option>
    <option value="random">Random</option>
    <option value="alt-components">Alt vectors</option>
  </select>
  <label class="tags-vis-density-label" for="vf-anchor-count">Count anchors</label>
  <input id="vf-anchor-count" class="tags-vis-select" type="range" min="0" max="256" step="1" value="32" aria-label="Count anchors">
  <span class="tags-vis-status" id="vf-anchor-count-value">32</span>
  <button type="button" class="tags-vis-btn" id="btn-anchor-labels" aria-pressed="false" title="Show anchors at influence centers; drag handles to move and reshape the field">Anchor labels</button>
  <button type="button" class="tags-vis-btn" id="btn-show-vectors" aria-pressed="false" title="Overlay flow direction on a grid (same field as particles)">Field vectors</button>
  <button type="button" class="tags-vis-btn" id="btn-freeze">Freeze</button>
  <button type="button" class="tags-vis-btn" id="btn-export">Export PNG</button>
  <span class="tags-vis-status" id="tags-vis-status"></span>
</div>

<div id="api-error" class="tags-vis-banner" role="alert"></div>
<div class="tags-vis-scanlines" aria-hidden="true"></div>
<div class="tags-vis-canvas-host">
  <canvas id="vf"></canvas>
  <div id="vf-anchors-layer" class="vf-anchors-layer is-hidden" aria-hidden="true"></div>
</div>
<p class="tags-vis-hint">White particles · Field vectors: cyan ticks = local flow direction · Anchor labels: drag handles to move anchors and reshape the field</p>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<!-- Three.js r128 via unpkg (same as tags_3d / chaos). If CSP blocks unpkg, copy three.min.js to flask/static/ and point src here. -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='tags_vis_controls.js') }}"></script>
<script>
(function () {
  var TAGS_API = '/api/tags/get/';
  var EMB_API = '/api/tags/embeddings/';
  var MAX_PARTICLES_CAPACITY = 32000;
  /** Motion speed (lower = slower). 0.05 ≈ 20× slower than original baseline. */
  var FLOW_SPEED = 0.05;
  var RELOAD_DEBOUNCE_MS = 550;

  var effectiveParticles = MAX_PARTICLES_CAPACITY;
  var MAX_TAGS = 48;
  var MAX_ANCHOR_CANDIDATES = 256;
  var DEFAULT_ANCHOR_COUNT = 32;
  var MAX_DPR = 2;
  var NOISE_BASE = 0.55;
  var ANCHORS_BASE = 1.0;
  /** Time scale for field evolution when not frozen; reduced-motion uses ~0.25 so the field barely drifts unless user unfreezes. */
  var animSlow = 1;
  var reduceMotionPreferred = false;

  var statusEl = document.getElementById('tags-vis-status');
  var banner = document.getElementById('api-error');
  var canvas = document.getElementById('vf');
  var densitySel = document.getElementById('vf-density');
  var noiseSel = document.getElementById('vf-noise');
  var anchorsSel = document.getElementById('vf-anchors');
  var compensationXSel = document.getElementById('vf-compensation-x');
  var anchorModeSel = document.getElementById('vf-anchor-mode');
  var anchorCountSel = document.getElementById('vf-anchor-count');
  var noiseValueEl = document.getElementById('vf-noise-value');
  var anchorsValueEl = document.getElementById('vf-anchors-value');
  var compensationXValueEl = document.getElementById('vf-compensation-x-value');
  var anchorCountValueEl = document.getElementById('vf-anchor-count-value');
  var noiseStrength = NOISE_BASE;
  var anchorsStrength = ANCHORS_BASE;
  var compensationX = 0;
  var anchorMode = 'current';
  var anchorCount = DEFAULT_ANCHOR_COUNT;

  var renderer, scene, camera, points, geom, posAttr, colAttr;
  var anchors = [];
  var tAnim = 0;
  var positions, colors, velocities;
  var worldW = 1;
  var worldH = 1;
  var reloadTimer = null;
  var anchorLayer = document.getElementById('vf-anchors-layer');
  var showAnchorLabels = false;
  var showVectors = false;
  var dragAnchorIndex = -1;
  /** Grid for vector overlay (world-space samples of fieldAt). */
  var GRID_NX = 26;
  var GRID_NY = 16;
  var vectorGeom = null;
  var vectorLines = null;
  var vectorPosArr = null;
  var lastTagRows = null;
  var lastEmb = null;

  function getDensityPref() {
    if (densitySel && densitySel.value) return densitySel.value;
    try {
      return sessionStorage.getItem('tags-vectorfield-density') || 'auto';
    } catch (e) {
      return 'auto';
    }
  }

  function computeTier() {
    var reduceMotion = false;
    try {
      reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    } catch (e) {}
    var pref = getDensityPref();
    var cores = typeof navigator.hardwareConcurrency === 'number' ? navigator.hardwareConcurrency : 4;
    var narrow = window.innerWidth < 640;
    var particlesHi = 32000;
    var particlesMed = 18000;
    var particlesLo = 9000;
    var tagsHi = 48;
    var tagsMed = 36;
    var tagsLo = 24;
    var dprHi = 2;
    var dprLo = 1;
    var particles = particlesHi;
    var maxTags = tagsHi;
    var maxDpr = dprHi;
    if (pref === 'high') {
      particles = particlesHi;
      maxTags = tagsHi;
      maxDpr = dprHi;
    } else if (pref === 'med') {
      particles = particlesMed;
      maxTags = tagsMed;
      maxDpr = dprHi;
    } else if (pref === 'low') {
      particles = particlesLo;
      maxTags = tagsLo;
      maxDpr = dprLo;
    } else {
      if (reduceMotion) {
        particles = particlesLo;
        maxTags = tagsLo;
        maxDpr = dprLo;
      } else if (narrow || cores < 4) {
        particles = particlesMed;
        maxTags = tagsMed;
        maxDpr = cores < 2 ? dprLo : dprHi;
      }
    }
    return {
      particles: particles,
      maxTags: maxTags,
      maxDpr: maxDpr,
      reduceMotion: reduceMotion,
      animSlow: reduceMotion ? 0.25 : 1,
    };
  }

  function syncTierToWebGL() {
    var t = computeTier();
    effectiveParticles = Math.min(MAX_PARTICLES_CAPACITY, t.particles);
    MAX_TAGS = t.maxTags;
    MAX_DPR = t.maxDpr;
    animSlow = t.animSlow;
    reduceMotionPreferred = t.reduceMotion;
    if (geom) geom.setDrawRange(0, effectiveParticles);
    if (points && points.material) {
      points.material.size = effectiveParticles > 12000 ? 0.72 : 1.15;
      points.material.color.setHex(0xffffff);
      points.material.opacity = 0.8;
      points.material.vertexColors = false;
      points.material.blending = THREE.NormalBlending;
      points.material.needsUpdate = true;
    }
  }

  function showErr(msg) {
    banner.textContent = msg;
    banner.classList.add('visible');
  }
  function hideErr() {
    banner.classList.remove('visible');
  }

  function normTag(x) {
    if (typeof x === 'string') return x.trim().toLowerCase();
    return '';
  }

  function noise2(x, y, t) {
    return (
      Math.sin(x * 0.019 + t * 0.7) * Math.cos(y * 0.017 - t * 0.5) +
      0.5 * Math.sin(x * 0.041 + y * 0.023 + t * 1.1)
    );
  }

  function syncNoiseUi() {
    if (noiseSel) noiseSel.value = String(noiseStrength);
    if (noiseValueEl) noiseValueEl.textContent = Number(noiseStrength).toFixed(2);
  }

  function syncAnchorsUi() {
    if (anchorsSel) anchorsSel.value = String(anchorsStrength);
    if (anchorsValueEl) anchorsValueEl.textContent = Number(anchorsStrength).toFixed(1);
  }

  function syncCompensationXUi() {
    if (compensationXSel) compensationXSel.value = String(compensationX);
    if (compensationXValueEl) compensationXValueEl.textContent = Number(compensationX).toFixed(2);
  }

  function syncAnchorModeUi() {
    if (anchorModeSel) anchorModeSel.value = anchorMode;
  }

  function syncAnchorCountUi() {
    if (anchorCountSel) anchorCountSel.value = String(anchorCount);
    if (anchorCountValueEl) anchorCountValueEl.textContent = String(anchorCount);
  }

  function loadSliderPrefs() {
    try {
      var savedNoise = parseFloat(sessionStorage.getItem('tags-vectorfield-noise'));
      if (Number.isFinite(savedNoise)) {
        noiseStrength = Math.max(0, Math.min(NOISE_BASE * 3, savedNoise));
      }
      var savedAnchors = parseFloat(sessionStorage.getItem('tags-vectorfield-anchors'));
      if (Number.isFinite(savedAnchors)) {
        anchorsStrength = Math.max(0, Math.min(8, savedAnchors));
      }
      var savedCompensationX = parseFloat(sessionStorage.getItem('tags-vectorfield-compensation-x'));
      if (Number.isFinite(savedCompensationX)) {
        compensationX = Math.max(-4, Math.min(4, savedCompensationX));
      }
      var savedMode = sessionStorage.getItem('tags-vectorfield-anchor-mode');
      if (savedMode && ['current', 'random', 'alt-components'].indexOf(savedMode) >= 0) {
        anchorMode = savedMode;
      }
      var savedCount = parseInt(sessionStorage.getItem('tags-vectorfield-anchor-count') || '', 10);
      if (Number.isFinite(savedCount)) {
        anchorCount = Math.max(0, Math.min(MAX_ANCHOR_CANDIDATES, savedCount));
      }
    } catch (e) {}
    syncNoiseUi();
    syncAnchorsUi();
    syncCompensationXUi();
    syncAnchorModeUi();
    syncAnchorCountUi();
  }

  function stableHash(str) {
    var h = 2166136261;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function hashToUnit(seed) {
    return ((seed >>> 0) % 1000000) / 500000 - 1;
  }

  function randomAnchor2D(name) {
    var base = stableHash(name || '');
    return [hashToUnit(base ^ 0x9e3779b9), hashToUnit(base ^ 0x85ebca6b)];
  }

  function getEmbVectors2D(emb, key) {
    var current = emb.mapCurrent[key] || emb.mapLegacy[key];
    var alt = emb.mapAlt[key] || current;
    var dir = emb.mapDir[key] || current || alt;
    return { current: current, alt: alt, dir: dir };
  }

  function rebuildAnchorsFromCache() {
    if (!lastTagRows || !lastEmb) return;
    buildAnchorsFromEmb(lastTagRows, lastEmb);
    layoutParticles();
  }

  function fieldAt(x, y, t) {
    var fx = noise2(y, x * 0.5, t) * noiseStrength;
    var fy = noise2(x, y + 3, t + 1) * noiseStrength;
    var sx = 0;
    var sy = 0;
    var sw = 0;
    for (var i = 0; i < anchors.length; i++) {
      var a = anchors[i];
      var dx = x - a.x;
      var dy = y - a.y;
      var d = Math.sqrt(dx * dx + dy * dy) + 28;
      var baseW = 1 / (d * d);
      var cw = a.countWeight != null ? a.countWeight : 1;
      var ww = baseW * cw;
      sx += a.dx * ww;
      sy += a.dy * ww;
      sw += ww;
    }
    if (sw > 1e-8) {
      fx += (sx / sw) * anchorsStrength;
      fy += (sy / sw) * anchorsStrength;
    }
    fx += compensationX;
    return { x: fx, y: fy };
  }

  function anchorTooltip(a) {
    return (
      (a.name || '') +
      ' · norm ∈ [-1,1] (' +
      (a.nx != null ? Number(a.nx).toFixed(3) : '?') +
      ', ' +
      (a.ny != null ? Number(a.ny).toFixed(3) : '?') +
      ') · raw emb₂D (' +
      (a.ex != null ? Number(a.ex).toFixed(4) : '?') +
      ', ' +
      (a.ey != null ? Number(a.ey).toFixed(4) : '?') +
      ') · world (' +
      (a.x != null ? Number(a.x).toFixed(1) : '?') +
      ', ' +
      (a.y != null ? Number(a.y).toFixed(1) : '?') +
      ') · drag handle to move'
    );
  }

  function screenToWorld(clientX, clientY) {
    var rect = renderer.domElement.getBoundingClientRect();
    var nx = (clientX - rect.left) / Math.max(1, rect.width);
    var ny = (clientY - rect.top) / Math.max(1, rect.height);
    var wx = camera.left + nx * (camera.right - camera.left);
    var wy = camera.top - ny * (camera.top - camera.bottom);
    return { x: wx, y: wy };
  }

  function clampWorld(wx, wy) {
    var mx = worldW * 0.48;
    var my = worldH * 0.48;
    if (wx < -mx) wx = -mx;
    if (wx > mx) wx = mx;
    if (wy < -my) wy = -my;
    if (wy > my) wy = my;
    return { x: wx, y: wy };
  }

  function syncAnchorLabelPositions() {
    if (!showAnchorLabels || !anchorLayer || !camera) return;
    var items = anchorLayer.querySelectorAll('.vf-anchor-item');
    for (var i = 0; i < items.length && i < anchors.length; i++) {
      var a = anchors[i];
      var u = (a.x - camera.left) / (camera.right - camera.left);
      var v = (camera.top - a.y) / (camera.top - camera.bottom);
      items[i].style.left = u * 100 + '%';
      items[i].style.top = v * 100 + '%';
      var line = items[i].querySelector('.vf-anchor-line');
      if (line) {
        var len = Math.min(56, 18 + (a.countWeight || 1) * 5.5);
        line.style.setProperty('--vf-anchor-line-length', len.toFixed(1) + 'px');
        line.style.setProperty(
          '--vf-anchor-line-angle',
          (Math.atan2(-(a.dy || 0), a.dx || 0) * 180 / Math.PI).toFixed(2) + 'deg'
        );
      }
      var h = items[i].querySelector('.vf-anchor-handle');
      if (h) h.title = anchorTooltip(a);
    }
  }

  function rebuildAnchorLabels() {
    if (!anchorLayer) return;
    anchorLayer.innerHTML = '';
    dragAnchorIndex = -1;
    if (!showAnchorLabels) return;
    for (var i = 0; i < anchors.length; i++) {
      var a = anchors[i];
      var item = document.createElement('div');
      item.className = 'vf-anchor-item';

      var handle = document.createElement('button');
      handle.type = 'button';
      handle.className = 'vf-anchor-handle';
      handle.setAttribute('aria-label', 'Drag field anchor: ' + (a.name || String(i)));
      handle.title = anchorTooltip(a);
      (function (idx) {
        function startDrag(ev) {
          ev.preventDefault();
          ev.stopPropagation();
          dragAnchorIndex = idx;
        }
        handle.addEventListener('mousedown', startDrag);
        handle.addEventListener('touchstart', startDrag, { passive: false });
      })(i);

      var lab = document.createElement('span');
      lab.className = 'vf-anchor-label';
      lab.textContent = a.labelText || a.name || '';
      lab.title = anchorTooltip(a);

      var line = document.createElement('span');
      line.className = 'vf-anchor-line';
      line.setAttribute('aria-hidden', 'true');

      item.appendChild(handle);
      item.appendChild(line);
      item.appendChild(lab);
      anchorLayer.appendChild(item);
    }
    syncAnchorLabelPositions();
  }

  function onAnchorDragMove(ev) {
    if (dragAnchorIndex < 0 || dragAnchorIndex >= anchors.length) return;
    var cx = ev.clientX != null ? ev.clientX : (ev.touches && ev.touches[0] ? ev.touches[0].clientX : 0);
    var cy = ev.clientY != null ? ev.clientY : (ev.touches && ev.touches[0] ? ev.touches[0].clientY : 0);
    var w = screenToWorld(cx, cy);
    var p = clampWorld(w.x, w.y);
    anchors[dragAnchorIndex].x = p.x;
    anchors[dragAnchorIndex].y = p.y;
    syncAnchorLabelPositions();
    var items = anchorLayer.querySelectorAll('.vf-anchor-item');
    var row = items[dragAnchorIndex];
    if (row) {
      var h = row.querySelector('.vf-anchor-handle');
      var lab = row.querySelector('.vf-anchor-label');
      var tip = anchorTooltip(anchors[dragAnchorIndex]);
      if (h) h.title = tip;
      if (lab) lab.title = tip;
    }
  }

  function onAnchorDragEnd() {
    dragAnchorIndex = -1;
  }

  window.addEventListener('mousemove', onAnchorDragMove);
  window.addEventListener('mouseup', onAnchorDragEnd);
  window.addEventListener('touchmove', onAnchorDragMove, { passive: false });
  window.addEventListener('touchend', onAnchorDragEnd);
  window.addEventListener('touchcancel', onAnchorDragEnd);
  window.addEventListener('blur', onAnchorDragEnd);

  function setAnchorLabelsVisible(on) {
    showAnchorLabels = !!on;
    if (anchorLayer) {
      anchorLayer.classList.toggle('is-hidden', !showAnchorLabels);
      anchorLayer.setAttribute('aria-hidden', showAnchorLabels ? 'false' : 'true');
    }
    var btn = document.getElementById('btn-anchor-labels');
    if (btn) {
      btn.setAttribute('aria-pressed', showAnchorLabels ? 'true' : 'false');
    }
    try {
      sessionStorage.setItem('tags-vectorfield-anchor-labels', showAnchorLabels ? '1' : '0');
    } catch (e) {}
    if (showAnchorLabels) rebuildAnchorLabels();
    else if (anchorLayer) anchorLayer.innerHTML = '';
  }

  function initThree() {
    renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
    renderer.setClearColor(0x09090b, 1);
    scene = new THREE.Scene();
    camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
    camera.position.z = 10;

    geom = new THREE.BufferGeometry();
    var n = MAX_PARTICLES_CAPACITY;
    positions = new Float32Array(n * 3);
    colors = new Float32Array(n * 3);
    velocities = new Float32Array(n * 2);
    for (var i = 0; i < n; i++) {
      positions[i * 3 + 2] = 0;
      colors[i * 3 + 0] = 1;
      colors[i * 3 + 1] = 1;
      colors[i * 3 + 2] = 1;
    }
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    posAttr = geom.getAttribute('position');
    colAttr = geom.getAttribute('color');
    geom.setDrawRange(0, effectiveParticles);

    var mat = new THREE.PointsMaterial({
      size: effectiveParticles > 12000 ? 0.72 : 1.15,
      color: 0xffffff,
      vertexColors: false,
      transparent: true,
      opacity: 0.8,
      depthWrite: false,
      blending: THREE.NormalBlending,
    });
    points = new THREE.Points(geom, mat);
    scene.add(points);
    ensureVectorOverlay();
  }

  function ensureVectorOverlay() {
    if (vectorLines) return;
    var maxSeg = GRID_NX * GRID_NY;
    vectorPosArr = new Float32Array(maxSeg * 6);
    vectorGeom = new THREE.BufferGeometry();
    vectorGeom.setAttribute(
      'position',
      new THREE.BufferAttribute(vectorPosArr, 3).setUsage(THREE.DynamicDrawUsage)
    );
    vectorLines = new THREE.LineSegments(
      vectorGeom,
      new THREE.LineBasicMaterial({
        color: 0x22d3ee,
        transparent: true,
        opacity: 0.52,
        depthTest: true,
        depthWrite: false,
      })
    );
    vectorLines.visible = false;
    vectorLines.frustumCulled = false;
    vectorLines.renderOrder = 1;
    scene.add(vectorLines);
  }

  function updateVectorFieldOverlay() {
    if (!showVectors || !vectorGeom || !vectorPosArr) return;
    var halfW = worldW * 0.48;
    var halfH = worldH * 0.48;
    var arrowScale = Math.min(worldW, worldH) * 0.042;
    var idx = 0;
    for (var j = 0; j < GRID_NY; j++) {
      for (var i = 0; i < GRID_NX; i++) {
        var x = -halfW + ((i + 0.5) / GRID_NX) * (2 * halfW);
        var y = -halfH + ((j + 0.5) / GRID_NY) * (2 * halfH);
        var f = fieldAt(x, y, tAnim);
        var flen = Math.sqrt(f.x * f.x + f.y * f.y);
        var inv = flen > 1e-9 ? 1 / flen : 0;
        var nx = f.x * inv;
        var ny = f.y * inv;
        var magNorm = Math.min(1, flen * 1.75);
        var L = arrowScale * (0.38 + 0.62 * magNorm);
        vectorPosArr[idx++] = x;
        vectorPosArr[idx++] = y;
        vectorPosArr[idx++] = 0;
        vectorPosArr[idx++] = x + nx * L;
        vectorPosArr[idx++] = y + ny * L;
        vectorPosArr[idx++] = 0;
      }
    }
    vectorGeom.attributes.position.needsUpdate = true;
    vectorGeom.computeBoundingSphere();
  }

  function setVectorsVisible(on) {
    showVectors = !!on;
    ensureVectorOverlay();
    if (vectorLines) {
      vectorLines.visible = showVectors;
    }
    var btn = document.getElementById('btn-show-vectors');
    if (btn) {
      btn.setAttribute('aria-pressed', showVectors ? 'true' : 'false');
    }
    try {
      sessionStorage.setItem('tags-vectorfield-vectors', showVectors ? '1' : '0');
    } catch (e) {}
  }

  function layoutParticles() {
    var n = effectiveParticles;
    for (var i = 0; i < n; i++) {
      positions[i * 3 + 0] = (Math.random() - 0.5) * worldW * 1.9;
      positions[i * 3 + 1] = (Math.random() - 0.5) * worldH * 1.9;
      velocities[i * 2 + 0] = 0;
      velocities[i * 2 + 1] = 0;
    }
    posAttr.needsUpdate = true;
  }

  function resize() {
    var dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
    var w = window.innerWidth;
    var h = window.innerHeight;
    renderer.setPixelRatio(dpr);
    renderer.setSize(w, h, false);
    var aspect = w / h;
    worldH = 520;
    worldW = worldH * aspect;
    camera.left = -worldW / 2;
    camera.right = worldW / 2;
    camera.top = worldH / 2;
    camera.bottom = -worldH / 2;
    camera.updateProjectionMatrix();
    syncAnchorLabelPositions();
  }

  /**
   * Min–max per axis: raw (x,y) → roughly [-1, 1]×[-1, 1] using bounds over all given points.
   */
  function embeddingMinMaxNormalizer(points) {
    var minX = Infinity;
    var maxX = -Infinity;
    var minY = Infinity;
    var maxY = -Infinity;
    for (var i = 0; i < points.length; i++) {
      var p = points[i];
      var x = Number(p[0]);
      var y = Number(p[1]);
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
    }
    var rx = maxX - minX;
    var ry = maxY - minY;
    function toNorm(x, y) {
      var nx = rx > 1e-12 ? ((Number(x) - minX) / rx) * 2 - 1 : 0;
      var ny = ry > 1e-12 ? ((Number(y) - minY) / ry) * 2 - 1 : 0;
      return [nx, ny];
    }
    return { toNorm: toNorm, minX: minX, maxX: maxX, minY: minY, maxY: maxY, rx: rx, ry: ry };
  }

  function buildAnchorsFromEmb(tagRows, emb) {
    anchors = [];
    var sorted = tagRows
      .map(function (r) {
        return { name: String(r.name || ''), count: Number(r.count) || 0 };
      })
      .filter(function (t) {
        return t.name.length > 0;
      });
    sorted.sort(function (a, b) {
      return b.count - a.count;
    });
    sorted = sorted.slice(0, MAX_ANCHOR_CANDIDATES);

    if (!emb || !emb.ok || !emb.words || !emb.vectors2d) {
      statusEl.textContent =
        effectiveParticles + ' pts · fallback field (no embeddings)';
      if (showAnchorLabels) rebuildAnchorLabels();
      return;
    }

    var mapLegacy = Object.create(null);
    var mapCurrent = Object.create(null);
    var mapAlt = Object.create(null);
    var mapDir = Object.create(null);
    var hasCurrent =
      Array.isArray(emb.vectors2d_current) && emb.vectors2d_current.length === emb.words.length;
    var hasAlt =
      Array.isArray(emb.vectors2d_alt) && emb.vectors2d_alt.length === emb.words.length;
    var hasDir =
      Array.isArray(emb.directions2d) && emb.directions2d.length === emb.words.length;
    for (var e = 0; e < emb.words.length; e++) {
      var k = normTag(emb.words[e]);
      mapLegacy[k] = emb.vectors2d[e];
      if (hasCurrent) mapCurrent[k] = emb.vectors2d_current[e];
      if (hasAlt) mapAlt[k] = emb.vectors2d_alt[e];
      if (hasDir) mapDir[k] = emb.directions2d[e];
    }
    emb.mapLegacy = mapLegacy;
    emb.mapCurrent = mapCurrent;
    emb.mapAlt = mapAlt;
    emb.mapDir = mapDir;

    var allPts = [];
    var allDirs = [];
    if (anchorMode !== 'random') {
      for (var j = 0; j < sorted.length; j++) {
        var rowKey = normTag(sorted[j].name);
        var vecs = getEmbVectors2D(emb, rowKey);
        var vv = anchorMode === 'alt-components' ? vecs.alt : vecs.current;
        if (vv && vv.length >= 2) allPts.push([Number(vv[0]), Number(vv[1])]);
        if (vecs.dir && vecs.dir.length >= 2) {
          allDirs.push([Number(vecs.dir[0]), Number(vecs.dir[1])]);
        }
      }
    } else {
      for (var j = 0; j < sorted.length; j++) {
        var rowKeyRandom = normTag(sorted[j].name);
        var dirRandom = getEmbVectors2D(emb, rowKeyRandom).dir;
        if (dirRandom && dirRandom.length >= 2) {
          allDirs.push([Number(dirRandom[0]), Number(dirRandom[1])]);
        }
      }
    }
    var nrm =
      allPts.length > 0 ? embeddingMinMaxNormalizer(allPts) : null;
    var dirMeanX = 0;
    var dirMeanY = 0;
    if (allDirs.length > 0) {
      for (var di = 0; di < allDirs.length; di++) {
        dirMeanX += Number(allDirs[di][0]) || 0;
        dirMeanY += Number(allDirs[di][1]) || 0;
      }
      dirMeanX /= allDirs.length;
      dirMeanY /= allDirs.length;
    }
    var centeredDirs = [];
    for (var dc = 0; dc < allDirs.length; dc++) {
      centeredDirs.push([
        (Number(allDirs[dc][0]) || 0) - dirMeanX,
        (Number(allDirs[dc][1]) || 0) - dirMeanY,
      ]);
    }
    var dirNrm =
      centeredDirs.length > 0 ? embeddingMinMaxNormalizer(centeredDirs) : null;

    var scaleX = worldW * 0.48;
    var scaleY = worldH * 0.48;
    var legacyScale = worldW * 0.42;

    var activeLimit = Math.max(0, Math.min(MAX_ANCHOR_CANDIDATES, anchorCount, sorted.length));
    for (var i = 0; i < sorted.length && anchors.length < activeLimit; i++) {
      var row = sorted[i];
      var nm = normTag(row.name);
      var vecs = getEmbVectors2D(emb, nm);
      var pos = anchorMode === 'random'
        ? randomAnchor2D(row.name)
        : (anchorMode === 'alt-components' ? vecs.alt : vecs.current);
      var dir = vecs.dir;
      if (!pos || pos.length < 2) continue;
      var ex = Number(pos[0]);
      var ey = Number(pos[1]);
      var rawDx = dir && dir.length >= 2 ? Number(dir[0]) : ex;
      var rawDy = dir && dir.length >= 2 ? Number(dir[1]) : ey;
      rawDx -= dirMeanX;
      rawDy -= dirMeanY;
      if (dirNrm) {
        var dn = dirNrm.toNorm(rawDx, rawDy);
        rawDx = dn[0];
        rawDy = dn[1];
      }
      var nx;
      var ny;
      var px;
      var py;
      var dx;
      var dy;
      if (nrm) {
        var nn = nrm.toNorm(ex, ey);
        nx = nn[0];
        ny = nn[1];
        px = nx * scaleX;
        py = ny * scaleY;
        var lenD = Math.sqrt(rawDx * rawDx + rawDy * rawDy);
        if (lenD > 1e-6) {
          dx = rawDx / lenD;
          dy = rawDy / lenD;
        } else {
          var lenR = Math.sqrt(ex * ex + ey * ey) + 1e-6;
          dx = ex / lenR;
          dy = ey / lenR;
        }
      } else {
        nx = ex;
        ny = ey;
        px = ex * legacyScale;
        py = ey * legacyScale;
        var lenL = Math.sqrt(rawDx * rawDx + rawDy * rawDy) + 1e-6;
        dx = rawDx / lenL;
        dy = rawDy / lenL;
      }
      var countWeight = Math.sqrt(row.count + 1);
      anchors.push({
        name: row.name,
        labelText: row.name + ' ' + nx.toFixed(2) + ',' + ny.toFixed(2),
        ex: ex,
        ey: ey,
        nx: nx,
        ny: ny,
        x: px,
        y: py,
        dx: dx,
        dy: dy,
        countWeight: countWeight,
      });
    }
    statusEl.textContent =
      effectiveParticles +
      ' pts · ' +
      anchors.length +
      ' anchors · mode ' +
      anchorMode +
      ' · world';
    if (showAnchorLabels) rebuildAnchorLabels();
  }

  function fetchEmb(names) {
    return fetch(EMB_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ words: names, max_words: MAX_ANCHOR_CANDIDATES, min_sim: 0.35, max_links: 100 }),
    })
      .then(function (r) {
        return r.json();
      })
      .catch(function () {
        return { ok: false };
      });
  }

  function reloadData() {
    statusEl.textContent = 'Loading tags…';
    return fetch(TAGS_API)
      .then(function (r) {
        return r.json().then(function (b) {
          return { ok: r.ok, b: b };
        });
      })
      .then(function (res) {
        if (!res.ok || (res.b && res.b.error)) {
          showErr('Tags API: ' + (res.b && res.b.error ? res.b.error : 'failed'));
          statusEl.textContent = '';
          return;
        }
        hideErr();
        if (!Array.isArray(res.b)) {
          showErr('Tags: expected array');
          statusEl.textContent = '';
          return;
        }
        statusEl.textContent = 'Loading embeddings…';
        lastTagRows = res.b;
        var names = res.b.map(function (row) {
          return String(row.name || '');
        }).filter(Boolean);
        return fetchEmb(names).then(function (emb) {
          lastEmb = emb;
          buildAnchorsFromEmb(res.b, emb);
          layoutParticles();
        });
      })
      .catch(function (e) {
        console.error(e);
        showErr('Network: ' + (e.message || String(e)));
        statusEl.textContent = '';
      });
  }

  function scheduleReload() {
    if (reloadTimer) clearTimeout(reloadTimer);
    reloadTimer = setTimeout(function () {
      reloadTimer = null;
      reloadData();
    }, RELOAD_DEBOUNCE_MS);
  }

  function onResize() {
    var prevTags = MAX_TAGS;
    var prevEp = effectiveParticles;
    syncTierToWebGL();
    resize();
    layoutParticles();
    if (prevTags !== MAX_TAGS || prevEp !== effectiveParticles) {
      scheduleReload();
    }
  }

  if (densitySel) {
    try {
      var saved = sessionStorage.getItem('tags-vectorfield-density');
      if (saved && ['auto', 'low', 'med', 'high'].indexOf(saved) >= 0) densitySel.value = saved;
    } catch (e) {}
    densitySel.addEventListener('change', function () {
      try {
        sessionStorage.setItem('tags-vectorfield-density', densitySel.value);
      } catch (e) {}
      syncTierToWebGL();
      resize();
      layoutParticles();
      reloadData();
    });
  }

  loadSliderPrefs();
  if (noiseSel) {
    noiseSel.addEventListener('input', function () {
      noiseStrength = Math.max(0, Math.min(NOISE_BASE * 3, parseFloat(noiseSel.value) || 0));
      syncNoiseUi();
      try {
        sessionStorage.setItem('tags-vectorfield-noise', String(noiseStrength));
      } catch (e) {}
    });
  }
  if (anchorsSel) {
    anchorsSel.addEventListener('input', function () {
      anchorsStrength = Math.max(0, Math.min(8, parseFloat(anchorsSel.value) || 0));
      syncAnchorsUi();
      try {
        sessionStorage.setItem('tags-vectorfield-anchors', String(anchorsStrength));
      } catch (e) {}
    });
  }
  if (compensationXSel) {
    compensationXSel.addEventListener('input', function () {
      compensationX = Math.max(-4, Math.min(4, parseFloat(compensationXSel.value) || 0));
      syncCompensationXUi();
      try {
        sessionStorage.setItem('tags-vectorfield-compensation-x', String(compensationX));
      } catch (e) {}
    });
  }
  if (anchorModeSel) {
    anchorModeSel.addEventListener('change', function () {
      anchorMode = anchorModeSel.value || 'current';
      syncAnchorModeUi();
      try {
        sessionStorage.setItem('tags-vectorfield-anchor-mode', anchorMode);
      } catch (e) {}
      rebuildAnchorsFromCache();
    });
  }
  if (anchorCountSel) {
    anchorCountSel.addEventListener('input', function () {
      anchorCount = Math.max(0, Math.min(MAX_ANCHOR_CANDIDATES, parseInt(anchorCountSel.value || '0', 10) || 0));
      syncAnchorCountUi();
      try {
        sessionStorage.setItem('tags-vectorfield-anchor-count', String(anchorCount));
      } catch (e) {}
      rebuildAnchorsFromCache();
    });
  }

  try {
    var mqRm = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (mqRm.addEventListener) {
      mqRm.addEventListener('change', onResize);
    } else if (mqRm.addListener) {
      mqRm.addListener(onResize);
    }
  } catch (e) {}

  syncTierToWebGL();
  initThree();
  resize();
  window.addEventListener('resize', onResize);
  layoutParticles();

  (function initAnchorLabelToggle() {
    var btn = document.getElementById('btn-anchor-labels');
    if (!btn) return;
    try {
      if (sessionStorage.getItem('tags-vectorfield-anchor-labels') === '1') {
        setAnchorLabelsVisible(true);
      }
    } catch (e) {}
    btn.addEventListener('click', function () {
      setAnchorLabelsVisible(!showAnchorLabels);
    });
  })();

  (function initVectorsToggle() {
    var btn = document.getElementById('btn-show-vectors');
    if (!btn) return;
    try {
      if (sessionStorage.getItem('tags-vectorfield-vectors') === '1') {
        setVectorsVisible(true);
      }
    } catch (e) {}
    btn.addEventListener('click', function () {
      setVectorsVisible(!showVectors);
    });
  })();

  TagsVisControls.wire({
    onExport: function () {
      renderer.render(scene, camera);
      try {
        var data = renderer.domElement.toDataURL('image/png');
        var a = document.createElement('a');
        a.href = data;
        a.download = 'vectorfield-' + Date.now() + '.png';
        a.click();
      } catch (e) {
        console.error(e);
      }
    },
  });

  if (reduceMotionPreferred) {
    TagsVisControls.frozen = true;
    var freezeBtn = document.getElementById('btn-freeze');
    if (freezeBtn) {
      freezeBtn.textContent = 'Unfreeze';
      freezeBtn.setAttribute('aria-pressed', 'true');
    }
  }

  function tick() {
    requestAnimationFrame(tick);
    if (document.visibilityState === 'hidden') {
      renderer.render(scene, camera);
      return;
    }
    if (!TagsVisControls.frozen) {
      tAnim += 0.016 * animSlow * FLOW_SPEED;
      for (var i = 0; i < effectiveParticles; i++) {
        var x = positions[i * 3 + 0];
        var y = positions[i * 3 + 1];
        var f = fieldAt(x, y, tAnim);
        velocities[i * 2 + 0] =
          velocities[i * 2 + 0] * 0.92 + f.x * 2.8 * FLOW_SPEED;
        velocities[i * 2 + 1] =
          velocities[i * 2 + 1] * 0.92 + f.y * 2.8 * FLOW_SPEED;
        x += velocities[i * 2 + 0];
        y += velocities[i * 2 + 1];
        if (x < -worldW * 0.95 || x > worldW * 0.95) x = (Math.random() - 0.5) * worldW * 1.6;
        if (y < -worldH * 0.95 || y > worldH * 0.95) y = (Math.random() - 0.5) * worldH * 1.6;
        positions[i * 3 + 0] = x;
        positions[i * 3 + 1] = y;
      }
      posAttr.needsUpdate = true;
    }
    if (showVectors) {
      ensureVectorOverlay();
      updateVectorFieldOverlay();
    }
    renderer.render(scene, camera);
  }

  var socket = io({ transports: ['websocket', 'polling'] });
  socket.on('analyzed', scheduleReload);
  socket.on('tags_updated', scheduleReload);

  tick();
  reloadData();
})();
</script>
</body>
</html>
