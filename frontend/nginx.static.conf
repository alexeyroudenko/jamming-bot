server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Shared CRA bundle pulls in code paths that use eval (e.g. WebGL / force-graph stack). A strict
    # script-src without 'unsafe-eval' triggers Chrome CSP violations. If another layer (Cloudflare,
    # Traefik middleware) also sends Content-Security-Policy, every policy must allow the same—then
    # add 'unsafe-eval' there or turn off the duplicate header to avoid conflicting directives.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https: wss: ws: data:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; base-uri 'self'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
